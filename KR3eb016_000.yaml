front:
  text: 序素問九卷為醫經之祖西晉亂後失其第七一卷故梁七錄所載全元起詮註皆只八卷唐王冰謂於郭子齋堂得受先師張公秘本林億等譏其以陰陽大論之文纂入猶周官亡冬官以考工記補之之類何以言之夫六淫之邪以風寒熱為三大綱領考素問風論熱論病情委曲詳盡何以獨闕寒論而熱論首言今夫熱病者皆傷寒之類也既云類傷寒則有正傷寒專論可知惜乎亡於兵火仲景傷寒論序云撰用素問九卷當時尚未亡失是傷寒專論散見於六經篇中幸高平王叔和編其殘帙使醫統正脈一線不絕厥功偉矣又集先賢診法著成脈經更以師承心驗者別撰脈訣經高陽生編為歌括以便記誦辭俚旨深朱子跋郭長陽傷寒補亡論深許其高骨取關之義何戴起宗李瀕湖輩不求其旨但鄙其文多見其不自量也余夙好方術服膺此書思欲詮釋以暢其義庚寅之春於廣陵肆中得脈訣乳海六冊蟲齧塵湮幾難卒讀攜歸案頭如理亂絲始能成誦其作者為王君邦傅王君不知何時人亦醫林中之矯矯者以河洛之精義發叔和之奧旨而於營衛循行之道尤深致意焉論理精詳引證博雅金元后僅見才也惟畫圖立說似近膠刻臟腑拘例未免沿習言其所當然未言其所以然也請試明之易本乎天地人與天地參其陰陽之理一也乾坤六爻以配十四經脈婺源江氏河洛精蘊論之綦詳臟腑定位西士解剖諸書言之甚悉而氣化之理闕馬夫歸藏商易取用乎坤而以十二闢卦候一年十二月消息禮記孔子曰吾欲觀殷道是故之宋而不足徵也吾得坤乾焉所謂坤乾者商易歸藏也故繫辭曰變通配四時又曰剛柔相推變在其中矣又曰往來不窮謂之通又曰寒往則暑來暑往則寒來皆此義也漢儒每常言之十二闢卦者即十二月令之卦也又即乾坤二卦六爻之旁解也蓋乾之六陽自十一月建子冬至一陽始生為地雷復卦即乾初九爻十二月建醜二陽生為地澤臨即乾九二正月寅三陽生為地天泰即乾九三二月卯四陽生為雷天大壯即乾九四三月辰五陽生為澤天夬即乾九五至四月建巳六陽充足而為乾為天即乾上九此一年之乾卦也至五月建午夏至一陰生為天風姤卦即坤初六爻六月建未二陰生為天山遁即坤六二七月建申三陰生為天地否即坤六三八月酉四陰生為風地觀即坤六四九月戌五陰生為山地剝即坤六五至十月建亥六陰純靜而為坤為地即坤上六此一年之坤卦也夫坤為萬物之母而能生物然坤本純陰必待乾與之交而得其陽然後始能生萬物也十二支次序世人皆以子為首因坤臨十月亥坤為純陰之卦陰極則陽生故十一月冬至一陽升於地上為地雷復也不知造化端倪實不在子而在午蓋天地交而後萬物生是乾坤交姤之初即為萬物造端之始然交必陽體充足而後能交乾之六陽乃充足於四月之巳次為午故乾至五月建午始與坤交是則乾足於巳而動於午巳午皆火故伏羲乾居正南乾之外體屬火乾中含蓄陰精屬金故五行家言庚金長生在巳所謂長生者乃指其生之之源而言也乾之初動於午每年五月夏至之時乾上九一陽已升至天頂極高不得不轉而向下向下即感動坤陰之氣上升而交故天地三交五月建午為第一交六月未為二交七月申為三交所謂坤三索於乾也乾坤交而謂之索者以坤本純陰必索於乾而後有陽始能生化也乾陽入坤而化為氣氣升為云為雨蓋十二闢卦乾位巳火也坤位亥水也乾與坤交則火入水中而化為氣以水為質火為性試以一碗人張口氣呵之則生水故知氣之形屬水而其所以能升騰行動者則火也爻辭曰見群龍無首吉言氣升能為雲雨故喻為龍而乾與坤三交則乾上四五之三爻盡入於坤而乾上爻巳火之首早入亥水之中為育生胚胎之兆故龍之無首吉也此天地陰陽化育之義推之與人亦然飲入於胃由胃小腸相接處幽門幽門之上有一竅水飲從此竅散布下焦脂膜之中由脂膜而滲入膀胱膀胱無上口故曰滲入也氣血之升降必由呼吸以循環吸入天之陽呼出地之陰吸入之氣由鼻入肺歷心引心火從總脈管循督脈入腎又從腎系以達下焦胞室挾膀胱至下口其吸入天之陽氣令人身心火蒸動膀胱之水化而為氣循衝任而上化津化汗過膈入肺還至於口由呼而出斯即乾坤相交三索之義也明乎此不獨察水火之徵兆陰陽之盛衰即四時伏氣之病機莫不由此悟入若夫營衛之理請再明之衛者氣也衛護於外者也營者血也營運於中者也但血中有氣氣中有血不可須臾相離而其本則一其道有三如動一也靜一也所以能使其動靜者又一也太極無形而寓三才之理凡物皆然不獨指動靜而言也谷入於胃其糟粕由廣腸而出魄門其精液有微絲管吸至頸會管過肺入心化而為赤此即清者為營也其血赤由總脈管循督脈下達胞室內而臟腑外而經脈一日夜五十周盡八百十丈之脈道以應呼吸漏下者此其一也人之飲食五味雜投奚能無毒胃中悍毒之氣合下焦水火蒸騰之氣由上焦氣街散入微絲血管微絲血管者即經所謂孫絡此濁者為衛也靈樞營衛生會篇謂衛氣出於下焦者言其生氣之原五味篇謂衛者陽明水穀之悍氣從上焦而出衛於表陽者言其出入之道也奉心化赤之血氣由絡脈管之尾遞入孫絡與陽明悍毒之氣並布散通體皮腠之間充膚熱肉澹滲毫毛者此其二也清濁混淆赤血漸變漸紫西士見其色紫知其有毒名之曰炭氣然不知其毒所從來也孫絡散布遍體漸並漸粗而接入回血管之尾回血管者即經所謂絡脈也血入回血管內而臟腑外而經脈並脈管交相逆順而行外行於經脈者有陰陽之別一支沉於分肉之間一支浮於肌腠之上即陽絡行於皮表陰絡行於皮里而皆與脈管偕行亦即營行脈中衛行脈外之義此其三也回血管內外行遍入總回管至心遞入於肺呼出悍氣吸入生氣紫者復化為赤經云陰陽相貫如環無端者此之謂也診脈察病當考諸運血脈管之營衛外邪襲入當考諸微絲血管纏布周身之營衛夫太陽主表太陰亦主表者蓋肺為天天包地之外而處於上膀胱為水水環地之極而處於下膀胱主水水陰也肺主氣氣陽也故寒傷營當責諸太陽熱傷衛當責諸太陰識此寒熱之治知所適從矣若口鼻吸受之伏氣當考諸回血管陽絡浮於脈外者可刺之以泄其氣陰絡沉於脈內者宜急攻之以殺其毒觀近世沙毒必刺委中諸穴其血色微紫病輕深紫或黑病重故當急刺以出其血否則毒由總回管入心不可施救此其證也雖然其道有三而氣血則一斯乃陰陽至理三才指歸乾坤三索化生萬類不外乎此然衛氣篇曰亭亭淳淳乎孰能窮之足徵陰陽之變雖聖賢亦莫測其機即其不變者觀之又豈可緣木以求魚故謂畫圖拘例者泥矣如浮為表脈而裡虛者無不兼浮沉為里脈而表寒重者陽氣不能外達每多沉緊遲為陰寒若熱邪壅結隧道不利脈反呈遲數為陽熱若脈來浮數大而無力按之豁然而空此陰盛於下逼陽於上虛陽浮露之戴陽證也脈數盛大按之澀而外有熱證者此名中寒乃寒凝血脈外證熱而脈即數也是表可主裡里可主表寒可察熱熱可察寒陰陽變化之機活法存乎一心似可不拘拘於成見矣然不以規矩不能使人巧若舍繩墨又從何處化裁運用乎則脈訣一書尤當深思而索玩者也故樂為之序光緒辛卯初秋石林舊隱葉霖子雨氏書於研醫讀易之齋
