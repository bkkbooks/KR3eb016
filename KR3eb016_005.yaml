body:
  text: 卷五論脈訣合河圖洛書凡為醫者必察乎色脈之吉凶欲察色脈之吉凶必察乎五行生剋欲察五行之生克必觀乎河圖洛書之理數夫海藏王氏者乃醫之翹楚也述其師東垣老人之元奧而著為一書曰此事難知首載醫之可法者十人其中有箕子之洪範與叔和之脈訣則知叔和之脈訣當與洪範九疇並傳而不朽矣所以叔和以七表為陽其數奇八里為陰其數偶復有九道之脈以配八卦九宮共成二十四脈以配二十四氣其意蓋亦深且遠矣而説者有謂二十四脈不足盡脈之神情以詆譭叔和之脈訣不知二十四脈乃諸脈之綱領亦猶易之有八卦也豈亦將曰八卦不足以盡易之理而詆譭羲皇乎哉朱子曰天以陰陽五行化生萬物人在天地之間是亦物也但物得其偏人得其全耳然物亦有得陰陽五行之全者河圖洛書是也如不明陰陽五行之理則已矣苟欲明陰陽五行之理舍河圖洛書奚自焉然亦未可易言也必知夫河圖洛書之所以然而後可以由堂而入室焉吾先試以河圖之原委淺顯言之夫河圖者當伏羲之時有龍馬負圖而出於河豈別有其圖龍馬負之而出歟是即龍馬背上毛旋羅紋自然有如是一六在下二七在上三八在左四九在右五十居中合上下左右中間之羅紋共計之則五十有五焉其理蓋自左轉而東而南而中而西復始而北順而行之以相生為用者也要知伏羲胸中原自有陰陽五行之理一見斯物適合於中因之而畫八卦乾南坤北離東坎西震東北兌東南巽西南艮西北天地定位山澤通氣雷風相搏水火不相射乾坤縱而六子橫相為對待以立本也復於八卦之上各加八卦上下交錯八而八之再變而為六十四矣彼時但有圖畫而無文字然而千變萬化之理不外乎此所謂伏羲先天八卦者是也嗣後文王被囚因衍易始變先天八卦而為後天置乾於西北退坤於西南長子用事而長女代母坎離得位兌艮為耦震兌橫而六卦縱迭為流行以致用也復廣八八六十四卦而為三百八十四爻文王系卦周公系爻易於是乎有辭孔子生於周末晚作十翼先天后天互相發明而易之道始大備是則河圖之大概也試再以洛書之原委言之夫洛書者乃大禹治水之時有神龜負書而出於洛豈別有其書神龜負之出歟是即其神龜背上自然之文重疊縱橫狀如折甲其文則載九履一左三右七二四為肩六八為履共計其上下左右中間之點數則四十有五焉要知禹王胸中原自有乘除消長之理一見斯物適合於心因之而成九疇其理蓋自此右轉而西而南而東而中逆而行之以克為用者也降至箕子復衍其意而作洪範以陳武王彝倫攸敘逮乎後世去聖日遙又遭秦厄其理雖在其數莫傳賴有宋儒九峰先生廣西山之家學暢考亭之師傳復衍其圖左右交錯九而九之而成八十一疇疇各有名名各有辭亦如易之八八六十四卦以明陰陽五行之理謂之皇極內篇補前人之闕絶發後學所未聞而九疇之理復著焉是則各書之大概也然河圖之與洛書雖時有先後數有多寡至以一六為水二七為火三八為木四九為金五十為土其理則一而已但河圖則合上下以成卦其數偶洛書則合左右以成疇其數奇一三五七九奇也陽也天也二四六八十偶也陰也地也河圖則左轉以相生洛書則右旋以相剋使生而不克則生者無從而裁製克而不生則克者亦有時而間斷天九者洛書之數也而伏羲氏之八卦縱橫斜正數皆用九是河圖而已具洛書之理矣十者河圖之數也而大禹王之九疇縱橫斜正數皆十五是洛書而復具河圖之理矣故先儒有言河圖洛書相為經緯者此也人生於五行之中亦惟是生克之理而已試觀叔和左右手診脈歌則以四十五動為一息言五行之相制制勝極則不能生去洛書五九之數也於雜病生死歌則又以五十不止為無病者取其生生不息不息則能久是法河圖大衍之數五十也然千載以下能窺其奧者唯潔古一人而已觀潔古脈數通論有曰夫脈乃五行之數各有生成之用相剋之數木得金而伐火得水而滅金得火而缺土得木而虧水得土而絶五臟應五行各有相生相勝之理得相生者愈相勝者死此論若不通五臟交變相傳及虛實順逆無由入此理趣也噫夫潔古東垣之師也東垣又海藏之師也其家學淵源相與潛心乎脈訣如此其他如劉守真張子和李希範云岐通真諸子莫不引用脈訣載在典籍者不可勝數何物戴起宗坐井小天不識河圖洛書之旨乃以左右手六部歌訣盡改四十五動為五十動何其有面無目有目無心也奈何復有吠聲之徒厭常喜新隨衆喧喝亦以脈訣為不足法且妄立其説以誤後人抑思爾之成見果有過於潔古東垣諸名賢否歟不則是猶仰天而唾也於脈訣何與哉豫於是書究心十有餘載始得略見一斑以故不惜蛇添於各部之下詳明注釋庶不負作者之苦心俾後學諸君勿為邪説所蔽云爾一六居下二七居上三八居左四九居右五十居中東北內陽外陰西南內陰外陽此四時之象也陽生於子天一生水也陰生於午地二生火也説卦傳曰天地定位山澤通氣雷風相搏水火不相射八卦相錯數往者順知來者逆是故易逆數也易説卦傳曰帝出乎震齊乎巽相傳乎離致役乎坤説言乎兌戰乎乾勞乎坎成言乎艮邵子曰文王八卦置乾於西北退坤於西南長子用事而長女代母坎離得位兌艮為耦乃入用之位後天之學也一合九而為十二合八而為十三合七而為十四合六而為十此洛書以虛數相合而為四十者也若九疇則以實數相合而為五十矣天一居坎坎為水先物故一五行地二居坤坤效法成象故二五事天三居震震興作厚民故三八政地四居巽巽為雞知時故四五紀天五居中立極統外故五皇極地六居乾乾為君父故六三得天七居兌為幽通靈故七稽疑地八居艮艮成物可驗故八數微天九居離離明體有辨故有福極之用戴九履一左三右七二四為肩六八為足水剋火火剋金金剋木木剋土土剋水河圖以相生為序故左行自北而東而南而中而西復始而北洛書以相剋為序故右轉自北而西而南而東而中之始於此春秋緯曰河以通天出天苞雒以流地出地符河通於天龍馬負圖以出於天其位一六居下二七居上三八居左四九居右五十居中雒流於地神龜負書以出於雒其位戴九履一左三右七二四為肩六八為足邵子曰圓者星也曆紀之數其肇於此乎方者土也書地分門州之法其仿於此乎圖出馬背旋毛文故圓曰圖書出龜背拆甲故長曰書左右手診脈歌左右須候四時脈經曰左右者陰陽之道路也故人之左尺水生左關木左關木生左寸火左寸火生右尺火右尺火生右關土右關土生右寸金右寸金生左尺水又左寸火克右寸金右寸金克左關木左關木克右關土右關土克左尺水左尺水克左寸火一往一來左右互相生克即洪範九疇以左右合而明吉凶之義也然亦須隨其四時以診之假令左關肝脈固宜弦長而春三月左右手六部中亦須帶弦又令右寸肺脈固宜浮澀若秋三月左右手六部中亦須帶澀故曰左右須候四時脈也四十五動為一息張世賢曰動脈至也息脈止也非呼吸之息也愚謂平人之脈循環無已雖四十五動之外無有巳時而此云四十五動為一息者言其脈之一小周也猶之以三百六十日為一歲非三百六十日之外有一上而後為第二歲所謂以四十五動為一息者體九疇之數五九四十五也五則五行之氣全九則九疇之數備矣指下弦急洪緊時便是有風兼熱極弦急不緩也洪緊大而不和也弦急洪緊四脈皆陽諸陽為熱熱則生風故曰便是有風兼熱也忽然匿匿慢沉細冷極纏身兼患氣匿匿隱而不現也慢遲也匿慢沉細四脈皆陰諸陰為冷冷即生氣故曰冷疾纏身兼患氣也賊脈頻來問五行賊脈鬼克之脈也如心脈沉細肝脈澀小脾脈弦急肺脈洪大腎脈遲緩又令春脈澀短夏脈沉遲季夏脈弦長秋脈洪散冬脈緩慢是皆賊脈項問五行之克我者是也屋漏雀啄終不治屋漏遲緩而一止也雀啄急數而一止也二者皆為脾氣絶屋漏為脾之陽氣絶陽行速也雀啄為脾之陰氣絶陰行遲也脾主中州灌溉五臟六腑脾家之元陰元陽既絶則十二經俱危矣故曰終不治按經云脈病人不病脈來如屋漏雀啄者死注云屋漏者其來既絶而止時時復起而不相連屬也雀啄者脈來甚數而疾絶止復頓來也又經言得病七八日脈如屋漏雀啄者死注云脈彈人手如黍米也左手寸口心脈歌左手頭指火之子諸家詮注以子字為傳寫之誤非也言醫者以第一食指探病人之左手寸脈乃心脈也陰陽應象大論云南方生熱熱生火火生苦苦生心夫心既為火之所生獨非火之子歟四十五動無他事四十五動無他事者亦當準前九疇之數須得四十五動不易則無他故矣張世賢釋謂其數之動法不依五行相剋非也三十一動忽然沉頓飯卻來還復此凡心脈當取之六菽之重言其浮中即當見也今診得其脈於三十一動止忽然而沉夫沉水也必重手乃見且頓飯之時方得復浮而起夫心火也三十一動以五五除之則余其六六為水之成數以六五除之則余其一一為水之生數合生成之數俱水潔古曰火得水而滅也張世賢謂三十一動輪在肺上肺上見沉乃金生水水漸盛則火滅覺太牽強按經云左手寸口脈偏動乍大乍小不齊從寸口至關關至尺三部之位處處動搖各異不同其人病仲夏傳之此脈桃花落而死春中診得夏須憂夏若得之秋絶體秋脈如斯又準前冬若候之春必死若春中診得此脈則奉長者少矣夏若診得此脈則奉收者少矣秋若診得此脈則奉藏者少矣冬若診得此脈則奉生者少矣張世賢謂三月者天道小變之節亦未必然今則準四氣調神論釋之方合經旨左手中指肝脈歌左手中指木相連脈候須還來一息此言醫者以中指探病人之左手關脈乃肝木也其脈亦須還準前五九之數為一大息則無病二十六動沉卻來肝臟有風兼熱極若診得二十六動上而見一沉則為肝臟有風兼熱極矣何也二十六動以五五除之則余其一一為水之生數以四五除之則余其六六為水之成數合生成之數皆水是母來抑子肝為風木子挾母勢而風熱愈熾故曰肝臟有風兼熱極矣二十九動澀匿匿本臟及筋終絶塞匿匿澀貌澀為金脈肝脈見澀為金來剋木況二十九動上見之以五五除之則余其四四為金之生數以四五除之則余其九九為金之成數合生成之數俱金潔古曰木得金而伐矣夫肝主筋故曰本臟及筋終絶塞也一十九動便沉沉肝絶未聞人救得夫肝為木今見一十九動而沉以二五除之則余其九九為金之成數以三五除之則余其四四為金之生數合生成之數俱金潔古曰木得金而伐矣左手尺部腎脈歌左手腎脈指第三四十五動無疾咎言病人左手尺部醫者以第三無名指探之亦須準前五九四十五動而不歇是無疾咎之脈也按經云左手尺部脈四十動而一止止而復來來逆如循直木如循張弓弦絙絙然如兩人共引一索至立冬死千金方作至立春死指下急急動弦時便是熱風之脈候弦為風木急急動弦為風而兼熱是母挾子勢而為風熱之候也然此病易治為子扶母兮瘥速有餘之證也忽然來往慢慢極腎臟敗時須且救此病多從冷變來療之開破千金口倘診得腎脈忽然來往慢慢而極言遲而又遲也遲則為寒腎為寒水當有既濟之功今腎部而見極遲之脈是純陰無陽其腎臟之敗可知矣然猶有可救之理應知此病多從虛極變而為寒謂之不足其病難已必須大劑溫補未可輕言治療也二十五動沉卻來腎絶醫人無好手努力黃泉在眼前縱活也應終不久夫腎者水也今見二十五動而況以四五除之尚餘其五五乃土之生數以三五除之尚餘其十十乃土之成數合生成之數皆土潔古曰水得土而絶矣其能久乎哉右手寸口肺脈歌右手指頭肺相連四十五動無憂慮急極明知是中風言醫人以食指探病人之右寸乃肺脈也亦須準前五九四十五動而不歇則無憂慮矣若診得其脈患極而弦是為金衰不能制木而風熱愈盛知為中風之候矣按經云右手寸口脈遍沉伏乍小乍大朝來浮大暮來沉伏浮大即太過上出魚際沉伏即下不至關中往來無常時時復來者榆葉枯落而死葉一作莢更看二十餘七度忽然指下來往慢肺冷莫言無大故一朝肺絶脈沉沉染病臥床思此語診得肺脈於二十七動上忽然來往慢慢而遲遲則為寒其肺冷可知矣然不得謂之無大故也倘不以為意於二十七動上一變慢而為沉則肺將絶矣何也二十七動以四五除之尚餘其七七為火之成數以五五除之尚餘其二二為火之生數合生成之數俱火則肺金受傷染病臥床悔將何及也十二動而又不來咳嗽吐膿兼難補髮直如麻只片時扁鵲也應難救獲倘診肺脈於十二動上而又不見其來夫肺金也十二動以二五除之尚餘其二二為火之生數以一五除之尚餘其七七為火之成數合生成之數俱火潔古曰金得火而缺也金被火傷則咳嗽吐膿欲瀉其肺則肺已受傷欲補則反助賊邪及其終也則髮直如麻縱有盧扁有何益焉右手中指脾脈歌右手第二指連脾四十五動無諸疑此言醫者以第二中指探病人右關乃脾脈也亦須準前五九四十五動之數而不歇則不必疑其有疾厄也急動名為脾熱極食不能消定若斯脾脈宜和而緩今則動而急乃脾土為風熱所乘失其運化之機故不能磨谷而消食矣欲知疾患多為冷指下尋之慢極遲脾喜溫而惡寒今診得其脈慢而且遲遲則為寒是知所生之病為冷也吐逆不定經旬日胃氣中心得幾時脾屬土在變動為噦今吐逆不定而經旬日之久旬日十日也土之生數五成數十吐逆自五日以至十日則生成之數俱過而吐猶不定脾敗可知矣脾敗則惡氣沖胃胃之上心也心為君主之官而為惡氣所犯縱生能得幾時也右手尺部命門脈歌右手命門三指下四十五動不須怕一十九動默沉沉百死無生命絶也凡人有五臟六腑或又曰六藏五腑難經固已言之而猶未見其暢達也天有五行水火木金土人有五臟心肝脾肺腎然五行之中各有陰陽合為十干甲丙戊庚壬陽也乙丁己辛癸陰也在人亦有陽陰陰者為臟心肝脾肺腎是也陽者為腑膽胃大腸小腸膀胱是也若然則為五臟六腑矣何以有十二經脈為哉不知天有十干地有十二支人亦有十二臟腑以配天之三陰三陽風熱暑濕燥寒是也故經曰厥陰之上風氣主之中見少陽少陽之上火氣主之中見厥陰所以在人則肝絡膽膽絡肝心包絡三焦三焦絡心胞也又曰太陰之上濕氣主之中見陽明陽明之上燥氣主之中見太陰所以在人則脾絡胃胃絡脾肺絡大腸大腸絡肺也又曰少陰之上熱氣主之中見太陽太陽之上寒氣主之中見少陰所以在人則心絡小腸小腸絡心腎絡膀胱膀胱絡腎也故人之十二經分候於左右手寸關尺之六部浮以候表沉以候里浮以候腑沉以候臟不易之論也然左寸則以候心與小腸矣左關則以候肝與膽矣左尺則以候腎與膀胱矣右寸則以候肺與大腸矣右關則以候脾與胃矣然則心包之與三焦舍右尺奚候焉夫兩尺皆腎也左曰腎右曰命門而手厥陰手少陽寄旺於此夫厥陰風木也少陽相火也手厥陰既為風木故其生克之理亦當與足厥陰肝木同其好惡故訣曰右手命門三指下言醫人以第三指探病人之右尺乃命脈也其脈亦須準前九疇之數四十五動而不歇則手厥陰心包之氣全矣故曰不須怕也若數得一十九動上默然而沉以三五除之尚餘其四四乃金之生數以二五除之尚餘其九九乃金之成數合生成之數皆金則風木之生氣被克故曰百死無生命絶也按劉守真曰經云七節之傍中有小心楊上善注太素曰人之脊骨有二十一節從下第七節之傍左者為腎右者為命門命門者小心也又曰右腎命門小心為手厥陰包絡之藏故與手少陽三焦合為表裡故脈同出見手右尺也指下急急動如弦腎臟有風尤莫治言診得右手命脈急而又急動之如弦夫右尺又主少陽相火少陽乃春生之木相火乃龍雷之火今診得其脈弦而且急是為風火相煽要知火與風皆耗水之物而腎水傷矣故曰腎臟有風尤莫治也七動沉沉更不來努力今朝應是死此言右尺又為命門真火其脈當流利而滑沉今於七動之上沉而又沉不能復來夫七火之成數也於七動上沉而不至則命門之真火絶矣然此一點真火乃人身之根本今既已絶又安得其久待耶診雜病生死候歌五十不止身無病數內有止皆知定前訣以四十五動為準而此訣又以五十動為準者何也蓋前訣以左右手各部中見其有止即於止之數準洪範五九之數以斷死生即潔古論中所謂相勝者死也此訣以脈之大概言但取五臟之氣全與不全以定死生故用大衍之數五十也大抵人身之脈晝夜循環無有巳時脈見一動乃循一臟五動乃循五臟遍五十動是十次五臟而猶循環不已則五臟皆受氣而大衍之數足矣即潔古論中所謂得相生者愈也故曰身無病若於五十動之中忽有一代及至再動每代皆如前數即可依其代數之遠近而定其死期也熊宗立釋中謂四十動一止為腎臟先絶者非也夫人之死豈必從腎先死耶凡診他人脈者須澄心靜氣如七診之法然後以指探病人一手之脈數過五十動不見有止再探病人一手之脈亦數過五十動不見有止然後以指當部推求每部須數過四十五動不見有止方無大故若或一手或兩手或一部或幾部中有歇指處即從此歇指後第一動數起看是幾動一止謂有常數謂無常數以斷其吉凶要知一手候過五十動兩手則百動矣又於一部候過四十五動六部共計二百七十動矣並前百動計共三百七十動更欲候其表裡陰陽虛實寒熱其間工夫正自不少何以今之診脈者將手探脈未一茶頃便曰我已得其情矣且自衒其純熟以欺愚蒙不知脈之形狀即可純熟而知脈之至數不可以純熟而促以此欺人實自欺也後之君子其勉之哉四十一止一臟絶卻後四年多沒命三十一止即三年二十一止二年應十五一止一年殂以下有止看暴病脈經云脈來五十動而不止者五臟皆受氣即無病四十動而一止者一臟無氣卻後四年死以至十動一止者四臟無氣歲中死此王氏脈經也正與此訣相為表裡奈何戴起宗復引經文而疑之曰腎絶六日死肝絶八日死心絶一日死果此藏氣絶又安能待四歲三歲乎斯言一開至使後人並脈經而疑之矣不知五臟之中有精有氣有神有先天元陰後天元陰先天元陽後天元陽非止於血肉之形質已也脈訣與脈經所言乃五臟無形之精氣不能流動充滿年月日久漸次損壞以至有形而後死故於數歲之前脈上而即見止也故經曰四十動一止一臟無氣以至十動一止為四臟無氣戴起宗不善讀書而以一臟無氣之氣字誤認為有形之敗壞則誤矣至於內經所言腎絶六日死肝絶八日死心絶一日死者乃五臟之精氣神或為七情或為六欲或為六淫一時暴傷而絶故又曰以下有止看暴病非所論於此也診暴病歌兩動一止即三四三動一止六七死四動一止即八朝以此推排但依次池氏曰暴病喜怒驚恐其氣暴逆致風寒暑濕所侵病生卒暴損動胃氣而絶即死不過數日也脈兩動而一止乃胃氣將絶猶得三四日方死三動而一止乃胃氣將盡猶得六七日穀氣絶盡方死仿此而推若至十五動而一止乃死期在於一年也張世賢曰脈兩動而見一代其人死期三四日間三動而見一代死期六七日間四動而見一代死期八日以此推之一動得兩日之數其故何也十干系五行也五行有陰陽金木水火土陰陽各得兩日二氏之説皆為有理愚謂前訣言常病是五臟無形之元氣漸漸損傷以至有形之物敗壞故以幾臟無氣斷死期之遠近此訣言暴病是五臟有形之物依然乃五臟無形之元氣暴絶故以幾臟尚存之氣斷死期之遠近何也蓋以脈一動循行一臟脈五動循行五臟今云二動而脈一代則三臟之氣已絶故曰三四日死若三動而脈一代則為二臟之氣已絶故曰六七日死若脈四動而一代則為一臟之氣已絶尚可延至八日而死也形證相反歌健人脈病號行尸即如前訣所云春中診得夏須憂之類又如前訣所云四十一止四年三十一止三年之類人雖無病而脈已病死期不遠而步履如常故名曰行尸耳病人脈健亦如之如病泄瀉失血産後形容羸瘦脈反見洪大而數健者為病脈相反亦死證也又經曰形肉已脫九候雖調猶死也長短瘦肥並如此細心診候有依稀張世賢釋云長人脈短短人脈長肥人脈小瘦人脈大皆為死候亦未必然何也夫長人脈短則誠是矣若云短人脈長肥人脈小瘦人脈大比比皆然而未見其死也前脈賦中男女長幼大小已詳言之矣不若吳文炳釋曰肥脈沉結瘦脈長浮人短脈促人長脈長違反不和者死此説為當診四時病五行相剋歌春得秋脈定知死死在庚申辛酉里春旺木其脈弦長秋旺金其脈澀短春得秋脈金來剋木況庚申辛酉皆金旺日故知必死夏得冬脈亦如然還與壬癸為期爾夏旺火其脈浮洪冬旺水其脈沉實夏得冬脈水來剋火況壬癸子亥皆水旺日故知必死嚴冬診得四季脈戊己辰戌還是厄冬旺水其脈沉實土旺四季其脈緩大冬得四季之脈土來剋水況戊己辰戌皆土旺日故知必死秋得夏脈亦同前為緣丙丁相形克秋旺金其脈澀短夏旺火其脈洪大秋得夏脈火來剋金況丙丁巳午皆火旺日故知必死季月季夏得春脈克在甲寅病應極值逢乙卯亦非良此是五行相鬼賊季月辰戌丑未月也季夏即未月也季月乃土寄旺之月季夏乃土旺之時土旺四季其脈緩木旺春其脈弦於季月季夏診得其脈弦長乃木來剋土況甲寅乙卯皆木旺日故知必死診四時虛實歌春得冬脈只是虛更兼補腎病自除若得夏脈緣心實還應瀉子自無虞張世賢曰經雲實則瀉其子虛則補其母夏秋冬脈皆如是在前為實後為虛張世賢曰夏秋冬之所診皆如春法從前來者為實邪從後來者為虛邪春中若得四季脈不治多應病自除張世賢曰春中二月分也四季脈脈緩大也於二月中而得四季之脈乃妻來乘夫謂之微邪況二月乃木帝旺之時故不治自愈傷寒歌傷寒熱病同看脈滿子透關洪拍拍出至風門過太陽一日之中見脫厄過關微有慢騰騰直至伏時重候覓張世賢曰寒者冬氣也冬時嚴寒萬類深藏君子固密不傷於寒觸冒之者乃名傷寒傷寒不即病者其寒毒藏於肌膚中至夏至前變為溫病夏至後變為熱病然其發起皆傷寒所致也故看脈之法相同洪拍拍即洪驚也傷寒之病一日巨陽二日陽明三日少陽四日太陰五日少陰六日厥陰六日傳經已畢其病當愈七日不愈邪應復傳其脈洪大而透過三關從風門穴而出過於太陽之經其邪欲散一日之中當得汗而愈矣其脈過關微帶緩慢其邪至太陽亦遲日間不汗直至伏時再等候其汗也伏時即臨臥時也承日中而言掌內迢迢散漫行干瘥疼疔多未的他本無此二句大凡當日問程途遲數洪微更消息張世賢曰傷寒熱病未汗脈須浮洪既汗脈當安靜散漫之脈不汗而愈其平復未可全許也愚按傷寒一證謂之大病與雜病不同變幻多端疑似不一學者須要整等時日另下工夫潛心仲景之書熟玩節庵之論訪之時賢執之專門庶不負為人之司命也豈古人立三百九十七法一百一十三方反不如今人之便捷也奈今之醫者不讀仲景之書不採諸賢之論幾句油腔一味活套便曰我能治傷寒矣及乎臨證則茫無所措強以雜病之法治之所以當汗不汗不當汗而汗當下不下不當下而下誤人豈淺鮮哉即以古人尚論之亦尺有所短寸有所長傷寒一證乃仲景所長非叔和所長也夫孔子非不知樂也但不若師曠之聰耳孔子非不知射也但不若養由之神耳叔和非不知傷寒也但不若仲景之聖耳故叔和於傷寒數則不甚暢明或以年遠頗有錯簡此正不必為叔和諱也豫故於此訣亦不敢為詮釋姑存之以俟後之高明者又歌曰熱病須得脈浮洪細小徒費用神功診陰病見陽脈者生陽病見陰脈者死此傷寒之大法也若診得其脈細小是陽病得陰脈者死矣汗後脈靜當便瘥喘熱脈亂命應終汗後邪退脈當平靜今身反大熱而喘脈躁疾而亂此名陰陽交交者死陽毒歌陽毒健亂四肢煩面赤生花作點斑狂言妄語如神鬼下利頻多喉不安汗出遍身應大瘥魚口開張命欲翻有藥不辜但與服能過七日便能安池氏曰陽證宜汗而解之如失汗則邪傳入藏瘀熱在裡不散致病健亂煩躁面赤發斑狂言妄語如見鬼神下痢瘀血如此危證病傳在裡不當汗又加之遍身自汗口如魚口開強者死能過七日乃過經陽熱退方有可救之理池氏之言如此豫曰不然夫陽毒之為病也非由表而傳入於裡也乃陽邪熱毒一時表裡俱傷如面赤健亂而發斑點乃陽毒攻其表也狂言妄語下痢乃陽毒攻其里也內外俱為陽毒所傷若得汗出則亢龍有悔應豁然病退而大瘥矣汗出而病猶不瘥及魚口氣粗則正不勝邪而命欲翻矣然而陽病易已不可謂其必死而勿加救療也如解毒化斑之劑不妨與服倘能延過七日則可生矣過七日則陽極而陰生所謂七日來復是也陰毒歌陰毒傷寒身體重背強眼痛不堪任小腹急痛口青黑毒氣衝心轉不禁四肢厥冷惟思吐不利咽喉脈細沉若能速灸臍輪下六日看過見喜深陰毒傷寒者非傳入之陰乃陰毒之氣一時表裡俱傷也如身重背強眼痛口青黑四肢厥冷乃陰毒攻於表也小腹痛氣衝心思吐而咽喉不利乃陰毒攻於裡也內外俱為陰毒之氣所傷然陰病難已當灸丹田以回陽抑陰況六日則陰已極矣過此不死延至七日則一陽來復或可望其生云按活人書云陰毒脈疾七至八至以上疾不可數者正是陰毒已深也六脈沉細而疾尺脈短小寸口脈或大若誤服涼藥則渴轉急有此之證者便急服辛熱之藥一日或二日便安若陰毒漸深其候沉重四肢逆冷腹痛轉甚或咽喉不利心下脹滿結硬燥渴虛汗不止六脈俱沉細而疾一息七至以來有此證者速於氣海關元二穴灸三二百壯以手足和暖為效仍兼服正陽散又按劉守真云然既脈疾七至八至以上疾不可數者正是陽熱極甚之脈也世俗妄傳陰毒諸證以素問驗之皆陽熱亢極之證但熱於內在裡極深身表似其陰寒者也及夫經云亢則害承乃制也謂五行之道實甚則過極則反以克己者也是謂兼化如萬物熱極而反出水液以火鍊金熱極而反化為水是以火極而反以水化也雜病生死歌腹脹浮大是出厄虛小命殂須努力腹脹之病有寒有熱有虛有實有久有暴病證不同治法各異大抵皆由於陽氣外虛陰氣內積診得其脈浮大則陽氣尚不甚虛陰氣猶不甚積且諸陽為表陽氣易已故曰出厄若脈虛小則脾胃已虛病當在裡諸里為陰陰病難已故曰命殂按巢氏病源曰腹痛者由陽氣外虛陰氣內積故也陽氣內虛受風冷邪氣風冷陰氣也冷積於臟腑之間不散與脾氣相壅虛則脹故腹滿而氣微喘診其脈右手寸口氣口以前手陽明經也脈浮為陽按之牢強謂之為實陽實者病腹滿氣喘嗽左手關上脈足少陽經也陰實者病腹脹滿煩擾不得臥也關脈實則腹滿響關上脈浮而大風在胃內腹脹急心內淡淡食欲嘔逆關脈浮腹滿不欲食脈浮為是虛滿左手尺中神門以後脈足少陰經沉者為陰陰實者病苦小腹滿左手尺中陰實者腎實也苦腹脹善鳴左手關後尺中脈浮為陽陽實者膀胱實也苦少腹滿引腰痛脈來外澀者為奔腹脹滿也病苦腹滿而喘脈反滑利而沉皆為逆死不治腹脹脈浮者生虛小者死其湯尉針石別有正方下利微小卻為生脈大浮洪無瘥日下利之證雖在脾腎其見證在於大腸大腸屬庚金脈若微小則火猶不甚而庚金無傷故曰生若遇浮大而洪則為丙火來克庚金其邪方熾故曰無瘥日也按儒門事親云腸澼下膿血脈沉小流通者佳數疾且大有熱者死經云腸澼便血身熱則死寒則生又云腸澼下白沫脈沉則生浮則死又云腸澼下膿血脈懸絶則死滑大則生又云腸澼之屬身熱脈不懸絶滑大者生懸澀者死以藏期之又云腸澼筋攣其脈小細安靜者生浮大緊者死洞泄食不化不得留下膿血脈微小速者生緊息者死又云泄注脈緩明小結者生浮大數者死恍惚之病定癲狂其脈實牢保安吉寸關尺奇沉細時如此未聞人救得五十九難曰狂癲之病何以別之然狂之始發少臥而不飢自高賢也自辨智也自貴倨也妄笑好歌樂妄行不休是也癲病始發意不樂直視僵仆其脈三部陰陽俱盛經言如此所謂陰陽俱盛者即訣所謂實牢也若寸關尺部沉細是於三部陰陽俱盛相反則正氣已衰故云未聞人救得也戴起宗脈訣刊誤復引難經重陰為癲謂陰部內見沉澀微短脈是陽脈不見而陰獨盛故為癲疾殊失難經之旨矣何也據刊誤之意盛字當作甚字若仍作或字則非沉澀微短可知矣按二十難云重陽者狂重陰者癲疑於五十九難中錯簡者脈經云診得癲疾虛則可治實則死又云癲疾脈實堅者生脈沉細小者死又云癲疾脈搏大滑者久久自已其沉小急實不可治小堅急亦不可治巢氏病源云脈虛則可治實則死又云緊弦實牢者生脈細小者死消渴脈數大者活虛小命殂厄難脫數大者陽有餘而陰不足尚可補陰以配陽若脈虛小則陰陽俱虧求其厄脫不亦難乎按經云消渴脈數大者生細小浮短者死又云消渴脈沉小者生實堅大者死水氣浮大得延生沉細應當是死別經云少陰何以主腎腎何以主水曰腎者至陰也至陰者盛水也肺者太陰也少陰者冬脈也故其本在腎其末在肺皆積水也又曰腎何以能聚水而生病曰腎者胃之關也關門不利故聚水從其類也上下溢於皮膚故為胕腫胕腫者聚水而生病也經言如此究之由於脾土虛弱不能制腎水以至泛濫皮膚而為病若脈浮大尚有可生之理蓋浮屬風大屬火風與火皆能耗水況浮大為陽陽病易已脈若沉細沉細為陰水則水愈橫流而土愈飄沒其不至於死也蓋亦鮮矣按脈經云水病脈洪大可治微細者不可治之雲水病脹閉其脈浮大軟者生沉細虛小者死又云水病腹大如鼓脈實者生虛者死霍亂之候脈微遲氣少不語大難醫三部浮洪必救得古今課定更無疑巢氏病源曰診其脈來代者霍亂又曰脈代而絶者亦霍亂霍亂脈大可治微細不可治霍亂吐下脈遲氣息劣口不欲言者不可治觀巢氏之説正與脈訣相符非為臆説戴起宗刊誤謂脈經所無以脈訣為自創之例何其謬哉而刊誤所論皆循紙上筌蹄並未臨證消息之耳夫霍亂者乃冷熱不和清濁相干以致卒然心腹絞痛其疾揮霍撩亂故名霍亂其始發也則亂於裡甚則手足厥逆而脈沉伏不足為怪將解則循手足陽明之竅以出在上則吐在下則瀉其脈漸復而出矣若不吐不瀉脈亦不出手足厥逆目閉而不欲言此為陰霍亂乃危證也若內服大溫之劑外用灸關元氣海之法亦有能活者鼻衄吐血沉細宜忽然浮大即傾危血虛脈虛理也今吐衄二病皆失血之證也血既去其脈當沉細無力今反見浮大浮大屬火乃火逼血而錯經妄行無巳時也病人脈健不用治健人脈病號行尸所謂不用治者乃不治自愈也前訣形證相反歌云健人脈病號行尸病人脈健亦如之所謂亦如之者即內經所云形肉已脫九候雖調猶死也此訣所云正恐後人滯於前訣而復歌曰病人脈健不用治健人脈病號行尸亦得經所云形肉有餘脈氣不足死脈氣有餘形肉不足生又仲景曰脈病人不病名曰行尺以無生氣卒眩僕不識人則死人病脈不病名曰內虛以無穀神雖因無苦刊誤亦知有此二説乃不為此訣之釋而故為前訣之釋其偷心為何如也按脈經云人病脈不病者生脈病人不病者死心腹痛脈沉細宜浮大弦長命必殂巢元方曰心腹痛者由臟腑虛弱風寒客於其間邪氣發作與正氣相擊上衝於心則心痛下攻於腹則腹痛上下相攻故心腹絞痛氣不得息診其脈左手寸口人迎以前脈手少陰經也沉者為陰陰虛者病苦心腹痛難以言心如寒伏心腹㽱痛不得息脈沉小者生大𩊅疾者死心腹痛脈沉細小者生浮大而疾者死刊誤引用巢氏病源而不及此是誠何心哉按經云心腹痛痛不得息脈細小遲者生堅大疾者死頓痛短澀應須死浮滑風痰必易除頭為諸陽之會其痛因不一也短澀為陰脈故非所宜若脈見浮滑浮則為風滑則為痰驅逐風痰其病自已故曰必易除也按經言形脈與病相反者死奈何然病若頭痛目痛脈反短澀者死中風口噤遲浮吉急實大數三魂孤巢氏病源曰諸陽經皆在於頭三陽之經並絡入頷頰夾於口諸陽為風寒所客則筋急故口噤不開也診其脈遲者生準繩云風邪中人六脈多沉伏亦有脈隨氣奔指下洪盛者遲浮吉堅大急疾凶大抵中風之證風火居多紺珠經曰以火為本以風為標心火暴甚腎水必衰肺金既摧肝木自旺如脈浮而遲浮則風猶在表遲則火猶不熾故以為吉若急實大數則風火熾盛而中藏入里矣其病必凶也魚口氣粗難得瘥面赤如妝不久居脈經云病人口如魚口不能復閉而氣出多不反者死是人身之元氣不得歸於丹田奔越而上故口如魚口而氣粗也面赤如妝者虛陽載上也中氣髮直口吐沫張世賢曰發乃血之餘心不能生血發必焦枯梗直涎乃脾之液脾絶則涎不收攝故涎從口中吐出也噴藥悶亂起復蘇晞範曰咽主咽物咽為胃之系下連胃脘為水穀之道路胃經為風痰所擾悶亂而藥不下咽噴吐於其外豈可望有蘇醒之期張世賢釋起當作豈愚謂亦不必改訣之意皆言有時悶亂有時蘇醒暫開復閉終為不起之證也咽喉拽鋸水雞響咽喉者氣之道路也風痰壅塞道路窒礙故作水雞之聲也搖頭上竄氣長噓凡人之頭猶木之梢火之尖也風火相煽故搖頭上竄張世賢曰氣長噓出多入少皆真元散失之候也病人頭面青黑暗青屬肝黑屬腎倘色明潤猶有可生之理更加慘暗則肝腎已絶矣汗透毛端恰似珠經曰六陽氣俱絶者則陰與陽相離陰陽相離則腠理泄絶汗乃出大如貫珠轉出不流則氣先死眼小目瞪不須治經云睛不轉而仰視此太陽已絶詐汗如油不可蘇別本詐字為作字若依油字義當作榨汗言陰陽相離逼迫其汗以外泄如油之滑而不流也已其並中風死候也內實脹腹痛滿盈心下牢強幹嘔頻手足煩熱脈沉細大小便澀死多真肚腹脹滿而痛心下牢強而嘔手足煩熱而大小便澀池氏謂其內實結絶氣不宣通若脈大有力下之猶有可生之理今脈反見沉細則又不可下是陽證而見陰脈也死可知矣外實內熱吐相連下清注谷轉難安忽然診得脈洪大莫費神功定不痊外實者表實而無汗則熱氣不得外泄而內迫腸胃迫於胃故嘔迫於腸故下利清穀腸與胃手足陽明也陽明為燥金反見洪大之脈是火來剋金鬼克之邪也望其痊也難矣張世賢曰既瀉之後脈當細小反得洪大此為不治之證勿聽子以內熱字疑為冷字非也內外俱虛身冷寒汗出如珠微嘔煩忽然手足脈厥逆體不安寧必死拼勿聽子曰陰盛陽絶則外寒故汗出如珠而不流無陽則四肢逆冷致脾胃無所養故嘔煩此惡候也問得脈實而滑尚有可生之理謂陰病見陽脈者生也愚謂身體手足冷而厥且汗出不止此陽將脫也若人安靜而不嘔煩脈雖弱而不至懸絶猶可溫而興也加以煩躁不寧而嘔則又不可以用辛溫之劑不死奚待也按脈經云內外俱虛身體冷而汗出微嘔而煩擾手足厥逆體不安靜者死上氣喘急候何寧手足溫暖淨滑生反得寒澀脈厥逆必知歸死命須傾巢元方曰肺主於氣若肺氣虛實不調或暴為風邢所乘則腑臟不利經絡痞澀氣不宣和則上氣也又曰喘息低抑其脈滑手足溫者生澀而四末寒者死也愚按上氣喘息之人手足寒者十居其半若脈不大不小得湯火而手足即溫其氣稍緩者未必盡死若手足寒而脈澀小得湯火而猶寒者其死無疑矣按脈經云上氣喘息仰昂其脈滑手足溫者生脈澀四肢寒者死又云上氣脈數者死謂其形損故也又云上氣注液其脈虛寧寧伏匿者生堅強者死又云寒氣上攻脈實而順滑者生實而逆澀則死注太素云寒氣暴上滿實如何曰實而滑則生實而逆則死矣其形盡滿如何曰舉形盡滿者脈急大堅尺滿而不應如是者順則生逆則死何為順則生逆則死曰所謂順者手足溫也謂逆者手足寒也咳而尿血羸瘦形其脈疾大必難任巢氏曰肺咳之狀咳而喘息有音聲甚則咳血又曰心主血與小腸合若心家有熱結於小腸故小便血也愚謂咳心火乘肺也尿血心火傳於小腸也咳而尿血以至羸瘦則病已劇矣倘脈緩而小則金不受火克而咳可已肺為水之上源源清則流潔而尿血可愈形雖羸瘦猶有望其生也今脈反見疾大則火愈熾而咳愈增而小便愈血欲其生也難矣唾血之脈沉弱吉忽若實大死來侵唾血與前鼻衄吐血不同前之吐血為嘔吐之吐此之唾血為唾中見血聖濟總録論曰邪熱熏於肺則損肺恚怒氣逆傷於肝則損肝肺肝傷動故令人唾血如唾中有若紅縷者屬肺藏如脅下先苦痛而後唾血者屬肝經俱可折而治之用紫菀湯蒲黃散巢氏病源復有關上脈微芤為傷肝以唾血脈沉弱者生牢實者死按脈經云吐血衄血脈滑小弱者生實大者死又云唾血脈緊強者死滑者生又云吐血而咳上氣其脈數有熱不得臥者死上氣浮腫肩息頻浮滑之脈即相成忽然微細難應救神功用盡也無生巢氏病源曰肺主於氣候身之皮毛而氣之行循環臟腑流通經絡若外為邪所乘則膚腠閉密使氣內壅與津液相併不得洪越故上氣而身腫也經云上氣面浮腫肩息其脈大不治加利必死今訣云微細難救似與脈經相悖不知脈經所云大不治者以其上氣浮腫屬肺病浮大屬火火能剋金故云大不治加利必死者利則大腸亦病臟與腑俱傷庚與辛俱絶也今訣所云浮滑相成者浮則為風滑則為痰風痰上攻壅塞氣道去其風痰則上氣自平矣若微細則元陽之氣衰於下無根之氣逆於上欲其救也難矣中惡腹脹緊細生若得浮大命逡巡巢元方云中惡者是人精神衰弱為鬼神之氣卒中之也夫人陰陽順理榮衛調平神守則強邪不干正若將攝失宜精神衰弱便中鬼毒之氣其狀卒然心腹刺痛悶亂猶死凡卒中惡腹大而滿者診其脈緊大而浮者死緊細而微者生又中惡吐血數升脈沉數細者死浮焱如疾者生脈經云卒中惡吐血數升脈沉數細者死浮大疾快者生又曰卒中惡腹大四肢滿脈大而緩者生緊大而浮者死緊細而微者亦生愚按中惡乃陰邪之氣也夫里陰也血陰也先入里而傷血從其類也故經云中惡吐血數升脈沉數細者死受鬼毒之氣陰血既傷邪氣當循竅而出今脈反沉細而數沉細則陰已大傷數則毒猶在裡故曰死也若浮大疾快邪氣已出而內無遺留故曰生也經中又云卒中惡腹大四肢滿脈大而緩者生緊大而浮者死緊細而微者亦生正與此訣相合夫中惡而至腹脹邪已在裡若脈緊細則毒猶不甚故曰生若脈浮大則既傷其陰復戕其陽安得而不命逡巡也或難曰上文既雲浮大疾快者生又曰緊大而浮者死何前後之相違也不知前所云者其血吐則毒氣循竅而外出故脈宜浮大疾快後所云者腹脹四肢滿毒在裡緊大而浮者死緊細而微者亦生緊大而浮既傷其陰復傷其陽也緊細而微者陰陽猶不甚也金瘡血盛虛細活急疾大數必危身凡遇金瘡之證須審去血盛與不盛如去血不盛其脈不必定欲虛細也張世賢曰金瘡刀刃所傷之瘡也血盛去血多也血既出多脈當虛細反得急疾數大風熱乘之其身之所以危也按經云金瘡血出太多其脈虛細者生實數大者死又云金瘡出血脈沉小者生浮大者死又云斫瘡出血一二石脈來大二十日死又云斫刺俱有病多少血出不自止者七日死滑細者生又按金瘡一證最為切要如兩人相爭其人自刎其頸性命在於頃刻兩家之存亡系焉倘能救活其功不小金瘡之方最多求其萬全蓋亦鮮矣庸醫無指每用活雞皮敷之究無一效後余求得一方屢試屢驗將藥一上其痛立止其血立止真奇方也況藥品平常易制如人刎頸氣顙已斷將絲線縫攏以藥末摻之將軟絹圍定不過數次即能痊活故不敢閉天之寶謹以告諸同人其方用生松香為末六兩生半夏為末四兩二共再碾候用至於些小金瘡不足論矣凡脈尺寸緊數形又似叉直吐轉增此患蠱毒急須救速求神藥命應停按蠱字從蟲從皿是合聚蟲蛇之類以器皿盛之任其相啖食餘一存者名為蠱能變化為毒害人有事之者以毒害人多因飲食內行之中其毒者其狀心痛如被物齕或時面目清黃變化無常先傷於膈上則吐血食人五臟下血瘀黑如爛雞肝如不急治之食臟腑至盡則死診其脈尺寸緊數是其候也旦起取井花水未食前當令病人唾水內唾如柱腳直下沉者是蠱毒沉散不至下者是草毒治之之法如敗鼓皮石榴皮苦瓠瓤胡荽根車轄脂刺蝟皮牡丹根胡荽子蚯蚓之類按方治之或有生者張世賢釋謂叉直如轉索肝氣盛也吐轉增脾氣衰也木盛則脾絶其死定無疑其説恐亦未當按經云三部脈堅而數如銀叉股蠱毒病必死數而軟蠱毒病得之生中毒洪大脈應生細微之脈必危傾吐血但出不能止命應難返沒痊平熊宗立將此訣連屬上文非也上四句言中蠱毒此四句言中飲食藥餌之毒其意蓋曰凡中毒者其脈若洪大則本人之元氣尚能勝毒故曰生脈若沉細則本人之元氣不能勝毒故曰危也若吐血不止則不論脈之洪大沉細即當以死斷之何也心為君其主血脈毒雖中而未見血則毒在腸胃其毒尚緩或吐或下而解矣若吐血不止則毒直犯心君則其死必矣戴氏謂他證失血皆以沉細為生惟中毒吐血以洪大為生其誤甚矣按經云人為百藥所中傷脈浮澀而疾者生微細者死洪大而遲者生
