body:
  text: 卷一脈訣辨惑論脈訣之來舊矣今復有議其非者何也以其言淺而意深也惟其言淺故厭常喜新之徒乃以訣為不足法反出言以詆譭之惟其意深故冒昧鮮識之徒隨衆附和望洋而退避之是以王氏之説終不明而為脈訣之一大厄也余幼自孩提即聞先大人嘗誦此訣長而二十有四惟儒業是親先大人見余羸弱而多疾也因命余改儒而就醫意蓋欲其自利而利人也及執經之日戒之曰醫誠不易惟脈尤難他如崔紫虛滑伯仁李瀕湖及諸家之撰雖各有可觀終為及肩之牆耳豈若叔和脈訣中邊皆甜誠醫門之乳海也但以諸家注釋各有短長有失作者之旨致使後學永墮疑山汝當學時只宜參究本文勿拘舊釋倘從自己胸中體帖出來方與古人相晤對也余因謹遵嚴命即自手録脈訣本文一卷刪其注釋熟讀而詳玩之即於虛字剩句亦必細心理會不敢輕放於意所已明者則中心藏之於意所未明者然後檢閲諸家注釋其詮之善者則選之其不善者則姑置之而復參究本文其中有以數日而得其旨者有以數月而得其旨者有以數年而後得其旨者噫夫脈訣之理淵微如此毋怪平冒昧淺識之徒不得其門而入也而説者有曰王氏但有脈經而無脈訣訣乃高陽生謬言也而余曰非也經固王氏之經訣亦王氏之訣耳夫經者叔和集諸家之説以成一書有纘緒祖述之功訣則出叔和素所徵驗者而成一書有得心應手之妙要之皆王氏之書也及乎脈訣出而天下古今膾炙人口言言皆妙字字入微雖白叟黃童咸知有此幾與日月爭光矣如果出於高陽生者何不自署其書曰高陽氏之書而甘遜其美於王氏也夫所謂高陽生之謬言實無考據好事者為之耳即借有所謂高陽生者亦不過取叔和之心法而復歌詠之以便世之流通云爾只如素問靈樞固軒岐之書也然不盡軒岐之文何以知之試觀尚書諸篇語多簡煉況軒岐又在唐虞之上則其文之朴略可知其所以得如是之純粹華美者乃漢儒取其文而潤澤之始可通乎流俗豈亦將曰內經為漢儒之偽造而非軒岐之書可乎或又難曰子既取法軒岐則必以內經為準矣其內經脈要精微論有曰尺內兩傍則季脅也尺外以候腎尺裡以候腹中附上左外以候肝內以候膈右外以候胃內以候脾上附上右外以候肺內以候胸中左外以候心內以候膻中前以候前後以候後上竟上者胸喉中事也下竟下者少腹腰股膝脛足中事也經言如此夫經之所謂尺者即今之所為尺部也經之所謂中附上者即經之所為關部也經之所謂上附上者即今之所為寸部也惟其寸居上故以之候心與肺惟其尺居下故以之候腎與腹今子而遵脈訣之法是心與小腸同候左寸肺與大腸同候右寸夫心肺在上其於寸部候之宜矣至於小腸大腸居於至下而欲候於至高之上其與經旨不大相背謬乎余曰然據子所言脈必本諸內經其診法當以脈要精微論為準是凡在上者必候於寸凡在下者必候於尺矣獨不觀脈要精微論中又曰診得心脈而急此為何病病形何如岐伯曰病名心疝少腹當有形也帝曰何以言之岐伯曰心為牝藏小腸為之使由此觀之即一篇之中尚不拘於上下之區字況平人氣象論有曰寸口脈中手長者足脛痛又曰寸口脈沉而弱者疝瘕小腹痛其靈樞始終篇以人迎一盛二盛三盛候手足六陽以脈口一盛二盛三盛候手足六陰然亦未嘗拘於上下左右也若必執一而論則軒岐之書豈自相背謬乎哉然子之為是言者乃惑於戴起宗之邪説而吠影吠聲之徒相率而倡和之以為脈訣不足法實叔和之罪人也如果不足以為法則從上諸大名醫每著書立説多引其訣以為證故王海藏著此事難知其首即曰醫之可法者有十而脈訣居其一焉夫海藏豈無所見而云然哉大抵學醫而不熟玩王氏脈訣縱博採諸書終非正統故先大人諄諄告戒命之曰乳海夫乳者言其開食必先海者言其含蘊無盡也余故不惜管窺逐節疏釋俾古聖先賢之學昭著詳明而後之君子勿蔽邪説仍命其書曰乳海云脈賦欲測疾兮死生須詳脈兮有靈今之為醫者每斷人之死而亦未嘗死斷人之生而亦未嘗生者何也特未於其脈細心詳究之耳如果細心詳究則死生之期尚可斷之以年月日時脈又何嘗無靈哉左辨心肝之理右察脾肺之情此為寸關所主謂候心脈當於左寸候肝脈當於左關候肺脈當於右寸候脾脈當於右關也腎即兩尺分並五臟俱一而腎獨有二為牝藏也居於下焦故分候兩尺雖有水火之別然總之皆腎雖分而實並也三部五臟易識七診九候難明此承上文左右手寸關尺三部之中而候心肝脾肺腎之五臟此人所易曉也至於七診九候欲求其明之者則亦難矣試以三部五臟七診九候言之古之所謂三部五臟七診九候非今之所謂三部五臟七診九候也按內經三部九候篇云天地之至數始於一終於九焉一者天二者地三者人三而三之三三者九以應九野故人有三部部有三候以決死生以處百病以調虛實而除邪疾帝曰何為三部岐伯曰有下部有中部有上部各有三候三候者有天有地有人也必指而導之乃以為真上部天兩額之動脈上部地兩頰之動脈上部人耳前之動脈中部天手太陰也中部地手陽明也中部人手少陰也下部天足厥陰也下部地足少陰也下部人足太陰也故下部之天以候肝地以候腎人以候脾胃之氣帝曰中部之候奈何岐伯曰亦有天亦有地亦有人天以候肺地以候胸中之氣人以候心帝曰上部以何候之岐伯曰亦有天亦有地亦有人天以候頭角之氣地以候口齒之氣人以候耳目之氣三部者各有天各有地各有人三而成天三而成地三而成人三而三之合則為九九分為九野九野為九藏故神藏五形藏四合為九藏五臟已敗其色必夭夭必死矣帝又曰何以知病之所在岐伯曰察九候獨小者病獨大者病獨疾者病獨遲者病獨熱者病獨寒者病獨陷下者病岐伯又曰形肉已脫九候雖調猶死七診雖見九候皆從者不死所言不死者風氣之病及經月之病似七診之病而非也故言不死若有七診之病其脈候亦敗者死矣必發噦噫經言如此是於九候之中而復有七診之法也今之所謂三部非古之頭手足之三部乃寸關尺之三部也今之所謂七診非古之所謂獨大獨小獨疾獨遲獨熱獨寒獨陷下之七診也乃一定其心存其神二忌外意無思慮三均呼吸定其氣四輕指於皮膚之間探其腑脈五微重於肌肉之間取其胃氣六沉指於骨上取其臟脈七察病人脈之息數往來是為七診之法也今之所謂九候非古之所謂頭候天地人手候天地人足候天地人之九候也乃寸取浮中沉關取浮中沉尺取浮中沉之九候也要之古人診脈不專於手之寸關尺部凡頭面手足之動脈悉皆診之然不得尊今而廢古亦不得非古而是今合古今之法而用之斯過半矣晝夜循環營衛須有定數今之為醫者動言營衛及問其營衛之所以行則又茫然如是而欲識病之表裡陰陽蓋亦難矣夫營者血也陰也衛者氣也陽也此人所共曉者也惟營行脈中衛行脈外一日一夜各五十周於身世人每昧於衛行脈外之旨謂衛氣隨營氣而行於外不知營自行營之道衛自行衛之道衛實不隨營氣而行也試先以營氣之行言之內經營氣篇黃帝曰營氣之道內谷為寶谷入於胃乃傳之肺流溢於中布散於外精專者行於經隧常營無已終而復始是謂天地之紀故氣從太陰出注手陽明上行注足陽明下行至跗上出大指間與太陰合上行抵髀從髀注心中循手少陰出腋下臂注小指合手太陽上行乘腋出䪼內注目內眥上巔下項合足太陽循脊下尻下行注小指之端循足心注足少陰上行注腎從腎注心外散於胸中循心主脈出腋下臂出兩筋之間入掌中出中指之端還注小指次指之端合手少陽上行至膻中散於三焦從三焦注膽出脅注足少陽下行至跗上復從跗注大指間合足厥陰上行至肝從肝上注肺上循喉嚨入頏顙之竅究於畜門其支別者上額循巔下項中循脊入骶是督脈也絡陰器上過毛中入臍中上循腹裡入缺盆下注肺中復出太陰此營氣之所行也逆順之常也至於衛氣之行則不然衛出下焦亦晝夜五十周於身但於晝則行陽二十五於夜則行陰二十五自日出而陽隆之時曰加房宿蓋卯時也漏水下一刻從足手太陽行起水下二刻行足手少陽水下三刻行足手陽明水下四刻行於陰分水下五刻復行足手太陽水下六刻復行足手少陽水下七刻復行足手陽明水下八刻則又復入陰分如此周而復始至漏水下五十刻人氣行於陽二十五周日入而陰隆之時曰加畢宿蓋酉時也方行入陰分初從足少陰行起次手少陰次手太陰次足厥陰次足太陰又復行足少陰又復行手少陰又復行手太陰又復行足厥陰又復行足太陰如此周而復始至漏水下百刻行陰亦二十五周並晝行陽二十五周亦共五十周於身此衛氣之所以行也至於衛氣之合歲月日時星宿度分漏水刻數細觀衛氣行篇伯高之語自可見矣奈後世之人注圖立説每以衛氣隨營氣而行者是昧於營在脈中衛在脈外之旨耳不知經文所云衛在脈外者非隨營氣而行於外也乃晝行陽二十五周夜行陰二十五周之謂也或難曰經文中有營氣篇是營中亦有氣矣而子獨謂衛不入經隧之中豈營中獨無氣歟余曰非也經云清者為營濁者為衛夫衛猶風也營猶水也營血行於經隧之中固賴氣以行之亦水由地中行也夫江淮河漢之水固賴風以行而風豈專隨江淮河漢而行哉且衛氣之不隨營氣而行馬元臺已詳言之矣但於衛氣行篇漏水下四刻八刻以及二十四刻入於陰分之句誤釋以為入足少陰俱引邪客篇云常以足少陰之分間行於五臟六腑不知經文所謂足少陰分者特於其地分一過之耳非實行足少陰經也若謂實行足少陰經則晝已隨六腑而行於陽夜又隨五臟而行於陰是一晝夜間他藏俱一行而腎得再行矣要之晝之所入時於其陰分過之夜之所入實於其陰經行之而邪客篇謂常從足少陰之分間行於五臟六腑者正以衛出下焦下焦乃腎之地分耳然衛氣行篇所云水下四刻水下八刻水下十二刻水下十六刻水下二十刻水下二十四刻皆曰人氣在陰分不必專指腎經言也惟夜行於陰二十五周始可直指腎經言耳然是説也內經諸篇已詳言之而後之學者終不能了了於心目者其故有三焉一則秦越人著難經謂營氣之行常與衛相隨大違經旨而立圖説二則衛氣行篇中漏水下百刻加於人氣之五十周又人氣之五十周加於日行之四十八舍又日行之四十八舍加於二十八宿又二十八宿加於十二辰以多加少度數齟齬非司天臺難以悉其奇分三則又以衛氣之行不等夜行於陰也固在乎陰而晝行於陽也則又過乎陰有此數端是以營衛之説千百年來終然隱晦余因三思惟欲暢明其旨乃立三説其一曰營氣行圖專以營氣之行從中焦起自寅時注於手太陰肺次第行於臟腑循環無已一日一夜五十周於身其次曰沖氣行圖如環相似自水下一刻至五十刻行陽二十五周自五十一刻至百刻行陰二十五周既不妨於夜行又不妨於晝過其三則曰衛氣配周天圖以子午為經卯酉為緯以人氣之五十周配日行之舍與十二辰二十八宿度數如是者三庶乎千載以下覽其圖思其義傳後之學者不致有望洋之嘆耳但營衛之行復有説焉先賢皆以自寅時起於手太陰肺遂以卯時注於手陽明大腸以十二辰次第配十二臟腑如是周而復始若然是一晝夜間止得一周於身又安所謂五十周於身也況各臟腑經絡有長短不同只如手太陰肺經自中府穴起至少商穴相去不遠足太陽膀胱經自目內眥起以至至陰穴相去甚遙若刻定一時行一經則脈之行也豈因某經之長短而故緩急之歟愚曰皆不然也所謂營衛者乃無形之陰陽非有形之血氣也若云有形之血氣只如有人刖一手或刖一足血氣行至所刖之處不能過乎他經必斷絶而死然亦未嘗見其死者則知非有形之血氣明矣不觀內經有衛氣行篇復有營氣篇二者皆用氣字故知其為無形之陰陽也夫既為無形之陰陽則不必復拘脈行之尺寸與經絡之短長而又何妨以一時配一臟腑也但以一時主一臟腑則可以一時行一經絡則不可按營出中焦自寅時起於手太陰肺次第注於十二經隧之中周而復始一日一夜如是五十周於身漏水下百刻後圖以圈內為里為臟圈外為表為腑於一周之中三回入里三回達表所謂一日一夜五十營是也至於衛氣亦一日一夜五十周於身但不隨營氣而行別有行法亦具其圖於後男女長幼大小各有殊形男女長幼不必言大小者言人之肥瘦也十九難云脈有順逆男女有恆而反者何謂也然男子生於寅寅為木陽也女子生於申申為金陰也故男脈在關上女脈在關下是以男子尺脈恆弱女子尺脈恆盛是其常也反者男得女脈女得男脈也其為病何如然男得女脈為不足病在內左得之病在左右得之病在右隨脈言之也女得男脈為太過病在四肢左得之病在左右得之病在右隨脈言之此之謂也脈經曰凡診脈當視其人長短大小及性氣緩急脈之遲速大小長短皆如其人形性者吉反之者則為逆也脈三部大都欲等至如小人婦人細脈小軟小兒四五歲脈呼吸八至細數者吉千金翼云人大而脈細人細而脈大人樂而脈實人苦而脈虛性急而脈緩性緩而脈急人壯而脈細人羸而脈大此皆為逆逆則難治反此為順順則易治凡婦人脈常欲濡弱於丈夫小兒四五歲者脈自駛疾呼吸八至也男左大為順女右大為順肥人脈沉瘦人脈浮千金翼之言如此然亦不可執一而論也豫嘗讀難經至男得女脈為不及女得男脈為太過之句竊有疑焉何也夫所謂男得女脈為不及者謂男子尺脈反盛此為水不勝火其為不及也宜矣至於女得男脈為太過謂女子尺脈反弱也尺脈弱而言太過於理有未合不知先賢所謂男得女脈為不及者乃真陰不足也女得男脈為太過者乃陽邪有餘也若以尺弱之故但用補陰之劑則失之矣余嘗治一婦人關前數大關後微弱內熱心煩頭齒肩膊嘗疼諸醫皆用補陰之劑如四物沙參鱉甲青蒿銀柴之類百劑罔效後余因思女得男脈為太過之句為撰一方用薄荷防風山梔以抑其陽生地丹皮當歸芍藥甘草以扶其陰數劑輒效始信古人之言不誣也若男子尺寸俱盛女子尺寸俱弱又不可一例論也愚按千金翼之言未可盡信如雲人細而脈大人苦而脈虛性緩而脈急人羸而脈大以之為逆則似之矣至於人大而脈細人樂而脈實性急而脈緩人壯而脈細皆以為逆則亦未必然矣余嘗診一貴人形貌魁偉其脈如絶有小恙其脈反大豈可以形大脈細而即為逆歟至於快樂之人頤養得宜脈實有力不必盡皆為虛也又如性急之人其脈和緩當是壽徵人壯脈細因所稟既清肌肉豐厚自脈道微小千金翼拘於對待之法以文害義是以未可盡信也復有節氣不同須知春夏秋冬詳見下文建寅卯月兮木旺肝脈弦長以相從謂正月建寅二月建卯也值此木旺之時其脈當弦十五難曰春脈弦者肝東方木也萬物始生未有枝葉故其脈之來濡弱而長故曰弦又曰如有變奈何然春脈弦反者為病何謂反然其氣來實強是謂太過病在外氣來虛微是謂不及病在內氣厭厭聶聶如循榆葉曰平益實而滑如循長竿曰病急而徑益強如張弓弦曰死故又曰春脈微弦曰平弦多胃氣少曰病但弦無胃曰死春以胃氣為本當其巳午心火而洪謂四月建巳五月建午也值此火旺之時其脈當洪即經所云鉤者是也十五難曰夏脈鉤者心南方火也萬物之所茂垂枝布葉皆下曲如鉤故其脈之來疾去遲故曰鉤又曰夏脈鉤反者為病何謂反然氣來實強是謂太過病在外氣來虛微是謂不及病在內脈來纍纍如環如循琅玕曰平來而益數如雞舉足者曰病前曲後倨如操帶鉤曰死故又曰夏脈微鉤曰平鉤多胃氣少曰病但鉤無胃氣曰死夏以胃氣為本脾屬四季遲緩為宗謂三月建辰六月建未九月建戌十二月建醜如是辰戌丑未之月謂之季月土旺四季寄旺於春夏秋冬之初土旺用事各旺十八日共成七十二日其脈當緩以土之性遲緩故也十五難曰脾者中州也其平和不可得見衰乃見耳來如雀之啄如水之下漏是脾衰之見也申酉是金為肺微浮短澀宜遲謂七月建申八月建酉也值此之時太陰用事其脈當微浮短澀即經所云毛者是也十五難曰秋脈毛者肺西方金也萬物之所終草木華葉皆秋而落其枝獨在若毫毛也故其脈之來輕虛以浮故曰毛又曰秋脈毛反者為病何謂反然其氣來實強是謂太過病在外氣來虛微是謂不及病在內其脈來藹藹如車蓋按之益大曰平不上不下如循雞羽曰病按之蕭索如風吹毛曰死故又曰秋脈微毛曰平毛多骨氣少曰病但毛無骨氣曰死秋以胃氣為本按劉守真曰澀物濕則滑澤干則澀滯燥濕相反故也如遍身中外澀滯皆屬燥金之化故秋脈澀澀澀也月臨亥子是乃腎家之旺得其沉細各為平脈之容謂十月建亥十一月建子也值此水旺之時其脈宜沉而細即經所謂石者是也十五難曰冬脈實者腎北方水也萬物之所藏也極冬之時水凝如石故其脈之來沉濡而滑曰石又曰冬脈石反者為病何謂反然氣來實強是謂太過病在外氣來虛微是謂不及病在內脈來上大下鋭濡滑如雀之啄曰平啄啄連屬其中微曲曰病來如解索去如彈石曰死故又曰冬脈微石曰平石多胃氣少曰病但石無胃氣曰死冬以胃氣為本既平脈之不衰反見鬼兮命危此言春弦夏洪秋毛冬石不失其常是為平脈是元氣之不衰也忽見鬼克之邪脈來侵其命當危而敗矣何謂鬼克之邪也克我者是也如春日浮短澀脈夏見沉細脈四季見弦長脈秋見洪大脈冬見遲緩脈皆鬼克之邪也假令四季之中雖見賊邪之脈來侵然春猶帶弦夏猶帶洪秋猶帶毛多猶帶石尚有可生之理倘本季之脈全然不見但見鬼克之脈則其命也危矣子扶母兮瘥速我所生者為子子扶母者如春得洪大脈夏得遲緩脈季夏得浮澀脈秋得沉細脈冬得弦長脈又如心脈見緩大肝脈見洪散脾脈見浮澀肺脈見沉滑腎脈見弦長亦是子來扶母乃從前來者謂之實邪其病易已故曰瘥速母抑子兮退遲生我者為母所謂母抑子者如春得沉細脈夏得弦長脈季夏得洪大脈秋得遲緩脈冬得浮澀脈又如心脈見弦肝脈見沉脾脈見洪肺脈見緩腎脈見浮澀又如腎病傳肝肝病傳心心病傳脾脾病傳肺肺病傳腎之類是皆母來抑子乃從後來者謂之虛邪病雖不死必稽延而難愈也此事難知云脈地也色天也地生天則順天生地則逆假令得弦脈而面赤色地生天也地生天則順也子扶母兮瘥速也假令得弦脈而面黑色天生地也天生地則逆也母抑子兮退遲也得妻不同一治生死仍須各推我克者為妻如春見緩脈夏見浮澀長夏得沉細秋見弦長又如肝脈見遲緩心脈見浮澀脾脈見沉滑肺脈見弦長腎脈見洪大是皆謂之微邪不足畏然又有反以微邪為可畏者則生死仍須各推可也詳見下文假令春得肺脈為鬼邪得心脈乃是肝兒腎為其母脾則為妻此作賦者恐人不知鬼邪實邪虛邪微邪故舉春以為例然已詳見上文不必復贅脈經云脈從前來者為實邪從後來者為虛邪從所不勝來者為賊邪從所勝來者為微邪春得脾而莫療冬見心而不治夏得肺以難瘥秋得肝亦何疑此復發明得妻不同一治生死仍須各推之理凡我克者為妻乃微邪也假令春脈弦而緩冬脈沉而洪夏脈洪而澀秋脈澀而弦雖見妻脈來乘是為微邪不足畏如春脈但見遲緩而不見其帶弦是為土旺生金反來剋木冬脈但見其洪大而不見其帶沉是為火旺生土而反來剋水夏脈但見其澀而不見其帶洪是為金旺生水而反來剋火秋脈但見其弦長而不見其帶澀是為木旺生火而反來剋金如此之脈不得謂之小逆反以微邪為可畏也譬如人家其夫良善其妻不能難能相夫以成家而夫綱猶整是為美疢不足畏也倘若其夫懦弱其妻強悍事無大小操竊其權雖有夫君視同奴隸流漸日久弒逆之禍其不免矣豈非反以微邪為可畏歟故曰得妻不同一治生死仍須各推復有一説謂春夏秋冬四季之時倘得妻脈其生死判斷有不同者試觀四句賦中惟夏得肺以難瘥一句為一定之辭其餘三句俱屬兩可況別有訣云春中診得四季脈不治多應病自除則知春夏秋冬四季之中倘得妻脈其生死仍須各推不可一例而論也假令春得脾脈春屬木脾屬土木非土不生況木得濕土之滋反能長養故云莫療而病自愈也又令冬見心脈冬為寒冰心為君火如嚴寒之時得太陽一照使流水不冰縱有微邪亦無大害故不必治也惟夏得肺脈夏為赤帝司辰萬物賴以長化倘見肺脈肺為陰金其氣肅殺故殺菽隕霜春秋所警是以夏得肺以難瘥也至於秋得肝脈肝為青陽主東方之生氣秋得肝脈是當搖落之時而得生長之氣如陽明司天之歲五之氣厥陰風木客氣加臨春令反行草乃生榮民氣和之謂也又何疑其為害也哉此乃論四時休旺之理明五行生剋之義此總結上文之脈反四時者由五行有相剋之義存焉耳舉一隅而為例則三隅而可知如前偶舉一春以為例則夏秋冬季可以類推矣按平弦而若緊此節言脈有相似者當詳明分別之不可混淆也平字非弦脈之平當與下文欲識之識字相對南方診脈謂之看脈北方診脈謂之平脈如脈經平脈早晏平脈虛實之類故曰按平弦而若緊弦者不散也端直而長狀若箏弦曰弦緊者不緩也脈來徑急按之長舉之若牽繩轉索之狀弦屬少陽為瘧為飲為寒熱為氣血收斂緊屬太陽為寒為痛在人迎為傷寒在氣口為傷食不可以其同一長而直而不分其孰為弦孰為緊也欲識澀而似微澀不滑也參伍不調如雨沾沙又如輕刀刮竹曰澀澀為氣多血少為傷精為痰阻氣機為中霧露微者不顯也脈來極細而軟若有若無曰微為氣血俱虛為敗血不止面色無光然澀者言脈道之謇澀而不流利也微者言脈道之微細而不充滿也二者皆難定息數診之者須辨其孰為澀孰為微浮芤其狀相反浮者不沉也按之不足舉之有餘曰浮有力為風無力為虛芤則初無定體芤草名其葉似蔥以脈輕手則浮而大重則中空故藉以命名也即先賢論芤脈亦有不同如本訣中指法則曰兩頭即有中間全無或又謂四畔有中間無而脈經則又曰芤脈其象兩邊似有中間全無仲景傷寒論曰脈弦而大弦則為減大則為芤減則為寒芤則為虛虛寒相搏此名為革男子忘血失精女子半産漏下古人謂芤脈之不同如此或云兩頭有中間無或曰四畔有中間無或曰兩邊有中間無餘嘗按此三法診人之脈皆斷之為失血並無差忒因思芤脈輕手則浮重則中空雖有上下左右四畔之不同要之皆因血去故也但據仲景之言觀之脈弦則為減大則為芤是輕手取之則覺其弦大及乎重手則減而為芤與剖竹相似非兩邊有中間無乎至本訣中指法主病則曰兩頭即有中間全無主淋瀝氣入小腸與仲景之主病不合大抵從仲景之指法其病為虛為寒從脈訣之指法其病為陽為熱不得張鑿而李枘也不獨芤脈為然凡讀古人書不可膠柱鼓瑟況脈之理至精至微脈不自立其名因古人之指法而立名假令其古人之指法如此故其主病如此某古人之指法如彼故其主病如彼戴起宗之流造脈訣刊誤每用一古人之指法如定脈之名復用一古人之主病強牽以合之至使後人病脈不相對誤人豈淺鮮哉不知古人各有得心應手之妙非若後世之人泥於字句者比也沉伏殊途同歸沉不浮也輕手不見重手乃得曰沉為入里脈之首伏不見也脈經云伏者極重手按之著骨乃得為三陰之盡洪與實而形同倣佛洪者脈來滿指而大也實者浮中沉皆有力也二脈皆滿指然洪有浮沉之別而實謂浮沉皆有力也濡與弱而性帶依稀濡與弱其狀相似但有浮沉之別與陰陽之分耳諸家皆以極浮細而軟曰濡極沉細而軟曰弱惟本訣指法主病中則曰指下尋之似有再再還來按之依前卻去曰濡指下尋如爛綿相似輕手乃得重手稍無怏怏不前曰弱據訣所云似乎以極沉而無力為濡極浮而無力為弱矣兩説齟齬何去何從也不知濡為陰水當沉弱為陰金當浮濡為陽不足不當於浮中見弱為陰不足不當於沉中見據理而論當以訣之指法為是而以他説為非矣況濡弱二脈但可以極沉而軟極浮而軟言之不必更加細字先辨此情後明其理更復通於藥性然後可以為醫今人但知脈理之難而不知藥性之難也但知藥之功而不知藥之性耳能盡其藥之性然後可以為醫也夫所謂性者非山楂消食貝母清痰枳殼寬胸陳皮下氣之謂也乃寒熱溫涼升降浮沉陰陽清濁之謂也語云用藥如用兵兵家之道知彼知己百戰百勝知彼者知賊之虛實也知己者知我兵之水陸奇正也如為醫者但知脈理而不知藥性是猶用兵者但知賊之虛實而不知我兵之宜水宜陸宜奇宜正縱有百萬之師其不為賊所陷者鮮矣既已明其三部須知疾之所有此承上起下之詞言既明寸關尺之三部須知三部之中所現之脈不同而所生之病亦各異也寸脈急而頭痛寸陽部也頭諸陽之會也今診得寸脈而急急則近於緊諸緊為寒當是風寒客於其腦而作痛也平人氣象論云寸口之脈中手短者曰頭痛弦為心下之咎心之下胃之上也弦則為飲脈經曰寸脈弦心下愊愊謂心下有痰飲也故寸弦而曰心下咎也緊是肚痛之徵肚痛者胃脘痛也經云緊在寸口或膈上有寒或膈下有水寒在上焦風滿而噎或風寒外入病苦頭痛當是左寸緊或宿食內停腹中不化當是右寸緊緩即皮頑之候寸陽位也緩則為濕風從陽濕從陰風從上濕從下今緩脈見於陽位即經云寸緩主皮不仁風寒在肌肉也宜防風湯微微冷入胸中寸陽部也胸中陽位也微者陽氣虛也陽虛則寒故寸微而知胸中有冷氣也數數熱居胃口數為熱經云寸數即吐以有熱在胃脘熏胸中宜藥吐之及針胃脘服除熱湯則知熱在胃口矣滑主壅多經云寸滑陽實胸中壅滿吐逆宜前胡湯澀而氣少凡澀為氣多血少而此獨云澀而氣少者何也蓋以胸為氣海若關脈澀則當謂之血少何也以其營出中焦也至於寸口所以候胸中者胸為氣海安得不謂之氣少也哉胸連脅滿只為洪而莫非膹引背疼緣是沉而不謬洪為陽沉為陰洪為火沉為寒胸為陰背為陽寸部而見洪脈為腸火之邪干於心胸而作滿悶經云諸逆衝上皆屬於火者是也寸部而見沉脈為陰寒之氣干於肺而作引痛經云諸氣膹郁皆屬於肺者是也更過關中浮緩不餐關中所以候中焦者中焦屬脾土土之性宜鎮靜今脈見浮緩緩雖土之本脈而浮則為風為虛如大風揚沙失其鎮靜之德而成虛浮之象其不食也宜矣緊牢氣滿喘急難痊緊則為寒牢則為病根深固今二脈見於關中是脾胃為冷物所傷脾病則留滿痞塞故氣滿喘急而成不拔之證矣弱以數兮胃熱弦以滑兮胃寒數則為熱見於關中則為熱壅胃口熱壅胃口則不食不食則脈因之而弱矣弦則為飲滑主壅滯今弦滑兼見於關中是為胃中停積寒飲矣微即心下脹滿諸脹滿皆屬於土微為陰土乃不及之土也微脈見於關中是為脾虛不足而作脹滿矣當於微脈條中參看可也沉兮膈上吞酸澀即宜為虛視沉乃須作實看上文云沉兮膈上吞酸下文云沉乃須作實看豈非一脈而兩證歟不知上文之沉兮膈上吞酸者乃胃中有宿滯未消而作吞酸之證誠恐後人以關脈見沉誤認脾虛而用補劑則難免實實之禍矣故反覆叮嚀之曰澀則宜為虛視蓋以營出中焦關脈澀則為營血不足謂之虛也宜矣至於沉則不得視之為虛而當視之為實宜用消導之劑去其積滯則陽氣自升而脈自不沉矣下重緣濡女萎散療之在急濡主虛乏為氣血不足之候關主脾胃今見濡脈則元氣衰而中氣下陷故腰以下墜重難以行矣女萎散無傳姑俟後考人身如雞子相似脾氣如黃元氣如清凡清明前煮雞子則黃在中以其清足故也清明後煮雞子則黃偏而下以其清不足故也人身之中氣亦然若中氣足則不偏虛不足則下陷而偏矣水攻因伏牽牛湯瀉則令安營出中焦中焦治則脈道行而往來流動矣今關脈伏則土為水掩而脈道不行如五常正大論所云藏政以布長令不揚也治之者當以牽牛湯盡瀉其水則脾土自現而脈道自通矣禹貢曰云土夢作乂此之謂也爾乃尺中脈滑定知女經不調男子遇此之候必主小腹難消滑主壅多女子經脈不通男子小便不利皆壅滯之患也按經云尺滑氣血實婦人經脈不利男子溺血伏脈谷兮不化尺脈伏而云穀不化者何也蓋以飲食入胃不能運化停留於中壅遏營衛衛出下焦不得通達故厥陰之木氣不升而尺脈為之伏矣治之者當吐其邪而升其氣使厥陰之氣上升而尺脈可復出矣其説當於八里脈尺伏條下參看微即肚痛無憀微為陽虛陰盛之脈尺中見微是為陰分而見陰脈也諸陰為寒故經云尺微厥冷小腹中拘急有寒氣弱緣胃熱上壅尺脈弱而云胃熱上壅者何也蓋以上實則下虛熱氣並壅於胃口故尺脈見弱也遲是寒於下焦諸遲為寒尺所以候下焦者尺脈見遲是以知下焦之有寒也胃冷嘔逆澀候人身如釜甑相似胃猶甑也脾猶釜也下焦命門猶釜底之薪也命門之火旺則能熏蒸脾土而胃中之飲食易消況腎者胃之關今尺脈見澀是為精血不足真火衰微不能熏蒸脾土腐熟水穀故胃冷而為嘔逆之候矣即王太僕所謂食入久而反出者胃無火也腹脹陰疝弦牢經云尺脈弦小腹痛及腳中拘急宜服建中湯針氣海瀉之又云尺脈牢腹滿陰中急宜葶藶子茱萸丸針丹田關元中極按氣海丹田關元中極數穴皆任脈之穴也任脈主男子內結七疝女子瘕聚帶下然疝有多端何獨歸於任也不知任脈是疝病之本源各經是疝病之支流今尺部而見弦牢之脈為弦而有力動而不移是足厥陰之氣鬱而不舒致成腹脹陰疝之證矣羅謙甫云陰證足厥陰之脈環陰氣抵少腹或痛因腎虛寒水涸竭瀉邪補肝蒺藜湯主之緊則痛居其腹諸緊為寒今見在尺脈則知其寒在下焦即經云尺脈緊臍下痛者是也沉乃疾在其腰腰者腎之府兩尺脈沉沉為陰水為火不能相濟故疾在其腰也詳見八里脈沉脈尺部條下濡數浮芤皆主小便赤澀細詳如此之候何處能逃濡而數乃陰中之火也陰中有火故主小便赤澀當用涼補之藥以滋其陰浮而芤乃陽中之火也陽中有火亦主小便赤澀當用寒涼之劑以瀉其火然濡數浮芤當知濡數為一脈浮芤為一脈不必分為四也若問女子何因尺中不絶胎脈方真女子以尺為主不絶者往來流利也即內經云陰搏陽別謂之有子謂尺中之脈搏於指下大有別於關前也太陰洪而女孕太陽大而男娠謂右手寸關沉而洪左手寸尺洪而大也女陰也其道尚右而太陰俱在右寸關是也太陰為臟當於沉中候今診得右手肺脾之脈沉而洪故知其為女孕也男陽也其道尚左然兩太陽俱在左太陽為腑當於浮中候今診得左手小腸膀胱之脈洪而大故知其為男娠也或遇俱洪而當雙産此法推之其驗若神月數斷之各依其部假令中衝若動此乃將及九旬凡女人有孕除心與小腸不養胎心為君主小腸為之使也其餘臟腑各以其月輸血養胎一月肝二月膽三月手心主四月三焦五月脾六月胃七月肺八月大腸九月腎十月膀胱十月滿足故産而生矣夫十日為旬九旬者三月也中衝者手心主之井穴故三月而中衝脈動也中衝手中指尖內側患者欲知要死須詳脈之動止凡平人之脈一呼二至一吸二至閏以太息共成五至循環無已至五十動而不止是為大衍之數全五臟皆受氣也如動而中有一止則知其一藏無氣當於各藏豫之死期彈石劈劈而又急解索散散而無聚彈字當作平聲讀不當作去聲讀彈石者如指彈於石上劈劈而堅硬也若誤讀作去聲則為彈丸之彈失其劈劈之旨矣解索者謂如索之朽壞解散無復次序也若謂解結之解則誤矣內經云來如彈石去如解索者死又曰死腎脈來發如奪索劈劈如彈石曰腎死按彈石者辟辟急也解索者動數而隨散亂無復次序也雀啄頓來而又住屋漏將絶而復起凡雀之啄食必連連啄之時一回顧恐人之將捕也怪脈之來連連數急時復一止如雀啄食之狀又曰雀啄者脈來甚數而疾絶止復頓來也屋漏者其來既絶而止時時復起不相連屬也經云死脾脈鋭堅如鳥之啄如鳥之距如屋之漏如水之流曰脾死蝦遊苒苒而進退難尋訣云蝦遊狀若蝦蟆遊魂去行尸定主憂蝦遊者苒苒而起及細尋之不知脈之所在久而復起遲遲輒沒言來遲去速也按經云脈困病人脈如蝦之遊如魚之翔者死注云蝦遊者苒苒而起尋復退沒不知所在久乃復起起輒遲而沒去速者是也魚翔者似魚不行而但掉尾動頭身搖而久住者是也魚躍澄澄而遲疑掉尾魚躍者魚翔脈也遲疑掉尾者頭不動而尾搖撇然一厥也又訣云尾掉搖搖頭不動魚翔腎絶亦如期蝦遊者以上下之往來言時復一隱也魚翔者以內外之往來言時復一厥也嗟乎遇此之候定不能起縱有丸丹天命而已復有困重沉沉聲音劣劣寸關雖無尺猶不絶往來息均踝中不歇如此之流何憂殞滅經文具載樹無葉而有根人困如斯垂死乃當更治沉沉神昏也劣劣氣少也寸關之脈雖無尺中之脈不絶而且往來息均及診踝中足少陰太溪之動脈在足內踝後五分跟骨上陷中動脈則又流利不歇譬諸枝葉雖凋根本尚在猶有發生之根又何患乎殞滅也哉難經第八難云寸口脈平而死者何謂也然諸十二經脈者皆繫於生氣之原所謂生氣之原者謂十二經之根平也謂腎間動氣也此五臟六腑之本十二經脈之根本呼吸之門三焦之源一名守邪之神故氣者人之根本也根絶則莖葉枯矣寸口脈平而死者生氣獨絶於內也然脈賦所言者枝葉雖盡而根本尚存猶有可生之理難經所云根本先撥而莖葉雖存必無可生之道合而觀之相得而益彰矣按脈經云上部有脈下部無脈其人當吐不吐者死上部無脈下部有脈雖困無所苦所以然者譬如人之有足樹之有根雖枝葉枯稿不致殞萎若根本壞則殆矣診脈入式歌左心小腸肝膽腎左者左手也此言左手寸關尺之三部也左寸心與小腸動脈所出左關肝與膽動脈所出左尺腎與膀胱動脈所出歌內不言膀胱者蓋由字多包括不盡也右肺大腸脾胃命右者右手也此言右手寸關尺之三部也右寸肺與大腸動脈所出右關脾與胃動脈所出右尺命門三焦動脈所出歌內不言三焦者亦因包括不盡也三十六難曰藏各有一耳腎獨有兩者何也然腎兩者非皆腎也其左者為腎右者為命門命門者諸精神之所含元氣之所繫也故男子以藏精女子以系胞此扁鵲之言也戴起宗既知扁鵲之論何必反改腎字為命字也當與後右手命門歌內參看按脈經第七脈法贊云肝心出左脾肺出右腎與命門俱出尺部魂魄穀神皆現寸口左主司官右主司府左大順男右大順女關前一分人命之主左為人迎右為氣口神門訣斷兩在關後人無二脈病死不愈諸經損減各隨其部察按陰陽誰與先後陰病治官陽病治府奇邪所舍如何捕取審而知之針入病愈心部在左手關前寸口是也即手少陰經也與手太陽為表裡以小腸合為府合於上焦名曰神庭在龜尾鳩尾下五分肝部在左手關上是也足厥陰經也與足少陽為表裡以膽合為府合於中焦名曰胞門在太倉左右三寸腎部在左手關後尺中是也足少陰經也與足太陽為表裡以膀胱合為府合於下焦在關元左肺部在右手關前寸口是也手太陰經也與手陽明為表裡以大腸合為府合於上焦為呼吸之府在雲門脾部在右手關上是也足太陰經也與足陽明為表裡以胃合為府合於中焦脾胃之間名曰帝門在季脅下前一寸半腎部在右手關後尺中是也足少陰經也與足太陽為表裡以膀胱合為府合於下焦在關元右左屬腎右為子戶名曰三焦女人反此背看之尺脈第三同斷病此言男子之脈兩尺常弱女人反此背看者謂惟兩尺當常盛也至於心肝脾肺腎亦如男子之分列部位初無異也按經云天地者萬物之父母也陰陽者氣血之男女也男子負陰而抱陽女子負陽而抱陰南方陽也北方陰也男子面南而生則兩寸在南而得其陽故寸脈洪大而尺脈微弱也女子面北而生則兩寸在北而得其陰故寸脈微弱尺脈洪大也男得女脈為不足女得男脈為太過脈訣云女人反此背看之尺脈第三同斷病正謂此也心與小腸居左寸肝膽同歸左關定腎居尺脈亦如之用意調和審安靜肺與大腸居右寸脾胃脈從關裡認命門還與腎脈同用心仔細須尋趁其説已見上文若診他脈覆手取凡診他人之脈醫人必自覆其手以食指候病人之寸中指候病人之關無名指候病人之尺此其常也故曰覆手取戴起宗誤以為病人之手而改為診脈皆須仰手看不通甚焉按薛立齋云脈訣之言謂診他則覆手自診則仰手取手便而已刊誤蓋誤認歌意以醫之覆手診人為覆病人之手也自此以後有似此者則去之而不辨要自看時仰手認若診自己之脈亦必以食指候寸中指候關無名指候尺若亦覆手以診則指法顛倒矣凡欲診自己左手之脈必以右手從左手背後仰操向上曲指取之若診右手之脈以左手從右手背後仰操向上曲指取之則指法亦如診他人之脈矣三部須教指下明九候瞭然心裡印其説已見脈賦大腸共肺為傳送張世賢云大腸者肺之府乃傳道之官傳送不潔之物而變化出焉其傳道也必待氣往下行肺主氣故共為傳送也經曰陽明之上燥氣治之中見太陰按經云肺者相傅之官治節出焉大腸者傳道之官變化出焉心與小腸為受盛張世賢云心者火之屬也火主時令則萬物皆盛小腸者心之府乃受盛之官承奉胃司而受盛糟粕心屬火火能化物糟粕受已復化傳入大腸故云心與小腸為受盛經曰少陰之上火氣治之中見太陽按經云心者君主之官神明出焉小腸者受盛之官化物出焉脾胃相通五穀消經云脾胃者倉廩之官五味出焉蓋胃主納穀脾主化谷潔古曰脾胃之氣常通和故曰脾胃相通五穀消也膀胱腎合為津慶經云腎者作強之官伎巧出焉膀胱者州都之官津液藏焉五臟雖各有其液而所主者為腎故曰膀胱腎合為津慶也戴起宗謂非腎與膀胱所專主則謬矣三焦無狀空為名寄在胸中膈相應所謂無狀空有名者此即內經所云上焦如霧中焦如漚下焦如瀆者是也又難經云上焦者在心下下膈在胃上口主內而不出其治在膻中玉堂下一寸六分直兩乳間陷者是中焦者在胃中脘不上不下主腐熟水穀其治在臍傍下焦者在臍下當膀胱上口主分別清濁主出而不內以傳道也其治在臍下一寸故名曰三焦此焦字當讀作平聲無有月旁故曰無狀空有名也至於下文腎臟歌內所云兩耳通為竅三膲附在斯之三膲準經脈篇為手厥陰之府配十二經絡乃有形有名有經絡者其字讀作去聲並有月旁不可以無狀有名之三焦混作有狀有名有經絡之三膲也肝膽同為津液府能通眼目為清淨經云肝者將軍之官謀慮出焉膽者中正之官決斷出焉又膽為清淨之府肝開竅於目故能通眼目為清浮也智者能調五臟和自然察認諸家病醫者五臟安和則出入息勻然後能診他人之脈不至差忒也掌後高骨號為關骨下關脈形宛然言醫者以中指對病人之掌後高骨轉而向前則為關脈矣以此推排名尺澤三部還須仔細看上文既以中指定其關脈則關前為寸關後為尺不言而喻矣關前為陽名寸口關後為陰直下取中部而名之曰關者正以關前為陽關後為陰而為陰陽之關隘此又非所論於寸關尺之三部而言之也按脈經云關前為陽關後為陰陽數則吐血陰微則下利陽弦則頭痛陰弦則腹痛陽微則發汗陰微則自下陽數口生瘡陰數如徵必惡寒而煩擾不得眠也陰附陽則狂陽附陰則癲得陽屬腑得陰屬臟無陽則厥無陰則嘔陽微則不能呼陰微則不能吸呼吸不足胸中短氣依此陰陽以察病也陽弦頭痛定無疑陰弦腹痛何方走弦為少陽主半表半裡然從陽化則熱從陰化則寒今弦脈見於陽部為少陽有火而作頭痛此從陽化則熱也陰部見弦則為少腹有寒痛此從陰化則寒也弦為氣血收斂之脈而見於關前則為風寒外來見於關後則為陰寒內生陽數即吐兼頭痛陰微即瀉臍中吼要知吐兼頭痛足少陽陽明皆有此證倘診得關前之脈數而帶弦則為足少陽膽經之火上攻於頭故吐而頭痛也若診得關前之脈數而帶洪則為足陽明胃經之火上攻於頭故亦吐而頭痛也陰脈見微則下焦之真火衰衰則脾失其溫養之源故脾虛而作瀉矣然臍者脾之關也吼有聲也陽實應知面赤風關前陽部也面諸陽之會也實脈陽火也今陽部而見實脈則熱極生風故面赤而為風熱也或曰數為熱實亦為熱同一熱何以證脈之不同也答曰數脈者火之從下而衝上也或有虛實之分實脈者火之從內而達外也但實而無虛陰微盜汗勞兼有汗者血所化也凡人寤則陽用事寐則陰用事盜汗者人當寐時則陽不用事陽不用事而營氣外泄盜其不知而出也上文既云陰微即瀉而此復云陰微盜汗何一脈而兩病也蓋以其人兼有勞證復得陰部脈微則為陰虛盜汗之證矣陽實大滑應舌強大則為火實則為火有餘滑則為痰火有餘則熱熱則生風風火相煽則痰隨火上關前陽部也心居膈上亦陽位舌為心之外應陽部而見實大且滑之脈則風火生痰窒塞心竅故舌因之而強也陰數脾熱並口臭脾主中州與胃為表裡雖賴下焦之相火熏蒸得以腐熟水穀行其津液然亦不可過旺關後為陰陰數則相火反乘脾土脾熱則傳於胃胃為陽明陽明開竅於口故濁氣上升而口為之具矣陽微浮弱定心寒關前為陽微浮弱為陽氣衰心主火居於膈上今陽部而見微浮弱脈則為陽氣衰微心火不足故曰定心寒也陰滑食注脾家咎食注者完穀不化也滑主壅多陰脈見滑是脾胃失其運化之機不能腐熟水穀故作食注而下矣關前關後辨陰陽察病根源應不朽夫九老陽之數也十老陰之數也欲辨關前關後陰陽之數準難經所云陰得尺中一寸陽得寸內九分一息四至號平和更加一至大無疴考平人氣象論中岐伯曰人一呼脈再動一吸脈亦再動呼吸定息脈五動閏以大息命曰平人平人者不病也王冰釋云經脈一周於身凡長十六丈二尺呼吸脈各再動定息脈又一動則五動也計二百七十定息氣可環周然盡五十營以一萬三千五百定息則氣都行八百一十丈如是則應天常度脈氣無不及太過氣象平調故曰平人也三遲二敗冷危困凡人身之經脈周身共計一十六丈二尺一呼脈行三寸一吸脈行三寸呼吸定息共行六寸若至二百七十息得一千三百五十動脈行一十六丈二尺始一周於身一日一夜如是五十周於身共計一萬三千五百息脈行八百一十丈而足大衍之數也今脈見遲息則猶是其脈之行也減平人之二是二百七十息中脈行止得九丈七尺二寸較平人一十六丈二尺之數尚餘六丈四尺八寸不能一周於身而以一晝夜五十營共計之則一萬三千五百息而脈僅行四百八十丈是不能滿足五十營之數矣故曰遲也二敗者校之遲脈則又損一至又損一至則是二百七十息中脈止行得六丈四尺八寸準之平人脈尚餘九丈七尺二寸不能一周於身以一晝夜五十營共計之止得六百零五丈矣僅平人之一半故為敗也三遲為冷損二至則遲而又遲矣故曰冷危困也六數七極熱生多八脫九死十歸墓十一十二絶魂瘥六數者較平人一息五至而加一至也平人脈呼吸定息共六寸二百七十息共一千三百五十動脈行一十六丈二尺為一周於身今診得脈數是於平人脈一息五動之中加一至也既加一至則二百七十息中加二百七十動是於一周身外又過行三丈二尺四寸若以一晝夜五十營共計之是於八百一十丈外又過行一百六十二丈矣故曰數也七極者較平人一息五至而加二至也既加二至則二百七十息中加五百四十動是於一周身外又過行六丈四尺八寸若以一晝夜五十營共計之是於八百一十丈外又過行三百二十四丈矣故曰極也數則為數六至七至豈非熱生多乎八脫者較平人一息五至而加三至也既加三至則二百七十息中加八百一十動是於一周身外又過行九丈七尺二寸若以一晝夜五十營共計之是於八百一十丈外又過行四百八十六丈矣故曰脫也九死者較平人一息五至而加四至也既加四至則二百七十息中加一千零八十動是於一周身外又過行十二丈九尺六寸若以一晝夜五十營共計之是於八百一十丈外又過行六百四十八丈矣故曰死也十歸墓者較平人一息五至而倍加之也息則猶是而動數倍加動數既倍加則丈尺亦倍加豈非二百七十息中已兩周於身而於一晝夜間已一百周於身矣故曰歸墓也十一者較平人一息五至加一倍又多一動也既加一倍有餘是於二百七十息中即行三十五丈六尺四寸於周身外又多行三丈二尺四寸若以一萬三千五百息計之則一晝夜一百營於身又加一百六十二丈矣十二者設平人一息五至加一倍又多二動也既加一倍又多二動是於二百七十息中已行三十八丈八尺八寸是一晝夜得一百營於身而又過行三百二十四丈矣此至之極也此脈至之極故曰絶魂也譬諸一騎日行百里以為常若加一二十里或可強而行之若加之八九十里乃至一倍之外則必倒斃而死矣三至為遲一二敗兩息一至死非怪此足上文從遲而益減為損之極也若曰三遲二敗上文已詳言矣若損之又損至兩息一至則平人兩息而病人脈始一至也是一晝夜間脈止行得六千七百五十動以五十營計之止一周身而尚不足則死也宜矣譬之一騎日行百里以為常今筋力漸衰日行六七十里或可望其復壯及日行一二十里而尚不能其憊也甚矣安得望其復生哉遲冷數熱古今傳難經越度分明載此總結上文遲數損至之脈謂遲則為冷數則為熱其人之呼吸脈之尺寸經之度數具載於秦越人之難經中也熱即生風冷生氣用心指下叮嚀記肝主風熱則火盛金衰不能制木則木自旺而生風肺主氣冷則水盛火衰不暇制金則金自旺而生氣也春弦夏洪秋似毛冬石依經分節氣春弦者即玉機真藏論岐伯曰春脈者肝也東方木也萬物之所以始生也故其氣來耎弱輕虛而滑端直以長故曰弦反此者病帝曰何如而反岐伯曰其氣來實而強此謂太過病在外其氣來不實而微此謂不及病在中帝曰春脈太過與不及其病皆何如岐伯曰太過則令人善忘忽忽眩冒而顛疾其不及則令人胸痛引背下則兩脅脹滿夏洪者即玉機真藏論岐伯曰夏脈者心也南方火也萬物之所以盛長也故其氣來盛去衰故曰鉤反此者病帝曰何如而反岐伯曰其氣來盛去亦盛此謂太過病在外其氣來不盛去反盛此謂不及病在中帝曰夏脈太過與不及其病皆何如岐伯曰太過則令人身熱而膚痛為浸淫其不及則令人煩心上見咳唾下為氣泄秋毛者即玉機真藏論岐伯曰秋毛者肺也西方金也萬物之所以收成也故其氣來輕虛以浮來急去散故曰浮反此者病帝曰何如而反岐伯曰其氣來毛而中央堅兩旁虛此謂太過病在外其氣來毛而微此謂不及病在中帝曰秋脈太過與不及其病皆何如岐伯曰太過則令人逆氣而背痛慍慍然其不及則令人喘呼吸少氣而咳上氣見血下聞病音冬石者即玉機真藏論岐伯曰冬石者腎也北方水也萬物之所以合藏也故其氣來沉以搏故曰營反此者病帝曰何如而反岐伯曰其氣來如彈石者此謂太過病在外其來如數者此謂不及病在中帝曰冬脈太過與不及其病皆何如岐伯曰太過則令人解㑊脊脈痛而少氣不欲言其不及則令人心懸如病飢䏚中清脊中痛少腹滿小便變阿阿緩弱春楊柳此是脾家居四季按玉機真藏論岐伯曰脾脈者土也孤藏以灌四傍者也帝曰然則脾善惡可得見之乎岐伯曰善者不可得見惡者可見帝曰惡者如何得見岐伯曰其來如水之流者此謂太過病在外如鳥之啄者此謂不及病在中帝曰夫子言脾為孤藏中央土以灌四傍其太過與不及其病皆何如岐伯曰太過則令人四肢不舉其不及則令人九竅不通名曰重強在意專心察細微靈機應變通元記張世賢曰在意專心不他雜也他事不雜於胸中精察脈理之微細則靈機自然曉悟元微之理貫通而不忘也靈機脈理也脈理活動而不執滯故曰靈機浮芤滑實弦緊洪七表還應是本宗浮芤滑實弦緊洪七脈皆輕手取之而即得者浮以候表故曰七表微沉緩澀遲並伏濡弱相兼八里同微沉緩澀遲伏濡弱八脈輕取之不得重手方得沉以候里故曰八里血營氣衛定息數一萬三千五百通人受氣於谷谷入於胃乃傳之於五臟六腑皆受於氣其清者為營濁者為衛營行脈中衛行脈外營衛周流不息五十周而復大會陰陽相貫如環之無端故血為榮氣為衛凡人所以得全其性命氣與血也氣為陽陽為衛血為陰陰為榮二氣常流所以無病也經曰人一呼脈行三寸一吸亦行三寸呼吸定息總行六寸人一日一夜凡一萬三千五百息脈行五十度周身漏水下百刻營衛外行陽二十五度內行陰亦二十五度為一周也故五十度復會於手太陰寸口者五臟六腑之所終始也
