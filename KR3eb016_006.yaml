body:
  text: 卷六察色觀病生死候歌欲愈之病目眥黃熊宗立曰目眥有內外內眥屬胃今見黃色是胃土之正色外眥雖屬膀胱今見黃色是脾胃之氣生故能克去膀胱水是知病當愈愚謂十二經之衛氣俱從目眥出入今目眥而見黃色是病從內而出外胃氣復生故也脈經亦云病人兩目眥有黃色起者其病方愈眼胞忽陷定知亡三部九候論云傷內陷者死張介賓釋云五臟六腑之清氣皆上注於目而為之精目內陷者陽精脫矣故必死熊宗立張世賢俱引五輪以為釋似屬繁文按玉機真藏論大骨枯槁大肉陷下胸中氣滿腹內痛心中不便肩項身熱破䐃脫內目眶陷真藏見目不見人立死其見人者至其不勝之時則死脈經云病人陰陽絶竭目眶陷者死中藏經云陰陽俱絶目眶陷者死耳目口鼻黑色起入口十死七難當五臟之華萃於面眼耳鼻舌居焉猶如天日宜清淨光明不宜翳蔽慘暗凡耳目口鼻但有一處見其黑色即為不真脾開竅於口舌居其中為心之苗若見黑色從外而入於口內為穢惡之氣犯其穀神並及心主其不祥莫大焉若人見此雖十人而必死其七焉脈經云病人耳目口鼻有黑色起入於口者必死此之謂也諸家之釋俱以黑色為腎之色似乎缺通何也若以黑為腎之色似於耳赤無妨矣張世賢釋又以火之成數在七至第七日當死亦未必然面黃目青酒亂頻邪風在胃喪其身五臟生成論云凡相五色之奇脈面黃目青面黃目赤面黃目白面黃目黑者皆不死也脈經則曰面黃目青九日必死是謂亂經飲酒當風邪入胃經膽氣妄泄目則青雖有天枚不可復生似乎與內經相背脈經又云面黃目青者不死青如草滋死合而觀之則面黃目青未必不死亦未必盡死但青而明潤不死青而慘暗則死也池氏釋曰飲酒過多傷乎脾胃致脾經積熱熱則生風風生於肝肝屬木木氣盛克乎脾土必損其身此說似太轉折不若脈經所謂亂經飲酒風邪入胃膽氣妄泄目則青之說為簡而當也面黑目白命門取困極八日死來侵脈經云面黑目白者不死又曰病人面黑目白也八日死腎氣內傷病因留積非前後之說相違也亦准前白如明潤者不死白如慘暗者死也然經云腎氣內傷此則云命門敗者何也蓋命門右腎也若云腎敗則當云面白目黑而此云面黑目白者張世賢曰黑水也目木也白金也命門火也水浸淫而賊火之氣金剋木而伐火之源所以命門火敗火之成數七七日火極矣故死於第八日也其說亦通池氏為命門乃厥陰之說缺穩面色忽然望之青進之如黑卒難當潔古曰青黑之色為肝腎色也先青後黑是回則不轉神去則死也池氏曰青屬肝黑屬水水乾木枯腎肝皆絶故泄其氣於外其說亦遍脈經云病人及健人面忽如馬肝色望之如青近之如黑者死此之謂也面赤目白憂息氣待過十日定存亡脈經云面赤目白者十日死憂恚思慮心氣內索面色反好急求棺槨此之謂也張世賢曰息氣喘逆也赤色屬火白色屬金火來剋金必作喘逆金之成數在九十乃土之成數也土能生金今土不能生金則死故曰待過十日也氏曰心屬火肺屬金火剋金過得十日至水數而火方退則不死火氣不退再至心數日必死按五臟生成論云面赤目白皆死也面赤目青衆惡傷榮衛不通立須亡他本無此二句張世賢曰面赤火也目青木也木火色見風熱傷於五臟六腑臟腑受傷血氣衰肌肉不滑榮衛之道澀而不通其死也可立而待愚謂面赤火也目青木也皇極內篇有云火木相得則然從其類也脈經云目青者病在肝面赤目青則肝肺俱傷血氣俱澀而榮衛不得宣通當為暴死之證非常病也按五臟生成論云面赤目青皆死也脈經云面赤目青者六日死黃黑白色起入目更兼口鼻有災殃池氏曰黃屬脾黑屬腎白屬肺目屬肝口屬脾鼻屬肺而腎勝乎脾土土弱不能生金此災殃之所以至也此說似屬勉強張世賢曰獨見者謂之正色雜見者謂之邪色黃黑白之三色雜見於面或當於目或入於口或入於鼻乃病氣從外而之內故有災殃此說近是愚按脈經云面目俱等者不死可見雜色入目俱為不祥若入口鼻其災更甚何也口鼻者陽明開竅處也凡有雜色來現皆屬陰邪故曰有災殃也按脈經云病人及健人黑色若白色起入目及口鼻死在三日中面青目黃中時死余候須看兩日強熊宗立釋云肝木克乎脾土中時即死雖有餘證亦不過二日此說不明張世賢曰中時即午時午時屬火面青目黃肝木克乎脾土到午時木得火而不畏金木勢愈盛人以胃氣為木土絶則死故死在是時其他相剋看過旺二日而斷其生死此說近是但於余候須看兩日強之句亦不甚明瞭愚按脈經云目黃者病在脾面青則為肝氣盛是為肝木克乎脾土若以時候之當死在中時若以日候之當強在兩日何也中時者午時也火盛則木寡於畏而脾土愈傷故曰中時其餘則以日候之矣兩日乃火之生數也火能生土故至兩日而復望其強耳按脈經云病人面青目黃者五日死目無精光齒齦黑面白目黑亦災殃池氏云目無精光而神散乃心肝皆絶齒齦黑乃脾絶面白如枯骨乃肺絶目黑乃腎絶五臟皆絶必然斷之以死云張世賢曰目無精光者神短也齒齦黑者脾絶也面白者少血也目黑者腎虛也有是四者則非常久之客愚謂目無精光神散也齒屬腎為骨之餘上下牙齦屬陽明齒齦黑者為腎水枯竭不能榮養其餘面白目黑則當依經文榮華已去血脈空存為釋也張氏之說已屬多文按脈經云病人目無精光及牙齒黑色者不治又曰病人面白目黑者死此謂榮華已去血脈空存又曰病人齒忽變黑者十三日死口如魚口不能合氣出不返命飛陽潔古曰火勝迫於肺火喘而死肺敗也池氏曰口乃脾之竅口如魚口脾氣已絶也李晞範曰呼出心於肺吸入腎於肝呼因陽出吸隨陰入肝腎先敗止有心肺未絶所以有出而無入也李氏之說近是按脈經云病人口如魚口不能復閉而氣出不能反者死肩息直視及唇焦面腫蒼黑也難逃張世賢曰肩息者氣喘而兩肩動也直視者睹物而不轉睛也唇焦心家熱也面乃心之候黑乃腎之色上句是心絶下句是肝絶心肝既絶命故難逃愚謂肩息肺絶直視肝絶唇焦脾絶面腫心絶蒼黑腎絶按脈經云病人目直視肩息者一日死又曰病人唇口忽乾者不治又曰病人卒腫其面蒼黑者死經云病心絶一日死何以知之肩息回視立死妄言錯亂及不語尸臭元知壽不高脈經云病人妄言錯亂及不能語者不治熱病者可治又曰尸臭者不可治愚謂妄言錯亂神妄失守也心脾腎三經之脈皆循喉嚨夾舌本不語者三經之脈不能上通於舌也人將死必有一臟先壞腐壞則穢惡之氣外泄故尸臭也人中盡滿兼唇青三日須知命必傾愚按人中及唇乃脾胃之所主也人中滿而唇青則脾胃之土已壞而厥陰之木乘之以日數斷之三乃木之主數土得木而絶矣按脈經云病人唇青人中滿者死兩頰顴赤人病久靈樞五色篇云赤色出兩顴大如拇指者病雖小愈必卒死魏氏曰眼眶下高骨之中名顴顴下名臉面外名頰顴面頰臉心火所屬久病而赤乃精神外泄脈經云病人耳目及顴頰赤者死在五日中戴氏以兩頰為贅詞而改為庭黑何也口張氣直命難存熊宗立曰口乃脾之竅脾絶口不能合肺絶則氣出不能返按脈經云病人口張者三日死又曰脈絶口張足腫五日死足趺趾腫膝如斗十日須知難保守張世賢曰脾主四肢足趺乃胃經所行之處脾胃將絶則有是證脾胃屬土十日者土之成數也故死不過十日也按脈經云足趺腫兩膝大如斗者十日死又云足趺腫嘔吐頭重者死項筋舒直定知殂他本直作展張世賢曰項筋舒展因督脈已絶是也熊宗立謂腎脈絶非也掌內無紋也不久張世賢曰掌內無紋心包絡脈絶也脈經云病人掌腫無紋者死唇青體冷反遺尿背面飲食四日期池氏曰唇青體冷乃真氣欲絶遺尿不禁乃膀胱不藏背面飲食乃神去不守人之神氣生於肝神不守則肝絶不出金數而死也池氏之說亦是愚謂唇青體冷則純陰而無陽背面飲食則畏陽而就陰遺尿則腎氣已絶而無藏德至四日而金寒水冷魂魄不拘矣不死何俟按脈經云脾病唇青肝之色甲乙日死又曰病唇青人中及三日死手足爪甲皆青黑能過八日定難醫李晞範曰肝之餘筋也其榮爪肝色青腎色黑腎水不能生肝水木二臟俱敗故泄其色於外肝至木成數而死可知矣李氏之言如此與理不合何也夫既曰肝色青又兼黑色則為腎水來生肝木何為二臟俱敗也況肝至八日既遇木之成數適當其旺何云死也據愚言之當曰肝色青內其主血外其榮筋爪者筋之餘也得血以養故赤色華之今肝臟已敗則血先竭而厥陰真藏之色現於爪厥陰者陰之盡也木死則如已燃之薪故色兼黑然八日之內尚有木之成數故曰能過八日至九日則為金之成數木得金而折故死也按脈經云病人爪甲青者死又云病人手足爪甲下肉黑者八日死脊痛腰重反覆難此是骨絶五日看腎主骨腰者腎之府腎水足則有髓二道夾脊而上通於腦今腎衰則精髓枯竭故脊痛脊痛腰重而至不可反側則腎將憊而骨已絶矣五為土之生數水見土則絶體重溺赤時不止肉絶六日便高拼張世賢曰體重肉絶脾也溺出不止腎也土勝水死期故曰六日六乃水成數也張氏之言如此夫既以體重肉絶為脾敗則土已不能勝水矣何以又云土勝水死期在六日也愚按華他內照云肉絶六日死何以知之舌腫溺血大便赤然也華他之言如此此為心火熾甚之疾火炎則土燥故肌肉消灼而體重也心火甚則移於小腸故溺赤不止也亢極則害承乃制故至水之成數之日而死也戴起宗脈訣刊誤不知華他內照而但曰中藏經元無謂脈訣自增可恥甚矣手足甲青呼罵多筋色九日定難過李晞範曰爪者筋之餘筋者肝之餘肝主怒在聲為呼今爪甲皆青怒聲呼罵乃肝氣太過過則極極則絶肝屬木至金成數九日而死按經云病人筋絶九日死何以知之手足爪甲青呼罵不休又髮直如麻甲青者死髮直如麻半日死熊宗立釋髮直乃心與小腸絶謂發為血之餘血敗則發枯硬直其說亦是但半日死未詳疑誤不敢強釋姑俟後考張世賢又云發如麻者肺氣絶也按脈經云病人髮直者十五日死又曰發如干麻善怒者死又曰發與眉衝起者死據中藏經曰腸絶髮直汗出不止不得屈伸者六日死又曰髮直者十五日死尋衣語死十知麼張世賢曰尋衣語死神不守舍也愚謂若依死在十日當是腎衰水涸不能上榮於目致目虛眩視物不真故循衣語死至十日則為土之成數水見土而絶矣按脈經云病人循衣縫讝語者不可治又按丹溪心法能合色脈可以萬全論欲知其內者當以觀乎外診於外者斯以知其內蓋有諸內者形諸外苟不以相參而斷其病邪之逆順不可得也為工者深燭厥理故望其五色以青黃赤白黑以合於五臟之脈窮其應與不應切其五脈急大緩澀沉以合其五臟之色順與不順誠能察其精微之色診其精妙之脈內外相參而治之則萬舉萬全之功可坐而致矣素問曰能合色脈可以萬全其意如此原夫道之一氣判而為陰陽散而為五行而人之所稟皆備焉夫五脈者天之真行血氣通陰陽以榮於身五色者氣之華應五行合四時以彰於面唯其察色按脈而不偏廢然後察病之機斷之以寒熱歸之以臟腑隨證而療之而獲全濟之效者本於能合色脈而已假令肝色如翠羽之青其脈微弦而急所以為生若浮澀而短色見如草滋者豈能生乎心色如雞冠之赤其脈當浮大而散所以為順若沉濡而滑色見如衃血者豈能順乎脾色如蟹腹之黃其脈當中緩而大所以為從若微弦而急色見如枳實者豈能從乎肺色如豕膏之白其脈當浮澀而短所以為吉若浮大而散色見如枯骨者豈能吉乎以至腎色見如烏羽之黑其脈沉濡而滑所以為生或脈來緩而火色見如炲者死死生之理夫惟診視相參既已如此則藥證相對厥疾弗瘳者未之有也抑嘗論之容色所見左右上下各有其部脈息所動寸關尺中皆有其位左頰者肝之部以合左手關位肝膽之分應於風木為初之氣顏為心之部以合於左手寸口心與小腸之分應於君火為二之氣鼻為脾之部合於右手關脈脾胃之分應於濕土為四之氣右頰肺之部合於右手寸口肺與大腸之分應於燥金為五之氣頭為腎之部以合於左手尺中腎與膀胱之分應於寒水為終之氣至於相火為三之氣應於右手命門三焦之分也若夫陰陽五行相生相勝之理當以合之於色脈而推之也是故脈要精微論曰色合五行脈合陰陽十三難云色之與脈當參相應然而治病萬全之功苟非合於色脈莫之能也五臟生成篇云心之合脈也其榮色也夫脈之大小滑澀沉浮可以指別五色微甚可以目察繼之以能合色脈可以萬全謂夫赤脈之至也喘而堅白脈之至也喘而浮青脈之至也長而左右彈黃脈之至也大而虛黑脈之至也上堅而大此先言五色次言五脈欲後之學者望而切之以相合也厥後扁鵲明乎此述之曰望而知之謂之神切脈而知之謂之巧深得內經之理也下逮後世有立方者目之曰神巧萬全厥有旨哉五臟察色歌肝臟歌面腫蒼黑舌卷青四肢力乏眼如盲泣下不止是肝絶八日應當命必傾張世賢曰青肝之色也舌卷青者子見母色也四肢乏力者筋不能維持也肝不能含血榮目則眼如盲津液出泄則泣出不止凡此數者皆肝絶所致金能剋木故死於金旺之日八日從明日數至辛日也經曰足厥陰氣絶則筋縮引卵與舌卷厥陰者肝脈也肝者筋之合也筋者聚於陰器而絡於舌本故脈不營即筋縮急筋縮急即引卵與舌舌卷卵縮此筋先死庚日篤辛日死按脈經云病人肝絶八日死何以知之面青但欲伏眼目視而不見人汗出如水不止心臟歌面黧肩息直視看又兼掌腫沒紋斑狂言亂語身悶熱一日之內到冥間張世賢曰黧黃黑色也掌腫無紋心氣絶也一乃水之成數水剋火故死在一日之內經曰手少陰氣絶則脈不通脈不通則血不流血不流則色澤去故面色黑如黧此血先死壬日篤癸日死按脈經曰病人心絶一日死何以知之肩息回視立死脾臟歌臍趺腫滿面浮黃泄利不覺汙衣裳肌內粗澀兼唇反一日十二內災殃張世賢曰臍神闕也趺足跗上也浮黃黃腫也經曰足太陰氣絶則脈不榮其口唇口唇者肌肉之木也脈不榮則肌肉不滑澤肌肉不滑澤則肉滿肉滿則唇反唇反則肉先死甲日篤乙日死按脈經云病人脾絶十二日死何以知之口冷足腫腹熱臚脹泄利不覺出無時度肺臟歌口鼻氣出不復回唇反無紋黑似煤皮毛焦乾爪枯折途程三日定知災張世賢曰氣出不復回有呼無吸也唇反土不能生金也黑似煤金不生水也氣不流通則皮毛焦乾魂魄不連則爪甲枯折從甲至丙三日也丙屬火火剋金故死在三日經曰手太陰氣絶即皮毛焦太陰者肺也行氣溫於皮毛者也氣弗營則皮毛焦皮毛焦則津液去津液去則皮毛枯折毛折者則毛先死丙日篤丁日死按脈經云病人肺絶三日死何以知之口張但氣出而不還腎臟歌面黑齒痛目如盲自汗如水腰折頻皮肉濡結髮無澤四日應當命不存張世賢曰面黑面如垢也目如盲瞳人反背也自汗如水火獨炎也腰乃腎之府腎敗則腰似折不能榮於骨髓而骨肉不相親濡肉而卻不能為五液之主故發不潤澤從甲至戊越四日也戊屬土土剋水故命不存經曰足少陰氣絶即骨枯少陰者冬脈也伏行而溫於骨髓故骨髓不溫即肌肉不著骨骨肉不相親即肉濡而卻肉濡而卻故齒長而枯發無潤澤是骨先死戊日篤己日死按脈經云病人腎絶四日死何以知之齒為暴枯面為正黑目中黃色腰中欲折自汗出如流水診婦人有妊歌肝為血兮肺為氣血為榮兮氣為衛陰陽配偶不參差兩臟通和皆類例此言胎脈至不一也然不外乎氣血二者而已肝主血肺主氣血為榮氣為衛榮為陰衛為陽大言陰與陽小言夫與婦然吾人身中亦有夫婦之道陰陽二氣是也陰陽配匹而後胎始成所謂皆類例者何也修煉家以肝為木公以肺為金母雖則各守方隅必相鈐相制而大藥始成故參同契二八弦氣章曰舉東以合西魂魄自相拘故胎藏之成亦由肝肺二藏氣血交通陰陽配匹而後胎藏始結也血衰氣旺定無妊血旺氣衰應有體或難曰夫前既曰陰陽配匹氣血通和而後胎始生也安有血旺氣衰而曰有體者未之信也不知陰陽造化之事至不測也嘗見壯實女子而反不生育黃瘦女子而反能生育者此之謂也況有男子其病將危與女人交尚然有孕則其陽施陰化不測之妙在於頃刻則不待氣血充實而後胎可成也然胎乃有形之物血亦有形之物故以血為要肝主血木也肺主氣金也故張世賢引內經云金木者生殺之本始木多而生金多而殺其說是也寸微關滑尸帶數流利往來並雀啄小兒之脈已見形數月懷耽猶未覺經云陰搏陽別謂之有子所謂陰搏陽別者謂尺脈搏擊於指下大有別於關前之陽脈即寸微尺數之謂也所謂關滑者何也榮出中焦滑為血多氣少之脈流利往來滑之象也雀啄者滑數之中忽一止也以上之脈是皆經閉不行懷耽之脈他病見雀啄則死惟經閉不行則為有妊有一婦人其兄亦知醫因病請兄診之大訝曰脈見雀啄其病不祥後延豫診之問曰經閉幾月耶對曰四月矣豫曰無傷也乃妊脈也後果有孕左疾為男右為女流利相通速來去兩手關脈大相應已形亦在前通語男道尚左女道尚右況兩太陽俱在左兩太陰俱在右故左手脈滑疾為懷男右手脈滑疾為懷女流利相通速來去者乃滑疾之體也左關屬肝肝主血木為生氣之方右關屬脾脾攝血土為萬物之母兩手關脈相應而大則胎已成形然胎脈至不一也或有寸微關滑尺帶數者或有流利往來並雀啄者或有兩手關脈相應大者脈雖不同是皆為有體之脈可與前訣通斷之也左手帶縱兩個男成自明曰縱者夫行乘妻水行乘火金行乘木即鬼賊脈也名曰縱則懷兩個男兒也右手帶橫一雙女成自明曰橫者妻乘夫也是火行乘水木行乘金即所勝脈也名曰橫見於右手則懷一雙女兒也愚謂自明所云木行乘金則誠然矣所謂火行乘水則未也何則右手無水脈也當云木行乘金水行乘土則無遺議矣左手脈逆生三男成自明曰逆者子乘母也是水行乘金火行乘木即己生脈也名曰逆見於左手則懷三個男兒也自明之言如此夫既云左手則不得有所謂水行乘金矣愚謂當云土行乘火火行乘木木行乘水左手三部脈若見如是則當生三男也右手脈順産三女成自明曰順者母乘子也是金行乘水木行乘火即生己之脈也名曰順見於右手則懷三個女兒也自明之言如此夫既云右手則安得有所謂金行乘水耶愚按當云土行乘金火行乘土木行乘火若右手三部見如是之脈則當産三女也寸關尺部皆相應一男一女分形證成自明曰寸關尺部脈大小遲疾相應者是懷一男一女形證之脈謂關前為陽關後為陰陰陽脈相應故懷一男一女也愚謂此二句正按上文縱橫順逆右左而言其意蓋曰假令左手或寸或關或尺而帶縱或帶逆而右手或寸或關或尺或帶橫或帶順則當斷之一男一女也有時子死母身存或即母亡存子命成自明曰此二句之文無辨子母存亡之法往來三部通流利滑數相參皆替替陽實陰虛脈得明遍滿胸膛皆逆氣成自明曰若寸關尺三部通行流利皆替替有力而滑數乃陽實陰虛之脈主妊婦逆氣遍滿胸膛而不順也愚謂不然上二句言替替然滑數之脈流利往來於三部之中乃純陽正陰和合交結有妊之脈也下二句言妊娠之脈關前宜弱關後宜盛今關前為陽而反盛開後為陰而反弱則氣有升而無降所以遍滿胸堂皆逆氣也左手太陽浮大男右手太陰沉細女諸陽為男諸陰女指下分明須記取李晞範曰前有左疾為男右為女之句後有弦緊牢強滑者安沉細而微歸泉路之辭此言左手太陽浮大男正合妊娠經旨至於右手太陰沉細女似有可疑蓋妊娠之脈當現滑數若沉細則氣血俱衰安得有娠藉以右手屬陰陰脈沉主生女亦當曰沉而石始可望其女胎之有成豫僭之以為右手太陰沉石女愚按脈賦亦云太陰洪而女孕晞範之言當矣愚謂兩太陽俱在左言左手太陽浮大男者謂左寸與左尺俱浮大也兩太陰俱在右言右手太陰沉細女者謂右寸與右關俱沉細也夫浮大為陽兩太陽俱浮是諸陽為男矣沉細為陰兩太陰俱沉細是諸陰為女矣然此訣之所謂沉細不過為右手之寸關而言非六部俱沉細也亦不過言沉細非若末後所言沉細而微也何必改細為大也三部沉正等無疑脈經云左右三部脈沉浮正等按之不絶者妊娠也今訣無左右字並浮字非違經旨乃限於七字成文而略之也蓋云若診左右三部浮沉正等者則為胎脈無疑矣尺內不止真胎婦經云腎名胞門子戶尺中腎脈也尺中之脈按之不絶法妊娠也即賦中所云尺中不絶胎脈方真夫乘妻兮縱氣霧妻乘夫兮橫氣助子乘母兮逆氣參母乘子兮順氣護李晞範釋云陰陽配合二氣交感若陰血先至陽精後沖縱氣來乘如霧露之降血開裹精陰外陽內陰包陽胎此謂夫乘妻兮縱氣霧則男形成矣若陽精先入陰血後參兩旁橫氣之來佐助而精開裹血陰內陽外陽包陰胎此謂妻乘夫兮橫氣助則女形成矣男形之成則子乘母為逆氣相參合也女形之成則母乘子為順氣以相護衛也凡胎氣聚必縱橫順逆四氣以榮養方成胎而為男女李氏之言如此又成自明釋曰縱者夫乘妻也水行乘火金行乘木即鬼賊脈也縱氣霧霧者露也又上下也夫之陽氣乘妻之陰氣二氣上下相逐如霧潤結子也橫者妻乘夫也謂兩傍橫氣相佐助也逆者子乘母也謂子氣犯母氣相乘逆行之氣相參合也順者若母氣乘於子氣為順氣相護衛也凡胎聚縱橫逆順四氣以榮養方以成形也成氏之言如此觀二氏之說皆不明瞭李氏以夫妻子母屬於人身以縱橫順逆屬於精氣血與前訣左手帶縱右手帶橫左手脈逆右手脈順等語不相符合成氏之言雖是惟於左手帶縱一句之釋為當其後三句又與理不相合無怪乎於聖賢精微之理愈晦而不明後之學者望洋而退耳不知此四句乃叔和正恐前文縱橫逆順之說難明故又以夫妻子母以自釋之耳其意蓋曰豫前所謂左手帶縱兩個男者何也謂夫乘妻也何謂夫乘妻也謂水行乘火金行乘木也何謂水行乘火金行乘木也謂左手寸脈當浮洪而反沉滑左手關脈當弦長而反澀短是為鬼賊之脈乃夫乘妻也左手二部若見如是之脈即為之縱縱者當産二男豫前又云右手帶橫一雙女者何也謂妻乘夫也何謂妻乘夫也謂木行乘金水行乘土也何謂木行乘金水行乘土也謂右手寸脈當浮澀而反弦長右手關脈當緩大而反沉小是為所勝之脈乃妻乘夫也右手二部若見如是之脈即謂之橫橫者當産二女豫前又云左手脈逆生三男者何也謂子乘母也何謂子乘母也謂土行乘火火行乘木木行乘水也何謂土行乘火火行乘木木行乘水也謂左手寸脈當浮洪而反緩慢左手關脈當弦長而反浮洪左手尺脈當沉滑而反弦長是為已生之脈乃子乘母也左手三部若見如是之脈即謂之逆逆者當生三男豫前又云右手脈順産三女者何也謂母乘子也何謂母乘子也謂土行乘金火行乘土水行乘木也何謂土行乘金火行乘土水行乘木也謂右手寸脈當浮澀而反緩大右手關脈當緩大而反洪數右手尺脈當沉滑而反弦長是為生已之脈乃母乘子也右手三部若見如是之脈即謂之順順當産生三女噫此乃叔和獨得之妙發前人所未發故反覆言之欲以開後人之眼目何妨自我作古而戴起宗之流不能明析此理而反詆其脈經所無俱為改頭換足何其有面無目有目無心也豫為是訣橫於胸者數十載今方得詳明釋之願後之學者當潛心聖賢之教勿為邪說所誤可也按仲景全書問曰脈有相乘有縱有橫有逆有順何謂也師曰水行乘火金行乘木名曰縱火行乘水木行乘金名曰橫水行乘金火行乘木名曰逆金行乘水木行乘火名曰順小兒日足胎成聚身熱脈亂無所苦汗出不食吐逆時精神結構其中住池氏曰婦人初系胞胎乃天一生水二月受火之氣其妊婦身熱脈亂汗出不食吐逆惡阻三月受木之氣精神結構在其中任氣和以榮其子子氣以潤其母而二氣榮潤其子安住滑疾不散胎三月但疾不散五月母成自明曰妊娠三月名始胎此是未有定據心胞脈養之故脈見滑疾流利為少氣多血不散為血氣盛則始結為胎也其脈但疾數而不散者是五個月懷胎之母也張世賢曰滑疾不散而形始成也但疾不散兒形已成也小兒在母腹中三月形始成五月則形成矣按二氏之說俱湊泊語以愚觀之上句滑疾不散之不字乃而字之誤何以知之試觀脈經云脈滑疾重以手按之散者胎已三月也脈重按之不散但疾不滑者五月也其意蓋曰三月而手厥陰胞絡養胎此時未有定據故滑疾而散五月則足太陰脾經養胎此時已分男女故滑疾不散也是以知不字之誤無疑按脈經云婦人懷胎一月之時足厥陰脈養二月足少陽脈養三月手心主脈養四月手少陽脈養五月足太陰脈養六月足陽明脈養七月手太陰脈養八月手陽明脈養九月足少陰脈養十月足太陽脈養諸陰陽各養三十日活兒手太陽少陰不養者下主月水上有乳汁活兒養母懷娠者不可灸刺其經不墮胎弦緊牢強滑者安沉細而微歸泉路通津子曰前有太陰沉細之說為有妊平安之脈及此又以沉細而微為死脈似乎相反蓋叔和以妊婦之脈弦牢緊滑為平脈其三部之脈或俱沉細而微則為死矣成自明曰孕婦之脈宜弦緊牢強滑利為安吉之脈若沉細而微謂脈與形不相應故云死也前文雖云太陰沉細又云諸陰為女其說亦有相違謂三部脈不皆沉細及微故不同也愚謂二氏之說皆是也經云婦人妊娠七月脈實大牢強者生沉細者死又云婦人妊娠八月脈實大牢強弦緊者生沉細者死兩觀經文與訣無異成自明集婦人良方全引用此訣而復論之薛氏云愚按前訣與脈訣所云不同觀者當自推之妊娠漏胎候歌血下如同月水來漏極胞干主殺胎亦損妊母須憂慮爭取神丹救得回通真子曰此只論漏胎候也夫胎之漏或食動胎之物或因熱毒之氣侵損或因入房勞損損輕則漏輕損重則漏重但血盡則死然安胎有二法因母病而動胎但治母疾其胎自安若胎有不堅緻動母因以病但治胎則母自安通真子之言如此然亦未嘗反覆思之耳夫胎之在母腹也一呼一吸皆賴母氣以全即胎有不堅亦是母之氣血未足但治母病其胎自安理固然矣至於復云但治胎則母自安試問治母有法治胎何法假令治胎亦是治母則又何分胎與母哉通真子之言亦穿鑿矣巢元方云漏胎者謂妊娠數月而經水時下此由衝脈任脈虛不能約制太陽少陰之經血故也衝任之脈為經脈之海皆起於胞內手太陽小腸脈也手少陰心脈也是二經為表裡上為乳汁下為月水有娠之人經水所以斷者壅之以養胎而蓄之為乳汁衝任氣虛則胞肉泄漏不能制其經血故月水時下亦名胞阻漏血盡則人斃矣元方之言是也但漏之極不獨胎干而死其母亦可慮也宜早為推其所致之因而治之庶子母兩全矣故薛立齊曰前證若因風熱用防風黃芩丸若因血熱用加味逍遙散若因血虛用二黃散若因血去太多用八珍湯未應補中益氣湯若因肝火用柴胡山梔散若因脾火用加味歸脾湯若因月事下血作痛用八珍湯加阿膠熟艾若因脾胃虛弱用補中益氣湯加五味子若因脾胃虛陷用前湯倍用升麻柴胡若晡熱內熱宜用逍遙散妊娠心腹急痛歌心腹急痛面目青冷汗氣絶命必傾巢元方曰妊娠心腹痛者或腹內宿有冷痰或新觸風寒皆因臟腑虛而致發動邪正相擊而並於氣隨氣下上上衝於心則心痛下衝於腹則腹痛故令心腹痛也妊娠而痛之者正邪二氣交擊於內若不時瘥者其痛沖胞絡必致動胎甚則傷墮池氏曰妊娠心腹忽然急痛乃血乾胎損動之所致面目青出冷汗者乃心與脾無血以養而氣欲絶也愚按薛立齊婦人良方有鉤藤湯專治妊娠胎動腹痛面青冷汗氣欲絶者即此是也血下不止胎衝上心腹冷悶定傷身若血下不止則胎隨氣上而衝心腹心腹暖則子猶未死或有可救若以手按之其胎不動更加心腹冷而且悶則胎已死矣何用安胎為哉按巢氏病源曰妊娠胎死腹中候此或因驚動倒朴或染溫疫傷寒邪毒入於胞藏致令胎死其候當胎處冷為胎已死也妊娠倒僕損傷歌墮胎倒僕舉重輕致胎死在腹中居已損未出血不止衝心悶痛母魂孤或因跌僕或舉重輕以致胎損腹中血下過多而不止則血乾胎死胎愈枯燥不能得出則衝心悶痛其母命亦難存矣按巢氏病源曰妊娠僵仆胎上搶心下血候此謂行動倒僕或從高墮下傷損胞絡致血下動胎而血傷逆氣者胎隨氣上搶心其死生之候其母舌青者兒死母活唇口無沫兒生唇青沫出者母子俱死唇口赤舌青者母死兒活若血下不住胞燥胎枯則令胎死産難生死候歌欲産之婦脈離經沉細而滑也同名夜半覺痛應分誕來朝日午定知生脈經云婦人懷妊離經其脈浮設腹痛引腰脊為欲生也但離經者不病也又云婦人欲生其脈離經半夜覺日中則生也兩觀經文與訣無異難經曰至之脈一呼三至曰離經損之脈一呼一至曰離經皆病脈也惟孕婦則不然倘診得其脈或一呼三至或一呼一至脈雖離經然非病脈乃欲産之脈也或若診得其脈沉細而滑亦同名為欲産之脈勿聽子釋為沉細而滑亦謂之離經非也至於夜半覺痛知來朝日午當生者子午對衝是以知其生也舉一隅而反當云醜痛則未生寅痛則申生卯痛則酉生辰痛則戌生巳痛則亥生此其常也變則不拘日數矣按聖惠方云夜半子時覺腹痛來日午時必定生産謂子午相半正半日觀數也身重體寒熱又頻舌下之脈黑復青及舌上冷子當死腹中須遺母歸冥凡妊婦臨月之時但覺其身體沉重如無他苦自然氣血和暢如果熟蒂脫而子母俱安矣今寒熱頻頻往來者乃陰陽兩虛母氣虛脫本實先撥則無以榮養其胎而子死矣何以知之舌下之脈腎脈也腎系胞舌下之脈黑而復青則死色現於舌矣舌以候子舌冷而至反厥則子死無疑子既已死而又不得出遺於母腹中母難望其生也面赤舌青細尋看母活子死定應難唇口俱青沫又出母子俱死總高判面青舌青沫出頻據理當云面青舌赤若云舌青與理不合恐舌青之青字為誤母死子活定知真不信若能看應驗始知賢哲不虛陳大抵妊娠生死之候面以候母舌以候子一定之論也巢氏病源曰候其母面赤舌青者兒死母活母唇口青兩邊沫出者母子俱死面青舌赤口中沫出母死子活此從古賢哲相傳如是定不虛陳也新産生死候歌欲産之脈緩滑吉實大弦急死來侵池氏曰新産氣血虛損如見緩損脈乃脾胃氣和則為吉實大弦急之脈乃肝木勝脾土木旺土衰胃氣損而死其說亦是愚謂凡病脈貴乎相當血虛脈虛理也今新産則血已虛矣其脈如緩而且滑則吉何也緩則胃氣存滑則血不甚衰故曰吉若脈見實大弦急則胃氣衰而風火乘之是證脈不相當矣故曰死來侵也若得重沉小者吉忽若牢強命不停成自明曰若産婦診得沉重微小者是形虛相應故云吉兆之脈忽然診得堅硬牢實之脈是脈盛形衰相反性命不可停流而死也寸口澀疾不調死沉細附骨不絶生審看此候分明記常須念此向心經寸口者十二經脈之所會也新産而見澀疾不調澀疾則血已衰不調者無復倫次是以知其當死若診得其脈沉細附骨而往來反絶是血脈雖去而元氣尚存正與新産之證相合故曰生也妊娠傷寒歌傷寒頭痛連百節氣急衝心溺如血上生斑點赤黑時壯熱不止致胎滅夫妊娠大事也傷寒大病也妊娠而兼傷寒其險可知矣巢元方曰人體虛而為寒所傷即成病為傷寒也輕者嗇嗇惡寒吸吸發熱微咳鼻塞數日乃止重者頭痛體疼憎寒壯熱久不歇亦傷胎也巢氏之言如此然胎之所以傷者何也凡胎喜涼而惡熱故安胎之藥多用寒涼黃芩薄荷之類是也夫傷寒為熱病今壯熱不止則胎不安胎不安則上衝心而氣急下溺赤而如血熱毒攻於陽明則生赤黑斑點內外俱為熱毒所傷而胎未有不殞者矣在知機之士預為防護隨其證而調治之如發斑黑色小便如血氣喘急胎欲落者梔子仁湯壯熱頭痛者梔子五物湯斑黑溺血者升麻六物湯發斑黑小便如血胎欲落者梔子升麻湯外用伏龍肝井底泥土方塗臍下庶可免其殞滅之患也嘔逆不止心煩熱腰背俱強胎痛裂六七日來熱腹中小便不通大便結巢氏病源曰妊娠大小便不通若熱結膀胱大便不通熱結小腸小便不通若大小腸俱為熱所結故煩滿大小便不通也凡大小便不通則內熱腸胃氣逆今變乾嘔也又曰婦人腎以系胞妊娠而腰痛甚者多墮胎也潔古曰懷妊婦人傷寒病者須問大小便大小便如利知不殞胎黃龍湯主之薛立齊治妊娠熱病頭痛嘔吐煩悶人參竹茹湯或補遺蘆根湯六七日來大小便祕澀大黃飲又時氣六七日大小便不利消熱飲産後傷寒歌産後因得熱病臨脈細四肢暖者生脈大忽然肢逆冷須知其死莫留停傷寒論陰病得陽脈者生陽病得陰脈者死此大法也惟産後則不同血虛脈亦虛故診得細脈不得謂之陽病見陰脈但四肢欲暖暖者陽病易已也若診脈大大為血虛血虛為無陰無陰則偏陽隆盛身雖熱而四肢逆冷此乃空得陽脈而陽氣已絶不得謂之陰病見陽脈也須知死而已矣小兒生死候歌小兒乳後輒嘔逆更兼脈亂無憂慮巢氏病源曰小兒變蒸者以長血氣也變者上氣蒸者體熱變蒸有輕重其輕者體熱而微驚耳冷髖亦冷上唇頭白泡起如死魚目珠子微汗出近者五日而歇遠者八九日乃歇其重者體壯熱而脈亂或汗或不汗不欲食食輒吐哯無所苦也變蒸之時目白睛微赤黑睛微白赤無所苦蒸畢自明瞭矣先變五日後蒸五日為十日之中熱乃除變蒸之時不欲驚動勿令傍邊多人變蒸或早或晚依時如法者少也初變之時或熱甚者違日數不歇審計日數必是變蒸服黑散發汗熱不止者服紫雙丸小瘥便已勿復服之其變蒸之時遇寒加之則寒熱交爭腹痛夭矯啼不止者尉之則愈變蒸與溫壯傷寒相似若非變蒸身熱耳熱髖亦熱此乃為他病可為余治審是變蒸不得為余治其變日數從初生至三十二日一變六十四日再變變且蒸九十六日三變變者丹孔出而泄也至一百二十八日四變變且蒸一百六十日五變一百九十二日六變變且蒸二百二十四日七變二百五十六日八變變且蒸二百八十八日九變三百二十日十變變且蒸積三百三十日小蒸畢後六十四日大蒸後百二十八日復蒸積五百七十六日大小蒸畢也弦急之時被風纏小兒脈見弦而急當是風氣所纏何也弦肝木也肝主風弦而且急則為風寒之氣所纏矣一本作被風氣纏錢仲陽云小兒之脈氣不和則弦急幼科當以錢氏為的脈緩即是不消乳小兒脈一息六七至為平何也蓋以人身之脈不論大小一日一夜皆五十周於身得一萬三千五百息脈行八百一十丈此其常也但大人身量長大故以一息四至為平小兒身量短小亦必盡五十榮之數所以息則猶是而脈之丈尺促緊故以六七至為平也今脈見緩緩則小駛於遲矣緩為脾土之脈必脾胃虛不能消化乳食所以脈見遲也準繩脈法沉緩食傷多嘔吐又曰微緩脈乳不化泄瀉沉緩亦同緊數細快亦少若云岐子曰數而細快乃小兒平脈加之以緊亦有些須表邪虛濡邪氣驚風助小兒元陽之氣充足故脈五六至以上而有力為平今脈虛而濡則脾胃之氣衰而虛風乘之乃成驚風之候然驚有二種曰急曰慢急者屬陽陽動而躁疾慢者屬陰陰靜而遲緩皆因臟腑虛而得之虛能發熱熱則生風是以風生於肝痰生於脾驚出於心熱出於肝而心亦熱以驚風痰熱合為四證搐搦掣顫反引竄視為八候又急驚屬陽用藥以寒慢驚屬陰用藥以溫今脈見虛濡當是慢驚之候治者審之痢下宣腸急痛時下痢之證裡急而腹痛其本在脾腎其現證在手陽明大腸大腸屬庚金今脈見浮大浮大屬丙火來克庚金故痢下無巳時也小兒外證一十五候歌眼上赤脈下貫瞳人池氏曰赤脈屬心瞳人屬腎乃心火勝腎水水乾則不能生木致腎肝皆絶故也囟門腫起兼及作坑曾氏曰囟腫皆以為熱殊不知有陰陽二證切宜詳辨堅硬為陰紅軟為陽故嬰孩寶書曰寒氣上衝則牢𩊅熱氣上衝則柔軟正此之謂若陰證以勻氣散理中湯主之陽證用玉露飲當歸散防風湯為治玉環集歌曰囟門腫起定為便此候應須也不中或若加坑如盞足七日之間命必終曾氏又曰囟陷者虛之極也胃氣虛寒則囟陷慢驚中有之胃寒脾困吐瀉者為虛極急以金液丹固真陽及諸般救元等藥治之外貼以烏附膏有後枕陷者其證尤重治法與陷囟藥同不效亦為難療此大虛極百無一活耳鼻乾黑燥勿聽子曰鼻乃肺之竅黑燥而干是為肺絶云岐子云火剋金也愚曰即所謂人病鼻如煙煤者死也肚大青筋肚脹腹大脾虛也肝主筋其色青今肚大而現青筋是肝木克脾土也目多直視睹不轉睛熱入於目牽其筋脈兩眥俱緊不能轉視故直視也勿聽子曰睛不能轉動而直視是太陽已絶也云岐子曰經云回則不轉是也指甲黑色勿聽子曰爪甲肝之榮華於外者也肝絶則不能蔭故色現黑愚謂肝主血其華在爪爪甲而現黑色是血先死故其色現如是忽作鴉聲勿聽子曰肺主氣發聲為言肺既絶故聲如鴉叫虛舌出口準繩作舒舌出口乃心絶並壬葵日死或曰舌乃心之苗心氣散則出不得收齧齒咬人腎主骨齒乃骨之餘虛則癢實則痛腎水虛竭則無以榮養其齒而齒癢故欲齧齒咬人也準繩云咬乳戛齒此腎絶也並戊己日死又小兒欲生齒亦然不在其例魚口氣急勿聽子曰口是脾之竅氣是肺所主脾敗而見魚口肺絶而息喘急啼不作聲云岐子謂哭而無聲是謂肺絶據準繩云肝病重啼哭無淚及病不哭下淚乃肝絶並庚辛日死蛔蟲既出必是死形李晞範曰蛔蟲生於脾胃之間全賴穀氣以為養故逆出於口鼻是胃絶也愚謂人身之有蛔蟲猶天地間之有龍也故蛔蟲謂之人龍夫龍何以秋冬則伏藏而春夏則升騰也蓋以龍之性喜暖而畏寒秋冬則陰氣在上陽氣在下故龍樂其暖而伏藏於九淵春夏則陽氣在上陰氣在下故龍畏其冷而不能安其身故升騰而上也夫蛔蟲亦然人身中之元陽足則蛔樂其暖以安其身而無擾動之患臟腑之陽氣衰而陰氣盛則蛔畏冷而不能安其身故逼迫而出於口鼻之上倘仁人用心求生於萬一切勿峻用苦寒之藥以速其亡焉可也用藥速救百無一生
