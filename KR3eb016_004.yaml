body:
  text: 卷四八里脈交變略例論潔古曰八里脈者乃右手三部寸關尺受邪者也陽乘陰也是微沉緩澀遲伏濡弱八里脈也有里之表乃三陰經絡各稱標之名也有里之裡者乃三陰之本脾腎肝總稱之名也且三陰標者為陰中之陽本者為陰中之陰也盛則歸於胃土乃邪染有形故里之表是陰中之陽當漬形以為汗宜發之主宜緩內經曰脈長者為外病脈短者為內病入里之脈俱短脈也俱在右手三部受邪者也病入於內為陽邪乘乎陰也顧有里之裡有里之表里之表者邪在三陰經絡中為三陰之標也三陰標者仍是陽邪尚未入於胃土故不可輕下而當緩散之若是里之裡陰中之陰也邪歸於胃土而染於有形迹之中下之則愈蓋里之表漬形以為汗者身膚漬漬潮潤乃陽邪在裡中之表本來正汗非若取汗之證發越而出者主宜緩也里之裡是陰中之陰分也當急下之客宜急是知諸中客邪當急諸主自病當緩前説七表乃春夏具三陽後説八里乃秋冬具三陰經中論反交錯生疾得本位以常法治中互相為病當推移所在主客相合脈證依緩急治之假令惡寒也里之表也當與麻黃附子細辛湯緩發之是漬形以為汗也如不惡風寒而反欲去衣身涼面目赤四肢逆數日不大便小便赤澀引飲身靜重如山譫語昏冒脈沉細而疾數者是足少陰經反受火邪是里之裡病乃陰中之陰陽邪也此客邪當速急下去之以大承氣湯除之里之裡者本中之裡也客邪盡淨里證急矣故宜急下凡客邪至於中者中在經絡之中雖為表而漸入里矣尚可緩乎故宜急表也諸主自病者非外來之病也五行中相乘相剋互相交變多見八里脈也宜分別脈證相合與相異治之有輕重之分如證宜急而脈不宜急者脈宜急而證不宜急者止從緩而不宜急也緩則能守其和平急則乃交錯生疾必當以本位常法治中當推移所在主客與相合脈證依緩急治之是多從脈而不從證也若是交變互相為病當分主客脈證或證當汗而脈不可汗證當下而脈不可下或脈可汗而證不可汗或證可下而脈不可下互相交變而又互相推移主客輕重與緩急之法如經中謂漬形以為汗者用麻黃又兼附子一以治標一以治本是從其緩也如不惡風寒而反欲去衣等證此是陰中之陽邪在內矣宜急治其里治其里是多從證而不從其脈也今將七表脈有下者八里脈有汗者七表脈有汗者八里脈有下者此四論為古今之則於七表脈論八里脈論內交五説之更有脈與證相雜之法當取仲景內桂枝脈里得麻黃證表麻黃脈得桂枝證遞用麻黃桂枝各半湯如桂枝證二停麻黃脈一停當用桂枝二麻黃一湯法或麻黃證二停桂枝脈一停當用麻黃二桂枝一湯法更有麻黃脈桂枝證取脈為主脈便為二停證為一停用麻黃二桂枝一湯法治之或桂枝脈麻黃證亦脈為二停證作一停用桂枝二麻黃一湯法治之大抵聖人謂脈者司人之命故以脈為主多從脈而少從證也舉世脈證交互二法是不合全從於脈亦不合不從於證如合證當兩取之如證在交變法中即合從脈不從證也然亦不拘亦當臨時消息傳受遞從元證來理所投去處沒天之時令且七表有下者為內外皆陽緩下八里有汗者為內外皆陰緩汗七表有汗者為外陽而內陰急汗八里有下者為外陽而內陰急下故素問説標本之化立四因之法為此一説也表裡標本之化七表論內説之脈證互參謂桂枝證得麻黃脈不宜過用麻黃必兼以桂枝勿使麻黃大泄之意此為證屬陰不足而脈屬陽有餘故用麻黃二多從脈之意桂枝一少從證之意不致偏僻之咎今其陰陽扶抑之法而太過不及自位乎中和之道也致中和天地位萬物育何病之有八里脈微脈指法主病一微者陰也指可尋之往來甚微再再尋之若有若無曰微主敗血不止面色無光微者陰土也何為陰土雨土濛霧之象也血實則脈實血虛則脈虛今云指下尋之往來甚微則陽已衰矣再再尋之若有若無則血已脫矣夫營出中焦中焦治則能攝血血足則能華色今脈見微則為陰盛陽虛不能攝血以致敗血不止血去則不能華色是以面色無光也按脈經云微脈極細而軟或欲絶若有若無一曰小也一曰手下快一曰浮而薄一曰按之如欲盡歌曰指下尋之有若無漩之敗血小腸居崩中日久為白帶漏下時多骨木枯指下尋之其中往來甚微再再尋之若有若無然何以至如是之虛也夫心主血者也脾攝血者也今脾不能攝血以至心包絡之血漩流而下入於小腸然小腸主出而不主納不能久居必下漏而為崩中之證矣然崩中日久則陰已衰而陽無所倚傳變而為虛寒白帶因之而下矣夫骨腎所主也腎主閉藏受五臟六腑之精而藏之斯骨有所濡潤而不至於枯稿今崩中而繼之以漏下則精血已竭骨無所濡而如木之枯稿矣按經云微則為虛又云微而緊者有寒又云微弱者有寒少氣又歌曰微脈關前氣上侵關前陽部也微脈而見關前則上焦之陽氣衰陽氣衰則陰氣上逆故曰氣上侵也按脈經云寸口脈微若寒為衄宜服五味子湯摩茱萸膏令汗出又云寸口微無陽外寒當關鬱結氣排心關主中州脾胃所居之地然脾為陰土生於相火胃為陽土生於心火微脈而見關中是為純陰而無陽矣陰霾之氣閉塞陽明之氣不行陽明者胃也胃之上管當於心下故曰鬱結氣排心也四氣調神論云陽氣者閉塞地氣者冒明此之謂也按脈經云關脈微胃中冷心下拘急宜服附子湯生薑湯附子丸針巨闕補之尺部見之臍下積身寒飲水即呻吟尺部者純陰之地寒水之鄉也所賴者下焦命門之真火相濟得以溫分肉消水氣不至有凝結積聚之患今尺部見微則下焦之元陽衰而身寒膀胱之寒氣結而臍下積矣然兩尺屬腎微為陰土土來剋水故引水以自救及至飲水則又無相火以溫暖分消復助寒氣故作痛而呻吟也按脈經云尺中微無陽厥冷腹中拘急又云尺脈微厥逆小腹中拘急有寒氣宜服小建中湯沉脈指法主病二沉者陰也指下尋之似有舉之全無緩度三關狀若爛綿曰沉主氣脹兩脅手足時冷沉者陰水也水性沉下尋之似有舉之全無水之性也水性漂流緩度三關水之狀也水性濡耎狀若爛綿水之形也然水性陰冷冷則生氣故氣脹兩脅而手足時冷也按脈經云沉脈舉之不足按之有餘一曰重按之乃得經云沉為水為實又為鬼疰歌曰按之似有舉還無氣滿三焦臟腑虛冷熱不調三部壅通腸健胃始能除夫沉脈主氣為諸陰之首今云按之似有舉還無是沉而無力也劉氏曰沉而無力為氣假令其人冷熱調和則臟腑充實而上中下三焦之氣自然和暢而無壅滯之患矣今因冷熱不調則衛氣不得行於陽分衛氣不行於陽分則三焦之氣滿而臟腑虛矣治之者當用辛溫之藥利之以通其腸復用溫補之藥和之以健其胃腸胃之氣宣通則三部之氣條達使衛氣復行於陽分而脈道自無沉匿矣按經云沉而遲腹藏有冷病又云脈來沉沉澤澤四肢不仁而重土祟又云沉而滑為下血亦為背膂痛千金方作下重又歌曰寸脈沉兮胸有痰寸部所以候胸中者今寸部見沉是為水氣泛而為痰矣按千金方云寸口脈沉而滑者胸中有水氣面目腫有微熱為風水又云寸口脈沉大而滑沉即為血實滑即為氣實血氣相搏入臟即死入腑即愈脈經云寸口沉胸中痛引背又云寸口脈沉胸中引脅痛胸中有水氣宜服澤漆湯針巨闕瀉之又云寸口脈沉胸中短氣又云寸口脈沉而堅者病在中又云寸口脈沉而弱者曰寒又云寸口脈沉而弱者發必墮落又云寸口脈沉而緊若心下有寒時痛有積聚又云寸口脈沉而喘者寒熱當關氣短痛難堪關所以候腹中者中氣溫和則舒暢而無痞滿疼痛之患矣今關中而見沉則為腹中有冷氣腹中有冷氣則閉塞而不通閉塞而不通則腹中疼痛呼吸不利而氣短難堪矣按脈經云關上沉心痛上吞酸又云關脈沉心下有冷氣苦滿吞酸宜服白薇茯苓丸針胃管補之若在尺中腰腳重小便稠數色如泔尺部者陰部也所以候腎與三焦膀胱者左腎主水右腎主火膀胱為水三焦為火故水火既濟陰陽相維而後腰腳得以便利水道得以澄清今尺中而見沉脈是有陰而無陽有水而無火致使陽氣不行則腰腳重滯決瀆失職而小便如泔矣按脈經云尺中沉引背痛又云尺脈沉腰背痛宜服腎氣丸針京門補之緩脈指法主病三緩者陰也指下尋之往來遲緩小於遲脈曰緩主四肢煩悶氣促不安按他本於小字下有一駛字緩者陰土也何為陰土皇極內篇以脾為二陰之土故也夫脾為二陰之土而脈緩者何也脈經新撰有曰脾者土也德則為緩恩則為遲是以太陰之脈緩而遲故指法曰指下尋之往來遲緩小於遲脈也脈經又曰緩脈小駛於遲何也夫駛者疾也大抵平人脈四至閏以太息共成五至遲脈者一息三至其意蓋曰緩脈者比平人之脈則又稍遲較之遲脈則又小駛耳故其主病則皆脾病經曰土不及其病內舍心腹外在肌肉四肢以其四肢屬脾故四肢煩悶也經又曰去不及甚病留滿痞塞病而留滿痞塞則中氣不和所以氣促不安也潔古曰證在太陽風傷衛當服桂枝湯易云四肢煩滿氣促不安枳朮湯主之按脈經云緩脈去來亦遲小駛於遲一曰浮大而散陰浮於陽同等歌曰來往尋之狀若遲腎間生氣耳鳴時邪風積氣衝背腦腦後三針痛即移緩脈指下尋之一來一往如絲在機不卷其軸其狀有似乎遲此太陰濕土之氣也土氣盛則下加於腎腎主藏者也腎氣被克而起故曰腎者生氣腎開竅於耳腎氣不藏則上衝於耳故又耳鳴況緩脈又主風痹之疾痹者風寒濕三者合而成也夫腎與膀胱相為表裡今脈而見緩知有積久之風邪濕氣循足太陽之經夾脊上衝於背而為疼痛治之者當於腦後針足太陽膀胱之穴以奪其風邪之氣則其痛自瘳矣他釋皆云當取之浮白穴奪腎之邪其痛即止腦後是浮白穴主耳聾背項痛也愚按浮白乃足少陽之穴非腎穴也其穴在耳後入發一寸非腦後也或者曰浮白乃足太陽少陽之會針之以取其邪焉可也張世賢曰太陽中風脈緩頸項強急難以轉側可針風池風府隱白三穴再服桂枝湯則痛可移也若緩大者屬脾脈按經云緩而滑曰熱中又歌曰緩脈關前搐項筋緩脈主濕經曰諸痙項強皆屬於濕關前寸部也寸主頭項之事寸部而見緩脈乃濕氣客於足太陽之經而項筋為之搐強矣按脈經云寸口脈緩皮膚不仁風寒在肌肉宜服防風湯以藥薄尉之摩以風膏灸諸治風穴當關氣結腹難伸脾主中州中州治則陰陽升降上下宣通而氣無結滯之患今緩脈見於關中乃陰邪濕氣結塞中州清者不得上升濁者不得下降而腹難以舒伸也按脈經云關脈緩其人不欲食此胃氣不調脾氣不足宜服平胃丸補肺湯針章門補之尺上若逢癥結冷夜間常夢鬼隨人尺上若逢緩脈則為冷氣結於下焦而為癥瘕之疾何也夫尺陰位也緩陰脈也冷陰氣也夜間陰盛之時也常夢鬼隨人者群陰合而從其類也按脈經云尺脈緩腳弱下腫小便難有餘瀝宜服滑石湯瞿麥散針橫骨瀉之澀脈指法主病四澀者陰也指下尋之似有舉之全無前虛後實無復攻序曰澀主腹痛女子有孕胎痛無孕敗血為病澀者陰金也何為陰金夫沉陰也澀為陰為里當於沉中候故指法曰尋之似有重手取之而似有亦不若他脈之往來分明也舉之全無謂浮取則不得也舉之全無則前虛矣尋之似有則後實矣脈經謂其往來難短且散即前虛後實之謂也無復次序者即參伍不調如雨沾沙之謂也夫脈者血之府也猶溝渠之水水多則滑水少則澀血盛則脈滑血虛則脈澀腹痛者血虛而作腹痛也血所以養胎者也若有孕而見澀脈則為血虛胎失其養而痛矣若無孕而見澀脈則為傷精敗血之證夫澀屬金為氣多血少即下文所云血衰氣旺定無妊血旺氣衰應有體也按脈經云澀脈細而遲往來難且散或一止復來一曰浮而短一曰短而止或曰散也丹溪心法曰澀為血虛為有郁歌曰澀脈如刀刮竹行丈夫有此號傷精婦人有孕胎中病無孕還須敗血成何謂如刀刮竹行謂其往來蹇澀中有一止也諸家論澀脈謂如輕刀刮竹但言其往來蹇澀未盡其如刀刮竹之旨所謂如刀刮竹者謂以輕刀刮竹遇節而即止故訣云澀脈如刀刮竹行也然丈夫以氣為主女子以血為主丈夫而見澀脈則為傷精之證以其精生於氣也至若女子而見澀脈則有胎病敗血之證以其胎養於血也按脈經云澀而緊痹病又云小弱而澀骨及經云滑者傷熱澀者中霧露按儒門事親云修弓杜匠其子婦年三十有孕已半歲矣每發痛則召侍媼待之以為將産也一二日復故凡數次乃問戴人戴人診其脈澀而小斷之曰塊病也非孕也脈訣所謂澀脈如刀刮竹形主丈夫傷精女人敗血治之之法有病當瀉之先以舟車丸百餘粒後以調胃承氣湯加當歸桃仁用河水煎乘熱投之三兩日又以舟車丸桃仁承氣湯瀉青黃膿血雜然而下每更衣以手向下推之揉之則出後三二日又用舟車丸以豬腎散佐之一二日又以舟車丸通經如前數服病十去九俟晴明當未食時以針瀉三陰交穴不再旬塊已沒矣此與隔腹視五臟者復何異哉又歌曰澀脈關前胃氣並關前寸脈也所以候中者胸為氣海足陽明之胃經為多氣多血之府今見澀脈則為血少血少則氣乘其虛而並居之故曰胃氣並也按脈經云寸口澀無陽少氣又云寸口脈澀是胃氣不足宜服乾地黃湯自養調和飲食針三里補之當關血散不能停關所以候中焦者也營出中焦澀為氣多血少當關而見澀脈則為中焦之血散而不守然有氣以行之故不能停止而復下也按脈經云關上澀無血厥冷又云關脈澀血氣逆冷脈澀為血虛以中焦有微熱宜服乾地黃湯內補散針足太衝上補之經云關上脈澀而堅大而實按之不減有力為中焦實有伏結在脾肺氣塞實熱在胃中注云澀脈與有力反今並言者浮之澀大按之堅澀故言有力也尺部如斯逢逆冷體寒臍下作雷鳴尺部乃寒水之鄉得相火以相濟故一身得以溫暖澀為陰金尺部而見澀脈母藏子宮則金不畏火是為金寒水冷而陽翳無光故體寒逆冷冷則生氣故臍下作雷鳴也按脈經云尺中見澀無陰厥冷又云尺脈澀足脛逆冷小便赤宜服附子四逆湯針足太衝補之又曰尺脈澀下血下利多汗遲脈指法主病五遲者陰也指下尋之重手乃得隱隱曰遲主腎虛不安遲者陰土也何為陰土土之性也緩遲則較緩更甚故亦曰土也觀其指法則曰重手乃得隱隱是病在裡而為陰可知矣自古遲則寒此節獨不言寒而專言腎虛不安者何也以遲為陰土是土不務其德而乘其所勝夫土所勝者水也腎為水藏乘其虛而克之腎其能安乎哉按脈經云遲脈呼吸三至去來極遲一曰舉之不足按之盡牢一曰按之盡牢舉之無有經云遲則為寒歌曰遲脈人逢狀且難遇其季夏不得痊神工診得知時候道是脾來水必干今人皆言三至為遲矣究未得遲脈之情狀也其於指下尋之重手乃得隱隱耳故曰遲脈人逢狀且難也今人皆言遲則為寒矣究未盡遲脈之體性也其理又主脾來剋水腎虛不安如此則遲脈不專主於寒可知矣然脈遲而曰遇其季夏不能痊者何也以遲脈屬土季夏又值土旺之時水得土而絶故曰遇其季夏不能痊也然季春季秋季冬皆土旺之日何獨見畏於季夏也不知季春雖土寄旺之月而木氣尚餘子能扶母即遲脈來見土其畏木而不暇剋水季秋亦土季旺之月而金氣尚餘金能生水縱遲脈來見子受母蔭而水不畏土季冬亦土寄旺之月水適當旺旺者不受邪縱遲脈來見亦無所畏惟季夏乃土正旺之時謂之長夏言其生長於火也況火為土之母所畏者水耳今借居土後則火挾子勢而反來侮水夫火乃耗水堅土之物也今得土以合之而水未有不涸者矣故曰遇其季夏不能痊也按經云遲而澀中塞有癥結又云遲而滑者脹又云遲而緩者有寒仲景曰如陽明脈遲不惡寒身體濈濈然汗出則用大承氣湯又潔古曰遲陰也季夏陽也此證為失時反候陰盛陽虛治之宜瀉心肺補肝腎瀉心者導赤散補腎者地黃丸又歌曰寸口脈遲心上寒寸口陽位也所以候胸中者也心居膈上遲脈為寒今見寸口故曰心上寒也按脈經云寸遲上焦有寒心痛咽酸吐酸水宜服附子湯生薑湯茱萸丸調和飲食以暖之脈影云手足厥冷氣脹攻痛主上焦寒當關腹痛飲漿難關所以候腹中者關脈見遲為寒濕之氣大作燥熱之氣不行寒濕之氣作故腹痛燥熱之氣不行故飲漿難也按脈經云關遲胃中寒宜桂枝丸茱萸湯針胃管補之脈影云關遲中焦寒吞酸吐水流入尺中腰腳重厚衣重覆地也嫌單尺部法地所以候腰以下之疾者遲為寒濕之脈腰腳者腎之所主尺部而見遲脈則為寒濕之氣客於下焦故腰腳重也人身之所以常溫暖者以下焦命門之真火得以溫分肉也今尺部而見陰寒之脈則寒氣作而真火無光是以厚衣重覆也嫌單耳按脈經云尺中遲下焦有寒背痛又云尺脈遲下焦有寒宜服桂枝丸針氣海關元補之伏脈指法主病六伏者陰也指下尋之似有呼吸定息全無再再尋之不離三關曰伏主毒氣閉塞三關四肢沉重手足時冷伏陰木也何謂陰木厥陰之木也厥陰者陰之盡也陰已極則陽將絶矣脈之所往來指下者正以陰陽相維和合交結而脈道乃行今陰已極而陽將絶則脈道不行故指下尋之似有呼吸定息全無即脈經所云伏脈極重手按之著骨乃得也然脈之所以往來於寸關尺部者正以三焦之氣呼吸相通耳今陰毒之氣壅遏三焦使榮衛之氣不得行於十二經隧之中故上焦絶則寸不行中焦絶則關不行下焦絶則尺不行雖依稀隱現於寸關尺部之中而實不能往來於上下故曰不離乎三關也四肢者諸陽之本也陽氣將絶故四肢沉重而手足時冷矣按脈經云伏脈極重指按之著骨乃得一曰手下裁動一曰按之不足舉之無有一曰關上沉不出名曰伏經云伏者霍亂歌曰陰毒伏脈切三焦不動榮家氣不調不問春秋與冬夏徐徐發汗始能消陰毒伏脈切三焦上文已詳言之矣所謂不動營家氣不調者何也蓋以寒傷營陰寒之氣壅遏三焦則營氣不行營不行則脈不出須得溫經發表之劑如陰毒甘草湯之類以調其榮氣而後脈始出也或曰溫經發表秋冬可施如遇春夏豈宜概用不知陰毒之證非他病可比溫經散表陽氣方回雖值春夏亦宜舍時從證故池氏曰積陰冷毒之氣而伏滯於三焦致衛氣不調榮血不行三焦之氣閉塞若有此證不必問四季須是發散通其三焦其病可除也夫所謂徐徐發汗者何也潔古曰漬形以為汗麻黃附子細辛湯或秋冬以升麻湯春夏以麻黃湯當緩與之經曰陰盛陽虛汗之則愈豫嘗讀史記左編一病人以冬月誤服白虎其脈伏而四肢厥冷諸醫擬進四逆理中等劑東垣曰不可只宜用輕清之劑引寒氣出於經絡之中如升麻防風羌活等藥其病果愈是皆徐徐發汗之義也戴起宗不知此理謂不當汗乃引仲景脈浮者病在表方可汗等語獨不知仲景亦常曰少陰病始得之反發熱脈沉者麻黃附子細辛湯主之則知發汗又不可以脈之浮沉論也況陰毒一證乃一時暴疾禍如反掌戴氏誤以為榮積衛積藏積而改作徐徐調理噫陰毒傷寒而可徐徐調理乎哉訣之所謂徐徐發汗者非治之徐徐乃處方之徐徐如潔古所謂漬形以為汗又曰當緩與之之謂也又歌曰積氣胸中寸脈伏寸所以候胸中者也胸為氣每宗氣之所行也今宗氣不得隨營氣而行故積於胸中而上部之脈伏矣按脈經云寸口脈伏胸中逆氣噎塞不通是胃中冷氣上衝心胸宜服前胡湯大三建丸針巨闕上管灸膻中當關腸癖常瞑目肝藏血脾攝血肝脾俱候於關關脈伏則為肝脾二經不能藏攝其血斯腸癖之疾生矣目得血而能視血脫則目不欲見人故目常瞑也按脈經云關上伏中焦有水氣泄溏宜服水銀丸針關元利小便溏泄便止尺部見之食不消坐臥非安還破腹經云飲食入胃先入於肝夫肝厥陰之木也今因內傷飲食宿滯不消肚腹脹滿欲破而坐臥不安以至厥陰風木之氣壅遏於下不得上升故尺部之脈見伏也治之者當用吐藥以探吐其宿食則厥陰風木之氣得疏通以上升而尺部之脈可以復出矣經云上部有脈下部無脈其人當吐不吐者死此之謂也上吐字乃吐藥之吐言用吐藥而仍不吐則死矣按脈經云尺中伏水穀不消又云尺脈伏小腹痛症疝水穀不化宜服大平胃丸桔梗丸針關元補之桔梗丸云結腸丸又按東垣曰食塞胸中食為坤土胸為金位金主殺伐與坤土俱在於上而旺於天金能剋木故肝木生髮之氣伏於地下非木鬱而何吐去上焦陰土之物木得舒暢則鬱結去矣此木鬱達之也濡脈指法主病七濡者陰也指下尋之似有再再還來按之依前卻去曰濡主少力五心煩熱腦轉耳鳴下元極冷濡陰水也他本俱釋為陰金非也潔古曰浮澀弱屬金沉滑濡屬水是以知濡為陰水也然濡而為不及之水者何也謂陽已竭而陰無所附也指下尋之似有者非若他脈之真有而似乎有也則為陽已竭矣再再還來是陰欲附也按之依前卻去是陰欲附而無所附也經云陽為陰使今陽已竭故主少氣力陰無附故五心煩熱水不足故腦轉耳鳴陽已衰故下元極冷按脈經第一篇有軟脈而無濡脈要知濡即軟也又云軟脈極軟而浮細一曰按之無有舉之有餘一曰小而軟軟一作濡曰濡者如帛衣在水中輕手相得歌曰按之似有舉之無髓海丹田定已枯四體骨蒸勞熱甚臟腑終傳命必殂按之似有陰無所附也舉還無陽已竭也髓海丹田定已枯腎水已涸也四體骨蒸勞熱甚謂水已涸而虛火煎熬也臟腑終傳命必殂謂腎病傳心心病傳肺肺病傳肝肝病傳脾脾復傳腎經曰傳終者死是傳其所勝也按經云三部脈濡弱久病得之不治自愈治之死卒病得之生又歌曰濡脈關前人足汗關前陽位也濡陽衰之脈也足汗多汗也汗陰血所化也陽部而見陽衰之脈是陽氣已虛不能衛護其陰則陰氣外泄故其人多汗耳按脈經云寸口脈濡陽氣弱自汗出是虛損病宜服乾地黃湯薯蕷丸內補散牡蠣散並粉針太衝補之當關少氣精神散夫精氣神乃身之三寶也經曰精生氣氣生神是以精極則無以生氣氣少則無以生神中焦者榮氣之所出也今關部而見濡脈則中氣大虛而精與神亦為之耗散矣按脈經云關上濡下重又云關脈濡苦虛冷脾氣弱重下病宜服赤石脂湯女萎丸針關元補之尺部綿綿即惡寒骨與肉疏都不管尺所以候下焦者也尺部而見濡脈是為陽衰於下故惡寒經云足少陰氣絶則骨枯少陰者冬脈也伏行而溫於骨髓故骨髓不溫即內不著骨骨肉不相親即肉濡而卻肉濡而卻故齒長而枯發無潤澤發無潤澤者骨先死戊日篤己日死土勝水也按脈經云尺中濡少血發熱惡寒又云尺脈濡若小便難宜服瞿麥湯白魚散針關元瀉之千金翼云腳不收風痹弱脈指法主病八弱者陰也指下尋之如爛綿相似輕手乃得重手稍無怏怏不前曰弱主氣居於表生産後客風面腫弱陰金也何為陰金不及之金也何謂不及之金指下尋之如爛綿相似云然沉脈指法則曰狀若爛綿而此亦曰如爛綿相似者何也不知沉為陰水故尋之似有舉之全無弱為陰金故曰輕手乃得重手稍無所謂怏怏者輕手乃得也不前者重手稍無也大抵浮以候氣沉以候血浮以候陽沉以候陰浮以候表沉以候里今云重手稍無是陰已竭也輕手乃得是陽欲依也怏怏不前是陰已竭而陽無所依也經云陰右內陽之守也今陰竭於內則陽無所依倚是血已竭而氣獨居於表也大抵於脈多見於生産後去血過多客風乘虛而入乃使面目浮腫也按脈經云弱脈極軟而沉細按之欲絶指下一曰按之乃得舉之無有歌曰三關怏怏不能前只為風邪與氣連言陰血已竭而陽無所依虛邪賊風與氣相連乘虛而獨居於表也按經云弱為虛為悸少年得此須憂慮老弱逢之病卻痊弱脈陰金也金象屬秋少年者春夏之令也老弱者秋冬之令也少年得之謂之逆老弱得之謂之順也又歌曰關前弱脈陽道虛關中有此氣多疏若在尺中陰氣絶痠疼引變上皮膚寸陽位也寸部見弱謂之陽道虛尺陰位也尺部見弱謂之陰氣絶關陰陽交會之所也關部見弱謂之陰陽不相維故曰氣多疏也然尺部見弱何以痠疼引變上皮膚也尺以候腎腎虛則病痠疼尺所以候下焦者衛出下焦衛氣者陽氣也所以溫分肉而實皮膚者也尺部而見弱則陰氣絶而陽無所依則不能溫分肉而實皮毛故痠疼引變於皮膚之上也按脈經云寸弱陽氣虛關弱無胃氣尺弱少血又云寸口脈弱陽虛自汗出而短氣宜服茯苓湯內補散適飲食消息勿極勞針胃管補之又云關脈弱胃氣虛胃中有客熱脈弱為虛熱作病其雖曰有熱不可大攻之熱去則寒起止宜服竹葉湯針胃管補之又云尺脈弱陽氣少發熱骨煩宜服前胡湯乾地黃湯針關元補之又按仲景曰假令尺脈弱名曰陰不足陽氣下陷入陰中而發熱也九道脈法論云岐子曰九道脈者從天地九數之理説也經曰善言天者必有應於人是以天有九星地有九州人有九臟亦有九野故立九道脈以應天地陰陽之法也以長為乾清陽發腠理以短為坤濁陰歸六腑以虛為離心中驚則血衰以促為坎脈進則死退則生以結為兌發在臍傍以代為中上主上中下三元正氣以牢為震前後有水火相乘之氣以動為艮主血山衰以細為異主秋金有餘此九道脈以應九臟九宮之法也九道脈長脈指法主病一長者陽也指下尋之三關如持竿之狀舉之有餘曰長過於本位亦曰長主渾身壯熱夜臥不安長者陽也乾之象也易曰乾之九五亢龍有悔此之謂也經曰長則氣治何病之有今則三關如持竿之狀舉之有餘過於本位是長之太過者矣故主陽邪熱毒之氣乘其三焦陽盛則熱故其見證為渾身壯熱也陽盛則乘其陰故夜臥不安也按潔古曰長法乾此陽明脈故尺寸俱長身熱目疼鼻乾不得臥當汗陽化氣也長脈迢迢度三關指下來時卻又還陽毒在臟三焦熱徐徐發汗始能安長脈迢迢度三關者言脈三關通度迢迢而長也指下尋之卻又還者言脈往來甚盛也長脈為陽三關通度則知陽邪熱毒客於三陰之標三焦之內皆熱也夫既曰陽毒在臟而曰汗者何也潔古曰在三陰經絡中有邪者是也無汗乃陰中之陽可汗而已是經絡無形受邪法當去之為三陰標之病也今陽邪為患若得微汗則陰氣復舒陽毒隨汗而解矣正如夏月炎蒸亢旱得雨即清涼也云岐子曰徐徐發汗者為在標之深遠急則邪不能出發之以升麻湯發在陽明標一法加羌活麻黃中治法以地骨皮散治渾身壯熱按脈經云寸口脈中手長者曰足脛痛短脈指法主病二短者陰也指下尋之不及本位曰短主四肢惡寒腹中生氣宿食不消短者陰也坤之象也坤屬土脾土旺則能消化飲食使清陽之氣實於四肢濁陰之氣歸於六腑自然上下宣通脈經舒暢何至有氣壅之患也倘一為生冷宿食所傷則陽氣鬱遏於陰中不得暢達於外清濁相干而腹中之冷氣生矣今云指下尋之不及本位言其中手而短也經曰短則氣病四肢屬陽陽氣伏則不能實於四肢故四肢惡寒也陽氣鬱則胃氣不行故腹中生氣要知皆由宿食不消之所致耳按丹溪心法曰長為熱流通短為寒凝結又脈經第一篇載脈二十四道有數脈散脈革脈而無長脈短脈牢脈至第九篇始見長為陽短為陰之説又以動為陽以弦為陰第十三篇云夫脈者血之府也長則氣治短則氣病數則煩心大則病進上盛則氣高下盛則氣脹代則氣衰細則氣少歌曰短脈陰中有伏陽氣壅三焦不得昌藏中宿食生寒氣大瀉通腸必得康潔古曰宿食生寒氣何由通腸謂陰中伏陽故也使三焦之氣不得通行於上下故令大瀉通腸使三焦之氣宣行於上下故用巴豆動藥也外藥隨證應見使之此在長短脈交論內細説之病久溫白丸新病備急丹愚謂短脈陰中有伏陽者何也脈不及本位中手而短也不及本位則為陰中手而短乃伏陽也陽氣伏於陰中使三焦之氣鬱而不行故曰氣壅三焦不得昌也然三焦之氣所以壅遏而不行者由於其人內為生冷宿物所傷故三焦之陽氣不行而臟腑之寒氣生矣若以大黃芒硝之藥利之則硝黃性寒究不能除其生冷之氣而病終不得除當以辛熱之藥如備急丸之類大瀉其腹中宿物則三焦之氣可以復行而病始得康健也按經云短疾而滑酒病又云短而數心痛心煩脈經云寸口脈中手短者曰頭痛虛脈指法主病三虛者陰也指下尋之不足舉之亦然曰虛主少力多驚心中恍惚小兒驚風虛者陰也離之象也離中虛在天為火在人為心心主血脈血實則脈實血虛則脈虛今指下尋之不足舉之亦然則心血虛矣心血虛則神無所倚故少力多驚心中恍惚易曰日昃之離何可久也若小兒見此虛脈則易於成驚何也小兒乃方長之氣脈當有力今反見虛脈則為先天不足或脾胃虛弱風火易乘故主驚風之證也治之者宜益其元氣培其脾土氣血充足而風木不得以乘之驚風之患庶可免矣張世賢釋謂治以濕青丸加減小柴胡湯則虛虛之禍其能免乎按脈經云虛脈遲大而軟按之不足隱指豁豁然空歌曰恍惚心中多悸驚三關定息脈難成血虛臟腑生煩熱補益三焦便得寧心主血脈心中恍惚而多驚悸血虛可知矣及候其脈則寸關尺部三關之內尋按俱虛而不成息數自非一臟一腑之虛乃三焦之虛也夫三焦五臟六腑之本也三焦之血虛則臟腑之煩熱生矣治之者當補益其三焦夫心血虛而曰補益其三焦者何也正以心火也三焦亦火也補益三焦即大易所云明而作離大人以繼明之義也不然則為日昃之離安可久也按脈經云尺脈虛小者足脛寒痿痹腳疼促脈指法主病四促者陽也指下尋之極數並居寸口曰促漸加則死漸退則生促者陽也坎之象也夫促而取象於坎何也坎陷也一陽而陷於二陰之中也促者數而並於寸口中有一止也故取象於坎也人身之陰陽和則脈道往來和緩今曰指下尋之極數是陽已盛矣並居寸口是陽已盛而驅策其陰血如人疾趨時復一蹶也所謂漸加則死者陽愈亢而陰愈竭乃乘危而著鞭則其死也必矣若能漸退則陰陽和合有既濟之功故曰漸退則生按脈經云促脈來去數時一止復來又按黎氏曰陽邪上忤故有偏盛其脈按之有餘舉之洪數不遊三關並居寸口雖盛疾必時一止而復來謂之促令人三焦不和氣逆而厥上盛下虛上溢下絶其候漸進者死漸退者生又劉守真曰促脈者陽也數而時一止也主聚積氣痞憂思所成亦或熱劇失下則令脈促下之則平也歌曰促脈前來已出關常居寸口血成斑忽然漸退人生也或若加時命在天關陰陽之交也已出關則盡溢於寸口矣並居寸口則陽並於上陽盛則烈其陰血而斑疹生焉潔古曰升多而不降前曲後倨如操帶鉤曰死漸退者以陽得陰則解加進之者獨陽脫陰故知命在天也池氏曰促脈急而數其脈溢關至寸口乃水火相乘而風壅血氣衰故發血斑其脈漸加溢進即死退居本位即生按脈經云寸口脈促上擊者曰肩背痛結脈指法主病五結者陰也指下尋之或來或往聚而卻還曰結主四肢氣悶連痛時來結者陰也兌之象也兌為澤陰陽和而後雨澤降今指下尋之脈道或往或來聚而卻還是陰獨盛而陽不能入也即脈經所謂緩時一止復來者曰結為血留而不行氣滯而不散是龍蟠而不雨也四肢屬陽血留而不行氣滯而不散則陰陽不相維故四肢氣悶矣連痛時來者即下文之大腸疼痛也按脈經云結脈往來緩時一止復來按之來緩時一止者名結陽初來動止更來小數不能自還舉之則動名結陰又按劉守真曰結脈者遲緩而時一止為陰也主陰盛發躁煩滿乃陽厥極深以至身冷脈微欲絶而緩弱時一止者亦胸煩躁此止為熱極而非寒也皆須以標本明之歌曰積氣生於脾臟傍大腸疼痛陳難當漸知稍瀉三焦火莫謾多方立紀綱脈結而云積氣者何也凡人之身左屬肝主血右屬肺主氣結脈象兌兌居西方為人生之右當知有積氣生於脾臟之傍肚腹之右也然積氣而生於脾臟之傍者何也營衛生會篇曰穀氣入胃以傳於肺五臟六腑皆受其氣又營氣篇曰谷入於胃乃傳於肺流溢於中布散於外專精者行於經隧常營無已終而復始是謂天地之紀故氣從手太陰出注手陽明云今脈而見結如人步履維艱而復見一蹶是脾胃之氣不能轉輸於肺而肺又不能傳送於大腸是以留滯於脾臟之傍而為積氣故也然脈結而云大腸疼痛者何也辛不病而庚病也辛不病而庚病者何也辛於丙合為水寒氣主之庚於乙合為金燥氣主之辛金者陰金也肺金是也庚金者陽金也大腸是也以陽金之燥氣留滯於大腸故陳陳而作疼痛也然大腸痛而瀉三焦火者何也以燥氣近於火金其畏火者也陰金受制於臟陽金受制於腑從其類也夫大腸者府也故受制於三焦治之者宜瀉三焦之火不使助其燥金之氣則痛自減而疾自瘳矣但結脈終屬於陰脈之極不得峻用苦寒亦不得急於攻伐只宜稍瀉三焦之火可也誠恐後人以腹痛之故誤投辛熱則津液枯而燥愈甚求其愈也難矣故叮嚀告戒之曰莫謾多方立紀綱也按李東垣蘭室祕藏七聖丸治大腸疼痛不可忍全引用此訣附七聖丸方羌活一兩郁李仁湯浸去皮另研一兩五錢大黃八錢煨檳榔桂去皮木香川芎以上各五錢上除郁李仁另研入內共為細末煉蜜為丸如梧桐子大每服三五十丸白湯下食前取大便微利一服而愈切禁不得多利大便其痛滋甚又按劉守真痔疾論曰手陽明大腸名曰害蜚六元正紀論陽明又曰司殺府大腸謂害蜚謂金能害五蟲又曰司殺府謂金主殺既有此二名何以自生蟲蓋謂三焦相火盛而能制陽明金故木來相侮內經曰侮謂勝己也木主生五蟲叔和云風主生於脾臟傍大腸疼痛陳難當漸覺稍瀉三焦熱莫謾多方立紀綱此言飲酒多食熱物脾生火熱而助三焦氣盛火能生土也當瀉三焦火熱退使金得氣而反制木木受制則五蟲不生病自愈矣代脈指法主病六代者陰也指下尋之動而復起再再不能自還曰代主形容羸瘦口不能言六代者陰也中土之象也代而謂有中土之象者何也謂其動而中止也然促結之脈亦動而中止不謂之土也以促結雖動而中止無有常數代則不然動而中止有常數也何謂止有常數假令五動一止仍是五動也七動一止仍是七動也代有常數而謂之土者何也以土主信不失其期也凡病之不失其期者皆土之為病也動而中止不失其期而謂之代者何也謂一臟無氣而以他臟代之也平人之脈一動肺二動心三動脾四動肺五動腎周而復始至五十動不止以成大衍之數故曰平人假令七動一止謂心臟無氣再而後起不能自還是心臟無氣而脾臟代之也故所主之病形容羸瘦形已脫矣口不能言氣已脫矣形氣俱脫不死何為按脈經云代脈來數中止不能自還因而復動脈結者生代者死又劉守真曰代脈者主緩弱而無力不能動因而復動病必危而死歌曰代脈時時動若浮再而復起似還無三元正氣隨風去魂魄冥冥何所拘代脈時時其狀若浮但浮脈按之有神無間斷代脈按之無根而有間斷雖有時再起而止有常數是一臟氣絶而以他臟代之也夫神所以御氣氣所以御精三者互攝則魂魄自相拘守今脈而見代則三元之精氣神已散而魂魄亦相離而失守不死何為此節正與肺藏歌內魂將魄共連之句互相遙映按脈經云代散則死牢脈指法主病七牢者陰也指下尋之即無按之即有曰牢主骨間疼痛氣居於表七牢者陰也震之象也震為雷云岐子謂其有水火相乘之氣今指下尋之即無按之即有曰牢牢者堅牢也其脈沉弦有力動而不移乃病根深痼而成不拔之勢也指下尋之即無表虛也按之即有裡實也所謂裡實者邪氣實所謂表虛者正氣虛也在內之邪氣固則水火相煎故骨間疼痛在外之正氣虛則血不外榮而氣獨居於表按脈經第一篇有革脈而無牢脈千金翼以革為牢其脈經則曰革脈有似沉伏實大而長微弦歌曰脈入皮膚辨息難時時氣促在胸前只緣水火相刑剋欲待痊除更問天脈入皮膚則輕手於皮膚之上不見其脈即前指下尋之即無也凡脈有往來則辨息易矣今云辨息難言按之即有而且堅牢不移其處及舉之皮膚之間不見其有脈夫肺為華蓋乃五臟六腑之首居於胸中主氣而司呼吸者也今肺氣衰則火來乘之木來薄之水者金之子所以制火者也今金氣衰則不能生水火反乘金之勢而煎熬其水猶釜底之薪燔而釜中之水涸也時時氣促者只緣水火交戰於胸中互相刑剋呼雖出於心肺吸不得歸於腎肝故時時氣促也即經云不及則所勝妄行所生受病所不勝薄之也由此觀之四大分張五行乖亂欲望其痊除也難矣按脈經云平三關病候並治宜第三篇內寸口無牢脈於關部則曰關脈牢脾胃氣塞盛熱則腹中響響宜服紫菀丸渴脾丸針灸胃營瀉之於尺部則曰尺脈牢腹滿陰中急宜服葶藶子茱萸丸針關元丹田中極動脈指法主病八動者陰也指下尋之似有舉之還無再再尋之不離其處不往不來曰動主四體虛勞崩中血痢八動者陰也艮之象也艮為山止之象也經云陰者藏精而起亟也所謂藏精而起亟者何也言人身之陰血每從陽氣以行數數而起應故能隨陽行於十二隧之中流注衝任之內故女子月事以時下而無疾病矣倘陰血不能隨陽氣以行則蓄於內積止如山積久而忽下如山之崩也今云指下尋之似有舉之還無謂陰血不能隨陽氣而行也不離其處者謂血蓄於內止而不動也不往不來者謂血不隨陽氣以行而脈道不往來也夫氣血之帥也血之不行由於陽氣之不能帥血以行四肢諸陽之本也氣既不能帥血以行故四體虛勞陰血積久有時而忽溢在女子則為崩中在男子則為血痢耳按脈經云動脈見於關上無頭尾大如豆厥厥然動搖傷寒論云陰陽相搏名曰動陽動則汗出陰動則發熱形冷惡寒數脈見於關上上下無頭尾如豆大厥厥動搖者名曰動又經云動為痛為驚歌曰動脈根源氣主陰夫人身有陰陽二氣非止於氣為陽血為陰也要知氣血者有形之陰陽陰陽者無形之氣血陰陽和則氣血相守而不相離常營行於經隧之中循環無已今脈而見動則為陰陽不相維陽動而陰靜靜則易以止故血傷不行止久而忽下也究其根源乃因陰氣不能隨陽氣以行耳三關指下礙沉沉血山一倒經年月池氏曰動在指下隱隱按之沉沉如水中一石輕舉之脈不動重按之微有力而礙指乃陰虛內損女人經血來如山崩不止治之宜八珍湯智士名醫只可尋此非利語也庸醫但見崩中之疾以為血熱妄行徒用涼血之劑或用藥以劫之殊失治崩之旨矣不知崩中之疾由陽氣不能帥血而行陰血不能起亟而應之以至衝脈停留月事不能以時下久之而溢出故如山之崩漏而下耳法當大補其氣使陽生而陰長陽氣壯得以帥血而行不至有停積之患則崩漏自止矣若非智士名醫安能達其元奧也哉細脈指法主病九細者陰也指下尋之細細似線來往極微曰細主脛酸髓冷乏力泄精九細者陰也云岐子取象於巽主秋金有餘夫巽者風也言人之精血衰冷如秋風之微弱蕭瑟也氣主詬之血主濡之氣血盛則能變化精微內滲骨空以實其骨髓外榮肌內以淖澤毛髮今指下尋之脈道細細似線且來往極微是從弦上減至極細而微矣仲景曰弦則為減以曰減則為寒今減之又減以至極細而微則為腎水虛冷可知矣所以精道不固則內無以實骨空而脛寒髓冷乏力泄精之證作矣按脈經云細脈小大於微常有但細耳歌曰乏力無精脛里酸形容憔悴發毛干如逢冬季經霜月不療其疴必自痊血盛則脈盛血衰則脈衰上文言脈道細細似線來往極微則脈道衰矣足脛屬腎脛酸屬虛皆由無精以實骨空以至脛酸而乏力也血不足則不能華色而形容憔悴精不足則不能淖澤肌膚發毛乾枯然春夏為陽秋冬為陰春夏脈當浮大秋冬脈當沉細若秋冬而見此細脈則為順四時其病當不治自愈若春夏見此沉細之脈是於長養之時而見凋殘之氣則為反四時矣安能保其無大咎也按脈經云寸口脈細發熱吸吐宜服黃芩龍膽湯吐不止宜服橘皮桔梗湯灸中府又云關脈細脾胃虛腹滿宜服平胃茱萸蜀椒湯白薇丸針灸三管又按三部九候論云尺脈細而急者筋攣痹不能行又云尺脈細微溏泄下冷利
