body:
  text: 卷二心臟歌心藏身之精內經決氣篇云兩神相搏合而成形常先身生即此謂也戴氏亦知乎此而復誤精字為有形之精改為君字何哉按陰陽應象大論南方生熱熱生火火生苦苦生心心生血血生脾心主舌其在天為熱在地為火在體為脈在臟為心在色為赤在音為徵在聲為笑在變動為憂在竅為舌在味為苦在志為喜喜傷心恐勝喜熱傷氣寒勝熱苦傷氣咸勝苦金匱真言論曰南方色赤入通於心開竅於耳藏精於心故病在五臟其味苦其類火其畜羊其谷黍其應四時上為熒惑星是以知病之在脈也其音徵其數七其臭焦小腸為弟兄小腸屬丙而剛心屬丁而柔剛在先而為兄柔在後而為弟二俱屬火同氣連枝故曰弟兄戴起宗云大言陰與陽小言夫與婦非也何以言之夫丁與壬合心之夫膀胱是也丙與辛合小腸之婦肺金是也刊誤謂不可以言弟兄非也象離隨夏旺屬火向南生張世賢曰離之為卦其中空虛心臟屬火亦猶是也火旺於夏所以隨夏而旺相也經云南方生熱熱生火火生苦苦生心故曰屬火向南生也刊誤改作明字甚無謂也任物無纖巨多謀最有靈張世賢曰任物者住親萬物也纖小也巨大也人心之應物隨其大小無不任親也朱子曰人心之靈莫不有之所以多謀而有靈也內行於血海外應舌將榮陰陽應象大論云心生血血生脾心主舌又云在竅為舌五臟生成篇云諸血者皆屬於心七孔多聰慧三毛上智英多聰慧者心有七竅上智英者心有三毛其次則不全矣反時憂不解順候脈洪驚張世賢曰心屬火而旺夏反得冬脈沉濡而滑此乃腎邪干心水來剋火謂之賊邪是可憂也順候診得夏脈也驚者大而散也其脈洪大而散謂之順候張世賢之言固是但憂字與驚字義俱未透愚謂心屬火主夏脈宜洪大而散陰陽應象大論云在臟為心在色為赤在音為徵在聲為笑在變動為憂今當夏月反見沉細之脈是為反四時脈既反時其人當憂愁不能自解之疾洪大也驚起意言夏月診得其脈洪大而驚起則謂之順四時矣戴起宗誤認為驚恐之驚易作平字非也不知驚之一字王氏脈經已曾有其名矣如妊娠論中雲呼則為數吸則不驚又如雲肝脈驚暴有所驚駭脈不至若喑不治自己之類是也戴氏可謂少所見多所怪矣大抵古人以一字命脈之名在學者當會意於神情毋凝滯於字句只如張長沙曰寸口衛氣勝名曰高榮氣勝名曰章高章相搏名曰綱衛氣弱名曰惵榮氣弱名曰卑惵卑相搏名曰損若執字義則高章惵卑是何義理亦在學人會意於精神冥寞而已豈亦將以字義之不切而遽改之可乎堪笑今世之人不於指下求其神情專於字上求其似是其去道不亦遠乎按玉機真藏論云心脈至堅而搏如循薏苡子纍纍然色赤黑不澤毛折乃死按人鏡經曰心脈浮大而散心合血脈循血脈而行持脈指法如六菽之重按至血脈而得者為浮稍稍加力脈道粗者為大又稍加力脈道闊軟者為散也液汗通皮潤聲言爽氣清張世賢曰腎主液入心為汗肺主聲入心為言水能剋火汗通則腎水平而皮潤火不受水賊矣火能剋金言爽則肺金平而氣清金不受火侵矣伏梁秋得積如臂在臍縈五十六難曰心之積名曰伏梁起臍上火如臂上至心下久不愈令人病煩心以秋庚辛日得之何以言之腎傳心心當傳肺肺秋適旺旺者不受邪心復欲還腎腎不肯受故留結為積故知伏梁以秋庚辛日得之順視雞冠色凶看瘀血凝五臟生成篇云赤如雞冠者生赤如衃血者死言察病人之色赤如雞冠謂赤而明潤故曰生察病人之色赤如衃血謂赤而慘暗故曰死診時須審委細察在叮嚀凡醫者必須望聞問切上文既已察其色聞其聲切其脈至此復須審委細察以問之庶可萬全叔和之所以叮嚀戒告者欲以警後人也下四藏仿此實夢憂驚怪虛翻煙火明靈樞云心氣盛則夢善笑恐畏厥氣客於心則夢見丘山煙火所謂心氣盛者實之謂也所謂厥氣客者虛之謂也張世賢曰心臟有餘則夢或憂或驚或怪異之事心臟不足則夢煙火光明化竭而見本矣稱之十二兩大小與常平四十二難曰心重十二兩中有七孔三毛盛精汁三合主藏神心脈見於三部歌三部俱數心家熱舌上生瘡唇破裂狂言滿目見鬼神飲水百杯終不歇數則為熱三部俱數則心火熾盛而成燎原之勢矣舌者心之外應唇者脾之外應火炎則土燥故舌上生瘡而唇為之破裂矣心藏神心熱盛則神昏而滿目見鬼神也火盛則水衰乃欲飲水以自救故飲百杯而終不歇也心脈歌心脈芤陽氣作聲或時血痢吐交橫芤為陽火火之發也有聲芤主失血心脈見芤則火逼血而錯經妄行故吐血之時哮哮有聲也或傳於府而作血痢之證溢關骨痛心煩躁更兼頭面赤騂騂溢上出魚際也關下入關中也煩出於肺躁出於腎診得左寸上出於魚而下入於關則為心火熾盛而成燎原之勢上出於魚則炎上而灼肺下入於關則風火交加炎上灼肺故面赤而煩風火交加則水涸而躁矣按醫説云王叔和脈訣論曰溢關骨痛心煩躁通真子解云心脈盛而溢關則筋緊而骨束是以骨痛師曰筋緊有筋攣之疾豈得骨痛所以心脈盛而骨痛者心屬火骨屬腎水心脈溢關則水不勝火煎熬得骨痛非筋緊也大實由來面赤風燥痛面色與心同心屬火在色為赤心脈而見實則為心經實火心之華在面肺合皮毛火盛則傷金故皮膚燥痛而面色赤也微寒虛惕心寒熱心不足則人驚惕心脈見微則為心火不足然少陰為標寒本熱故虛惕而有寒熱交作之證矣急則腸中痛不通心脈急為心邪干於小腸也急為風熱傳於小腸故不通而作痛矣經云心脈急名曰心疝少腹當有形又舉痛論云熱氣留於小腸腸中痛疸熱焦渴則堅幹不得出故痛而閉不通矣按大奇篇云心脈搏滑急為心疝帝曰診得心脈而急此為何病病形何如岐伯曰病名心疝少腹當有形也帝曰何以言之岐伯曰心為牝藏小腸為之使故曰少腹當有形也實大相堅並有滑舌強心驚語話難大心脈也滑相火脈也君火以寧則相火以位今心脈實大而滑則君相二火交煽於上舌乃心之苗故舌強心驚而語言謇澀矣單滑心熱別無病滑為水中之火相火脈也今見於心部別無兼見之證則為君臣道合不過為之心熱而已澀無心力不多言心主血脈又主言語上文云心脈平則聲言爽氣清矣澀為血少心部而見澀脈則為心血不足而懶於言語沉緊心中逆冷痛沉緊為太陽寒水心部面見沉緊則為寒水之氣厥逆於上而心中冷痛矣所謂心中者胃之上也弦時心急又心懸心主血脈弦為寒為收引心脈弦則經脈收引而急矣經云心脈弦心下有水氣愊愊故曰又心懸肝臟歌肝臟應春陽連枝膽共房色青形象木位列在東方四十一難曰獨肝有兩葉以何應也然肝者東方木也木者春也萬物之始生其尚幼小意無所親去太陰尚近離太陽不遠猶有兩心故今有兩葉亦應木葉也四十二難曰膽在肝之短葉間重三兩三銖盛精汁三合故曰連枝膽共房也又金匱真言曰東方色青入通於肝按陰陽應象大論云東方生風風生木木生酸酸生肝肝生心肝主目在天為元在人為道在地為化化生五味道生智元生神神在天為風在地為木在體為筋在臟為肝在色為蒼在音為角在聲為呼在變動為握在竅為目在味為酸在志為怒怒傷肝悲勝怒風傷筋燥勝風酸傷筋辛勝酸按金匱真言論云帝曰五臟應四時各有收受乎岐伯曰東方色青入通於肝開竅於目藏精於肝其病發驚駭其味酸其類草木其畜雞其穀麥其應四時上為歲星是以春氣在頭也其音角其數八是以知病之在筋也其臭臊含血榮於目牽筋爪運將肝藏血開竅於目目得血而能視故曰含血榮於目五臟生成篇云肝之合筋也其榮爪也故曰牽筋爪運將逆時生恚怒順候脈弦長逆時生恚怒何為逆時謂春脈當弦細而長今反得浮澀而短是為反四時肝在志為怒故其人恚怒不休也若診得弦細而長則為順候矣或問曰醫者每云惱怒傷肝然怒發於心何以獨傷肝也豫讀楞嚴會解而見其説焉夫肝者木也主血肺者金也主氣頑金不能剋木必待心經之嗔火一發則鑄氣成金為斧為鋸而木斯克矣今訣云逆時生恚怒者是浮澀短之脈見於肝部也浮澀短肺脈也肺主氣肝部而見肺脈是為賊邪來侵未有不傷者矣按玉機真藏論云春脈何如而弦岐伯曰春木者肝也東方木也萬物之所始生也故其氣來耎弱輕虛而滑端直以長故曰弦又云真肝脈至中外急如循刀刃責責然如按琴瑟弦色青白不澤毛折乃死按人鏡經云肝脈弦而長肝合筋脈循筋而行持脈指法如十二菽之重按至筋而脈道如箏弦相以為弦次稍加力脈道迢迢者為長泣下為之液聲呼是本鄉四十九難曰腎主液入肝為泣肺主聲入肝為呼泣與呼皆屬於肝故曰是本鄉味酸宜所納宣明五氣篇云五味所入酸入肝麻谷應隨糧他本釋謂麻字有誤當云麥谷不知生氣通天論及金匱真言論皆云其穀麥惟五常政大論曰其谷麻以其色蒼故也非脈訣之誤實夢山林樹虛看細草芒淫邪發夢篇云肝氣勝則夢怒逆氣客於肝則夢山林樹木潔古曰甲剛為木故實夢山林樹乙柔為草故虛看細草芒也按中歲經云虛則夢化草茸茸實則夢山林茂盛積因肥氣得杯覆脅隅傍五十六難曰肝之積名曰肥氣在左脅下如覆杯有頭足久不愈令人發咳逆痎瘧連歲不已以季夏戊己日得之何以言之肺病傳肝肝當傳脾脾季夏適旺旺者不受邪肝復欲還肺肺不肯受故留結為積故知肥氣以季夏戊己日得之翠羽身將吉顏同枯草殃五臟生成篇云青如草茲者死青如翠羽者生言察病人之色青如翠羽謂青而明潤也故曰生察病人之色青如草茲謂青而慘暗也故曰死四斤餘四兩七葉兩分行四十二難曰肝重四斤四兩左三葉右四葉凡七葉肝脈見於三部歌三部俱弦肝有餘目中疼痛若痃虛怒氣滿胸常欲叫翳蒙瞳子淚如珠張世賢曰痃少腹下病也弦脈見於三部乃肝家有餘目乃肝之竅有餘主目中疼痛其經還繞陰器而抵少腹故苦痃虛也愚謂痃當作眩夫弦肝之本脈也今三部俱弦是木不務其德肝開竅於目故目中疼痛經云木太過甚則忽忽善怒眩冒巔疾者是也夫既曰肝有餘而又曰虛者何也所謂有餘者邪氣有餘所謂虛者乃亢則害承乃制反自傷而虛也怒則氣上逆故氣滿胸膛常欲叫也瞳子屬肝肝氣盛則翳障疼痛而淚出也凡眼科諸書動言目有五輸乃以黑睛屬肝瞳子屬腎非也愚謂當以黑睛屬腎瞳子屬肝何也以黑睛色黑當屬腎瞳子色青當屬肝況水能生木正以黑睛之水在外方能養其瞳子之木在內而常清浮光明斯千載以來窺其竅者叔和一人耳肝脈歌肝軟井弦本沒邪經云脈來軟弱招招如揭長竿末梢曰肝平故云沒邪也緊因筋急有些些緊為寒肝主筋寒則筋攣故緊因筋急有些些也細看浮大更兼實赤痛昏昏似物遮浮為風實大為火風火相煽上為目疾溢關過寸口相應目眩頭重與筋疼肝脈本弦長然但當守其本位今溢關而過於寸口則木盛矣木盛則生風諺曰樹大招風故為目眩頭重之疾矣芤時眼暗或吐血四肢癱瘓不能行肝藏血者也芤為失血之脈目得血而能視手得血而能握足得血而能步肝脈而見芤故或為眼暗並四肢癱瘓之證作矣澀則緣虛血散之肋脹脅滿自應知肝為血多氣少之臟澀乃氣多血少之脈肝脈而見澀則知肝虛而血散矣肋與脅肝經之所布也肝不藏血故氣乘其虛而居之是以肋脹而脅滿矣滑因肝熱連頭目緊實弦沉痃癖基肝開竅於目肝部而脈見滑是為肝經有火火性炎上故熱連頭目也按醫學云沉弦緊實四脈主腎水不能生木以致肝虛結成癖積或近臍或兩肋間作痛基者言其病有根基而難拔也微弱浮散氣作難目暗生花不耐看肝為血多氣少之臟微弱浮散乃肺脈也為氣多血少之脈今四脈見於肝部乃血不足而氣居之故曰氣作難也肝開竅於目目得血而能視今血既不足故目暗生花而不耐看矣甚浮筋弱身無力遇此還須四體癱肝主筋取之當於十二菽之重與筋平者肝部也今甚浮則浮而無力矣浮而無力為虛虛則無血以榮其筋筋不得其養則難以束骨故四肢癱瘓矣腎臟歌腎臟對分之膀胱其合宜四十二難曰腎有兩枚重一斤二兩主藏志血氣形志論云足太陽與少陰為表裡謂腎與膀胱為表裡也按陰陽應象大論云北方生寒寒生水水生咸咸生腎腎生骨髓骨髓生肝腎主耳其在天為寒在地為水在體為骨在臟為腎在色為黑在音為羽在聲為呻在變動為栗在竅為耳在味為咸在志為恐恐傷腎思勝恐寒傷血燥勝寒咸傷血甘勝咸金匱真言論云北方黑色入通於腎開竅於二陰藏精於腎故病在溪其味鹹其類水其畜彘其谷豆其應四時上為辰星是以知病之在骨也其音羽其數六其臭腐旺冬身屬水位北定無欺陰陽應象大論云北方生寒塞生水水生咸咸生腎腎生骨髓兩耳通為竅陰陽應象大論云腎主耳又云在竅為耳三膲附在斯古之言三焦者不一其説或云無狀有名或云有狀有名諸論紛然千載莫決所謂無狀有名者其説起於秦越人所謂有狀有名者其説起於三因方不知三焦原自有二皆本之於內經奈後之學者執一不分隨成疑案至以手少陽之三膲混而為上中下之三焦何其謬也特未取內經諸篇反覆之耳其一見於內經營衛生會篇曰上焦如霧中焦如漚下焦如瀆觀其如霧如漚如瀆而且判之以上中下則其為無狀有名可知矣其二見於內經本藏篇曰密理厚皮者三膲膀胱厚粗理薄皮者三膲膀胱薄疏腠理者三膲膀胱緩皮急而無毫毛者三膲膀胱急毫毛美而粗者三膲膀胱直稀毫毛者三膲膀胱結也觀其與膀胱同其厚薄同其緩急同其直結則其為有狀有名又可知矣要知營衛生會篇所云乃無狀有名之三焦主營氣衛氣宗氣者也本藏篇所云乃有狀有名之三膲與手厥陰為表裡配十二經絡者也若雲手少陽之三膲即上中下之三焦則是五臟五腑皆在手少陽之中矣假令手少陽有病為熱當治之以寒俾十二經俱寒之可乎又令手少陽有病為寒當治之以熱俾十二經俱熱之可乎若云自有手少陽引經之藥不犯他經則非上中下之三焦不辨而自明矣大抵無狀有名之焦字無有月傍當以平聲讀有狀有名之膲字從以月傍當以去聲讀或曰三膲既與手厥陰為表裡而又曰附於腎者何也以靈樞本藏篇有曰腎合三膲膀胱本輸篇亦曰少陽屬腎故訣曰三膲附在斯也戴起宗不玩本藏本輸二篇之旨謂三膲非腎所附而據改為二陰竅附何其懵懵也按三十一難曰三焦何稟何生何始何終其治常在何許可曉以不然三焦者水穀之道路氣之所終始也上焦者在心下下膈在胃上口主納而不出其治在膻中玉堂下一寸六分直雨乳間陷者是中焦者在胃中脘不上不下上腐熟水穀其治在臍傍下焦者在臍下當膀胱上口出分別清濁主出而不內以傳導也其治在臍下一寸故名曰三焦其府在氣街一本云沖字味鹹歸藿豆潔古曰腎象水而味鹹藿與豆皆咸故歸之也藏氣法時論云脾色黃宜食鹹大豆豕肉栗藿皆咸而此謂歸腎者何也王冰注云乃謂利關機之義也腎為胃關脾與胃合故假咸柔耎以利其關關利而胃氣乃行胃行而脾氣方化故應脾宜味與衆不同也精志自相隨三十四難曰腎藏精與志也沉滑當時本腎脈當沉實而滑平人氣象論云平腎脈來喘喘纍纍如鉤按之而堅曰腎平按之而堅者沉而實也喘喘纍纍者滑也按人鏡經云腎脈沉而軟滑腎合骨腎脈循骨而行持脈指法按至骨上而得者為沉次重以按之脈道無力而濡舉指來疾流利者為滑浮攤厄在脾攤緩也云岐子曰腎旺冬其脈當沉而滑今反浮而緩是土來乘水故云厄在脾色同烏羽吉形似炭煤危五臟生成篇云黑如烏羽者生謂黑而明潤也又云黑如炲者死謂黑而慘暗也按玉機真藏論云真腎脈至如指彈石辟辟然色黑黃不澤毛折乃死冷即多成唾焦煩水易虧四十九難曰腎主液自入為唾張世賢曰水盛則火滅火滅則氣冷氣冷則水溢於上而多唾火盛則水乾於內而煩躁煩躁則津液衰而好飲也奔豚臍下積究竟骨將痿五十六難曰腎之積名曰奔豚發於少腹上至心下若豚狀或上或下無時令人喘逆骨痿少氣以夏丙丁日得之何以言之脾病傳腎腎病傳心心以夏適旺旺者不受邪腎復欲還脾脾不肯受故留結為積故知奔豚以夏丙丁日得之實夢腰難解虛行溺水湄淫邪發夢篇云腎氣盛則夢腰春雨解不屬厥氣客於腎則夢臨淵沒居水中按中藏經云腎虛夢船溺人得其時夢伏水中盛實則夢臨淵投水中一斤餘二兩脅下對相垂説見首節腎脈見於三部歌三部俱遲腎藏寒皮膚燥澀發毛干夢見神魂時入水覺來情思即無歡腎主水水之性也寒遲脈為寒三部俱遲則知其為腎藏寒也腎主五液腎病則無津液以榮養皮毛故皮膚燥澀發毛干也水陰寒之物也夢入水從其類也經云腎病者虛則意不樂故覺來情思即無歡也腎脈歌腎散腰間氣腎主藏其脈當沉而實今脈見散是為腎氣不藏腰者腎之府故腰間生氣也他釋皆以此屬下文非也尿多澀滑並其中有聚散聚散且無憑實滑小便澀淋痛澀苦騂脈澀精頻漏恍惚夢魂多小腸疝氣逐夢裡涉江河此言尿多之證當細察其寒熱虛實而治之也倘診得其人腎病澀而且滑則當斷之曰必尿多也雖然凡脈可以兼見滑與澀其狀相反安可以一部之中而兼見也要知澀脈為陰當於沉中取滑脈為陽當於浮中得診得其人輕手取之其脈皆聚而滑及乎重手取之其脈復聚而澀浮之中聚而滑則為火有餘沉之中散而澀則為水不足水不足而火有餘故為小便頻數之證也然所謂其中有聚散聚散且無憑者何也言當診脈之時須於浮沉中細心審察不可以浮中見脈道之聚而盡憑之為滑亦不可以沉中見脈道之散而盡憑之為澀也然余何以作如是之釋也試觀下文所云即知之矣假令其人脈實而滑則是浮沉俱滑此為實火故當病小便澀而淋痛若診得其人脈浮沉俱澀則為傷精敗血多夢紛紜之證作矣又腎脈而見澀為金寒水冷丙火受傷故為小腸疝氣也腎為水藏澀為陰脈水為陰物故夢涉江河大水實大膀胱熱小便難往通實大為火為陽腎脈見實則為府病為熱結膀胱故小便難往通也滑弦腰腳重沉緊痛還同弦為寒緊則為寒之甚滑為水之陽沉為水之陰經云北風生於冬病在腎俞在腰股寒氣在腎故腰腳重也至於沉而緊則寒之甚矣故腰腳不止於重而更痛也按經脈篇云腎所生病者脊股內廉痛是矣單勻吉無病浮緊耳應聾池氏曰腎脈浮緊主腎有風耳乃腎之竅上攻於耳是致耳聾也肺臟歌肺臟最居先大腸通道宣肺為華蓋居各藏之上故曰居先肺與大腸相為表裡靈蘭祕典論云大腸者傳道之官變化出焉故云通道宣也按陰陽應象大論云西方生燥燥生金金生辛辛生肺肺生皮毛皮毛生腎肺主鼻其在天為燥在地為金在體為皮毛在臟為肺在色為白在音為商在聲為哭其變動為咳在竅為鼻在味為辛在志為憂憂傷肺喜勝憂熱傷皮毛寒勝熱辛傷皮毛苦勝辛金匱真言論云西方色白入通於肺開竅於鼻藏精於肺故病在背其味辛其類金其畜馬其谷稻其應四時上為太白星是以知病之在皮毛也其音商其數九其臭腥兌為八卦地肺主西方金氣文王八卦兌居於西若以八卦言之則肺居兌地也戴起宗以地字改為説不通金屬五行牽牽合也以五行言之則肺合於金皮與毛相應五臟生成篇云肺之合皮也其榮毛也魂將魄共連或難曰肝藏魂肺藏魄保以不歌於肝而並歌於肺也不知五臟之神雖各有所屬而其妙在於互融互攝四十難中發明耳聞鼻臭之説肝木雖屬東方然受氣於申培胎於酉肺金雖屬西方然受氣於寅培胎於卯故參同契云舉東以合西魂魄自相拘釋云舉東以合西者驅龍而就虎也魂魄自相拘者移情而合性也按參同契二八弦氣章云偃月作鼎爐白虎為熬樞汞日為流珠青龍與之俱舉東以合西魂魄自相拘釋云今夫龍居於東虎居於西雖則各守方隅卻有感通之理故舉東方之魂以合西方之魄則龍虎自然交媾相鈐相制而大藥成矣舉東以合西者驅龍以就虎也魂魄自相拘者推情而合性也鼻聞香臭辨壅塞氣相煎經云肺氣通於鼻鼻和則知香臭邪氣迫於肺則鼻竅壅塞不通而不聞香臭語過多成嗽肺主氣語言太過則氣傷矣肺氣傷則發嗽矣瘡浮酒灌穿酒濕熱之物也瘡濕熱所生也肺主皮毛過於酒則肺經受傷而皮上生瘡矣豬膏凝者吉枯骨命難全五臟生成篇云白如豕膏者生言白而明潤也故曰生白如枯骨者死言白而慘暗也故曰死按玉機真藏論云真肺脈至大而虛如以羽毛中人膚色白赤不澤毛折乃死本積息奔患乘春右脅邊五十六難曰肺之積名曰息奔在右脅下覆大如杯久不已令人灑淅寒熱喘咳發肺壅以春甲乙日得之何以言之心病傳肺肺病傳肝肝以春適旺旺者不受邪肺復欲還心心不肯受故留結為積故知息貴以春甲乙日得之順時浮澀短肺王於秋肺主皮毛故脈浮肺為氣多血少之臟故脈澀秋屬金五行之中為金最少故脈短按人鏡經云肺合皮毛肺脈循皮毛而行持脈指法如三菽之重按至皮毛而得者為浮稍稍加力脈道不利為澀又稍加力不及本位曰短也反即大洪弦若秋時見大洪而弦之脈謂之反四時何也洪大屬火火來剋金又且兼弦弦屬木木能生火今肺脈洪而且弦是母挾子勢而反來侮金風火相熾而肺金受傷故曰反也實夢兵戈競虛行涉水田肺氣盛則夢恐懼哭泣飛揚淫邪發夢篇云厥氣容於肺則夢飛揚見金鐵之奇物客於大腸則夢田野今訣云實夢兵戈競虛行涉水田者謂肺屬秋金主乎肅殺肺實故夢兵戈爭競之事北方屬水乃庚金衰墓之鄉金虛故夢涉於水田也三斤三兩重六葉散分懸四十二難曰肺重三斤三兩六葉兩耳凡八葉主藏魄肺脈見於三部歌三部俱浮肺藏風鼻中多水唾稠濃壯熱惡寒皮肉痛顙干雙目淚痠疼浮為風三部俱浮則肺為風所傷肺主氣氣者衛也風傷衛則衛氣不得主於外與風邪之氣相角循肺竅而出是以鼻中多水久則漸傳於肺之本臟風火相煽煎熬津液而成涕唾濃痰衛氣者陽氣也陽氣鬱而不行故壯熱而惡寒肺主皮毛肺傷故皮肉痛顙者肺之系也風火相煎故干張世賢曰金衰不能制木木火俱盛故雙目流淚而痠疼也肺脈歌肺脈浮兼實咽門燥又傷大便難且澀鼻內乏馨香肺脈本浮今雲浮兼實蓋浮而有力也浮而有力為風咽門肺之道路也今肺有風邪則咽門燥傷矣藏病傳府故大便難且結也又肺開竅於鼻上文云鼻聞香臭辨壅塞氣相煎今肺脈浮而兼實則肺為風邪所壅故鼻竅為之壅塞矣實大相兼滑毛焦涕唾黏更和咽有燥秋盛夏宜砭夫脈之實大為火滑則為痰今實大見於肺部則知火煎熬而成痰矣咽肺之道路肺既有火則咽燥矣但此證非暴疾乃陳年之疾也每遇秋則作蓋以其肺家素有火邪當金旺之時則乘時為虐故秋盛也治之者宜於長夏當金沐浴之時迎其氣而奪之至秋則不再作矣沉緊相兼滑仍聞咳嗽聲沉緊為寒寒氣客於肺則肺有寒痰故脈相兼而滑也肺之變動為咳肺有寒痰故見咳嗽聲也微浮兼有散肺脈本家形微浮而散秋之毛也為肺之本脈溢出胸中滿氣滯大腸鳴肺脈當浮澀而短所謂短者重手按之縮入關中也今云溢出是溢出乎魚際肺苦氣上逆肺脈而溢則是氣上逆而胸為之滿矣肺主氣氣盛則傳於府上盛則下虛故氣下泄而大腸鳴也弦冷腸中結肺主氣大腸為傳送之官然大腸之所以傳送者蓋賴肺氣通暢有力傳送而下也張世賢曰肺脈見弦乃金不足而妻乘之也主大腸不溫而為病結治用溫藥其氣自通芤暴痛無成芤失血脈也肺為氣多血少之臟肺脈見芤無血可失然芤為陽火火之發也暴不過暫時暴痛而不能成其大害也沉細仍兼滑因知是骨蒸皮毛皆總澀寒熱兩相承肺脈當浮今脈見沉是為陽虛陽虛則生外寒及乎重手取之其脈見細是為陰虛陰虛則生內熱滑為水中之火從陽化則熱從陰化則寒故知其為骨蒸勞熱之證肺主皮毛肺脈見沉細而滑則其陰陽兩虛皮毛失養而寒熱交作之證現矣脾臟歌脾臟象中坤安和對胃門五運行大論云中央生濕濕生土土生甘甘生脾又云其性靜其政為謐皆安和之謂也脈經脾部第三云脾象土與胃合為府其經足太陰與足陽明為表裡故曰安和對胃門也按陰陽應象大論云中央生濕濕生土土生甘甘生脾脾生肉肉生肺脾主口在天為濕在地為土在體為肉在臟為脾在色為黃在音為宮在聲為歌在變動為噦在竅為口在味為甘在志為思思傷脾怒勝思濕傷肉風勝濕甘傷肉酸勝甘金匱真言論云中央色黃入通於脾開竅於口藏精於脾故病在舌本其味甘其類土其畜牛其谷稷其應四時上為鎮星是以知病之在肉也其音宮其數五其臭香旺時隨四季自與土為根肝旺春心旺夏肺旺秋腎旺冬每臟各旺七十二日惟脾則於辰戌丑未之月土王用事之時寄王十八日亦共成七十二日以終一歲故太陰陽明論帝曰脾不主時何也岐伯曰脾者土也治中央常以四時長四藏各十八日寄治不得獨主於時也脾臟者常著胃土之精也土者生萬物而法天地故上下至頭足不得至時也磨谷能消食榮身本在溫夫脾胃旺則谷易消而津液行足以榮養一身而溫暖肌肉故東垣飲食傷脾論云夫脾行胃津液磨胃之谷主五味也又云脾受胃稟乃能熏蒸腐熟五穀者也故曰磨谷能消食也經云飲食入胃遊溢精氣上輸於脾脾氣散精上歸於肺通調水道下輸膀胱水精四布五經並行合於四時五臟陰陽揆度以為常也東垣脾胃論云胃者十二經之源水穀之海也平則萬化安病則萬化危五臟之氣上通九竅五臟稟受氣於六腑六腑受氣於胃六腑者在天為風寒暑濕燥火此無形之氣也胃氣和平榮氣上行始生溫熱溫熱者春夏也故曰榮身本在溫也應唇通口氣連肉潤肌臀五臟生成篇云其華在唇四曰其充在肌陰陽應象大論云土生甘甘生脾脾生肉肉生肺脾主口其在天為濕在地為土在體為肉在臟為脾在色為黃在音為宮在聲為歌在變動為噦在竅為口故曰應唇通口氣連肉潤肌臀也形扁方三五膏凝散半斤四十二難曰脾重二斤三兩扁廣三寸長五寸有散膏半斤順時脈緩慢脾屬土王於四季辰戌丑未之月每於立春立夏立秋立冬前十八日是其候也尤於六月長夏為之正旺其脈當如春風中之楊柳阿阿緩大乃為順時也按人鏡云脾脈大而緩脾合肌肉故脾脈循肌肉而行持脈指法如九菽之重按至肌肉而得者如微風輕颭柳梢之狀為緩又稍加力脈道敦實為大也失則氣連吞熊宗立云夏以胃氣為本反得脈弦而急如相連吞咽而來是肝木克脾土故為反脈張世賢曰氣謂脈氣也脈氣如相連吞咽而來即雀啄漏水之脈脾衰乃見故曰失矣據二氏之説俱以氣字為脈氣然熊氏之説本於李晞範晞範曰連吞者所以形容緊數之狀恐未必然何也若以脾脈之反時言則弦而急矣連吞是何脈而足以盡弦急之狀也以愚觀之氣字當作口氣按內經宣明五氣篇云五氣所病脾為吞又針經云刺中脾十日死其動為吞是以知吞為口氣言非為脈狀言也豫嘗見一人脾病其口常如連連吞咽之狀至死方休此之謂也按玉機真藏論云真脾脈至弱而乍數乍疏色黃青不澤毛折乃死實夢歌歡樂虛爭飲食分淫邪發夢篇云脾氣勝則夢歌樂身體重不舉厥氣客於脾則夢見丘陵大澤壞屋風雨又方盛衰論云脾氣虛故夢飲食不足按中藏經云脾實則夢築牆蓋屋盛則夢歌樂虛則夢飲食不足厥邪客於脾則夢大澤丘陵風雨壞室濕多成五泄腸響若雷奔夫脾主濕濕多則成泄矣五十七難曰泄凡有幾皆有名否然泄凡有五其名不同有胃泄有脾泄有大腸泄有小腸泄有大瘕泄名曰後重胃泄者飲食不化色黃脾泄者腹脹滿泄注食即嘔吐逆大腸泄者食已窘迫大便色白腸鳴切痛小腸泄者溲而便膿血小腹痛大瘕泄者裡急後重數至圊而不能便莖中痛此五泄之法也脈經云脾病者虛則腹脹腸鳴溏泄食不化取其足太陰陽明少陰血也痞氣冬為積皮黃四體昏五十六難曰脾之積名曰痞氣在胃脘覆大如盤久不愈令人四肢不收發黃疸飲食不為肌膚以冬壬癸日得之何以言之肝病傳脾脾病傳腎腎以冬適旺旺者不受邪脾復欲還肝肝不肯受故留結為積故知痞氣以冬壬癸日得之二斤十四兩三斗五升存四十二難曰人腸胃長短受水穀多少各幾何然胃大一尺五寸徑長二尺六寸橫屈受水穀三斗五升其中常留谷二斗水一斗五升又曰胃重二斤十四兩紆曲屈伸長二尺六寸大一尺五寸徑五寸容谷二斗水一斗五升張世賢曰此歌言脾今並及胃者脾胃相連故耳脾脈見於三部歌三部俱緩脾家熱口臭胃翻常嘔逆齒腫齦宣注氣纏寒熱時時少心力緩脈屬土三部俱緩則為土太過矣故曰脾家熱脾開竅於口故口臭經脈篇云脾虛則吐故胃翻常嘔逆也脾與胃相連胃之經脈上入齒中還出挾口環唇下交承漿故曰齒腫齦宣脾病有寒熱證如少陰司天四之氣主客濕土寒熱是也心脾之母也子病則耗母氣母亦因之而病故寒熱時時少心力也有所謂注氣者如尸注鬼注勞注及注夏注船之類皆謂之注其病注於陰陽氣血之內不可名狀其人飲食懶進面黃羸瘦寒熱時時四肢無力以月以年纏綿不已是皆注病之情狀也土性緩故其脈其病亦緩按靈樞邪氣臟腑病形篇曰緩者多熱仲景曰緩者陽氣長又曰緩則胃氣有餘王海藏曰緩大而長為熱張景嶽曰緩者縱緩之狀非後世遲緩之謂故凡縱緩之脈多中熱而氣化從乎脾胃也脾脈歌脾脈實並浮消中脾胃虧口乾饒飲水多食亦肌虛阿阿緩弱春揚柳乃脾之本脈也經云善者不可得見惡者可見今脾脈實而且浮是為土中有火火炎則土燥故為消中之病矣諸脈以實為實以虛為虛惟脾脈則以實為虛何也以脾胃本和緩故也經脈別論云食入於胃散精於肝淫氣於筋食氣入胃濁氣歸心淫精於脈脈氣流經經氣歸於肺肺朝百脈輸精於皮毛毛脈合精行氣於府府精神明留於四臟氣歸於權衡權衡以平氣口成寸以決死生飲入於胃遊溢精氣上輸於脾脾氣散精上歸於肺通調水道下輸膀胱水精四布五經並行合於四時五臟陰陽揆度以為常也若土中有火則飲食易於焦熬不能化行津液上輸於肺散精於脾以榮養肌肉故口乾饒飲水多食亦肌虛也按帝曰診得胃脈病形何如岐伯曰胃脈實則脹虛則瀉按儒門事親云八卦之中離能烜物五行之中惟火能焚物六氣之中惟火能消物故火之為用燔木則消而為炭焚土則消而為伏龍肝鍊金則消而為汁煅石則消而為灰煮水則消而為湯煎海則消而為鹽干汞則消而為粉熬錫則消而為丹故澤中之潦涸於炎暉鼎中之水干於壯火蓋五臟心為君火正化腎為君火對化三焦為相火正化膽為相火對化得其平則烹煉飲食糟粕去焉不得其平則燔灼臟腑而津液竭焉故入水之物無物不長入火之物無物不消夫一身之心火甚於上為膈膜之消甚於中為腸胃之消甚於下為膏液之消甚於外為肌肉之消上甚不已則消及於肺中甚而不已則消及於脾下甚而不已則消及於肝腎外甚而不已則消及於筋骨四臟皆消盡則心始自焚而死矣故素問有消疸消中消渴風消膈消肺消之説消之證不同歸之火則一焉故消疸者衆消之總名消中者善飢之通稱消渴者善飲之同謂惟風消膈消肺消此三説不可不分風消者二陽之病二陽者陽明也陽明者胃與大腸也心受之則血不流故女子不月脾受之則胃不化故男子少精皆不能成隱曲之事火伏於內久而不已為風所鼓消渴腸胃其狀口乾雖飲水而不咽此風熱格拒於賁門也口者病之上源故病如是又經曰二陽結謂之消此消乃腸胃之消也其善食而瘦者名曰食㑊此消乃肌肉之消也單滑脾家熱口臭氣多粗脾胃者應唇而通口氣者也今脾脈見滑則脾家有熱而口氣臭矣脾有火則上蒸於肺而清肅之氣不行肺葉舉而口氣粗矣澀即非多食食不作肌膚夫脾主中州而能攝血故曰營出中焦脾陰足則磨谷能消食而連肉潤肌臀矣澀為血少今脾脈而見澀則為脾虛血少脾既虛則飲食不甘美故曰即非多食也縱強食之亦不能作肌膚矣熊氏謂脾脈見澀是心火虛故令脾土無生氣其説亦太轉折張氏謂其澀為肺脈見於土部是子來母位實邪為患故能多食不多食則肌肉消瘦矣其説更悖微浮傷客熱來去作微疏熊宗立云脾部脈微而浮是外之風邪熱毒客舍於脾也故乍熱乍止如客之往來非本經之正病但安其脾胃則自愈矣有緊脾家痛仍兼筋急拘欲吐即不吐沖沖未得疏經脈別論云食入於胃散精於肝淫氣於筋緊則為寒脾胃而見緊脈是為內傷生冷木氣鬱於土中不得發越故腹痛而筋急欲吐不吐即嘔逆也嘔逆則氣擾亂於胸中而沖沖未得疏泄若能得一吐則木氣條達而復伸筋自不拘腹痛自止矣若弦肝氣盛妨食被機謀此為木來剋土必致妨礙飲食而為賊邪所謀害矣大實心中痛如邪勿帶符脾脈大實則為脾有實邪而為心中痛者何也按經脈篇云脾足太陰之脈起於大指之端入腹屬脾絡胃上膈挾咽連舌本散舌下其支者復從胃別上膈注心中又云脾病為心下急痛故曰大實心中痛也藏病則傳於府足陽明胃經是也足陽明病則登高而歌棄衣而走故曰如邪勿帶符也溢關涎出口風中見羈孤脾屬土其性鎮靜其畏風木開肌腠也其液為涎脾氣不足則所勝侮之脾土被克而起致中州無權風木之邪肆虐故風痰壅塞於上而涎液溢出於口此為太陰中風之證太陰脾土也脾土主灌溉四傍今既中風則如人之羈旅孤危而一無所依助也
