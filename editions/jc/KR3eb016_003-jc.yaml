body:
  text: 卷三七表八里脈總論余嘗讀潔古表裡諸論言言合理字字入微深得叔和之旨但含蘊幽元難以曉暢每欲為之詮釋而捉筆無從偶於廣陵市肆中得一寫本捧讀之乃潔古表裡諸論之釋義也亡其姓氏不知出自誰手而乃逐節疏鈔亦自可觀但於魯魚亥豕之文未見具眼如七表脈交變略例論中有云夫標本者太陰有標本之化數語要知太陰之陰字乃太陽之陽字傳刻之誤耳釋之者縱不便為之竄改以校前賢亦不當為之強釋以誤後學且不達內經標本之旨而以太陽屬君火太陰標寒本熱等語悖謬極矣然而詮註之苦心不可泯滅余姑存之取其長而略其短至於分條析理注述詳明殆有望於後之君子云七表者浮芤滑實弦緊洪也八里者微沉緩澀遲伏濡弱也凡奇數陽之數也七道表脈皆屬陽其邪從前而外來者謂之實邪主發越而去之其脈先自外而漸傳於內初起脈見浮緊洪發散之後或見弦滑實若是人素稟弱又或有內傷者其人迎脈必芤此皆陽脈也凡偶數陰之數也八道里脈皆屬陰其邪從後而內入者又云內踝而入者謂之虛邪必須溫中理中之法治之故沉脈中見遲伏緩澀濡弱也若單見微緩之脈此乃表裡俱虛矣按七表脈以浮脈先定其表其餘六道俱在浮中見八里脈以沉脈先定其里其餘七道俱在沉中見七表陽也八里陰也表脈多見於左而客隨主變客為不應得之脈也邪在外為表證為陽為客邪客病為本所變者是本經不應得之脈因正氣復則邪氣自退本經脈復又如至故曰客隨主變里脈多見於右又而主隨客變主脈者本臟正脈也邪在內為里證為陰為主病本病為客所變者是本經應得之脈因邪氣傳裡則正氣為邪所制本經為不應得之脈變焉故曰主隨客變也按本經脈各藏本脈也為主客邪不能侵其本經是本經正氣不受其邪則客病退矣是主能變客左手三部所主溫風寒也溫風寒病得於外溫風寒是天地時行之氣時或溫氣流行時或風邪播動時或厲氣凝寒此皆外來之邪從表而入者豈不為病得於外耶按溫風寒為天地厲氣從外所感由天之五運之氣而時行者豈不為得之於外右手三部所主於燥濕暑也燥濕暑病生於內燥濕暑者是陽明燥金生火太陰濕土生濕暑者熱邪也天地交泰之後令亢陽一伏陰土濕氣交蒸而為暑陽明為濕土相蒸而亦為暑熱也豈不為病在於內耶此脈法之大概及其互相變見或表脈見之於右或里脈見之於左或陰陽更相乘或陰陽更相伏或一脈為十變一為陽十為陰脈理精微非一言可盡然其要不越乎陰陽五行而已此脈法之大概承上文而言見得表裡三部所主溫風寒燥濕暑互相交互或七表證見八里脈八里證見七表脈此其互相變化自是主隨客變客隨主變或邪氣盛而正氣為邪氣所乘正氣勝而邪氣為正氣所伏或陰證見而為陽或陽證變而為陰兩相變化由陰陽兩相攝伏正謂天一生水地二生火天三為少陽地四為少陰天五為陽明地六為厥陰天七為太陽地八為太陰天九陽極而生陰三陰伏內地十陰極而生陽一陽初動故曰一脈為十變也天地陰陽二氣之理生生不已變化無窮故陰陽相乘相伏互相交而又互相化也變則成天地陰陽乘伏之制化則為陰陽五行和合之義也經曰脈理精微非一言可盡者正此謂也按互相變見謂表裡之脈互相傳變不一或左手得右脈或右得左手脈總之陽與陰氣交感在陰證得陽脈陽證得陰脈有陰陽相乘相伏以生變化故曰一脈而為十變也非一宗脈變為十宗脈之說舉其大概之說也當臨證之時各類而推之一脈未必一脈可終其證也表脈有七里脈有八共十五脈也五行分之各得三脈三五一十五也五臟屬五行金木水火土也每藏脈有三部浮中沉三法也浮以審其外沉以審其內中則內外之關以審其表裡陰陽虛實之理各髒得三脈五臟合而言之一十五脈也詳見下文浮澀弱屬金弦緊伏屬木滑沉濡屬水芤實洪屬火微緩遲屬土每三部俱有輕重之分至於五行當更相平一有不平者客即見焉此言各藏本經脈每藏脈形有三分辨虛實肺脈本令浮實則澀虛則弱肝脈本令弦實則緊虛則伏腎脈本令沉實則滑虛則濡心脈本令洪實則實虛則芤脾脈本令緩實則微虛則遲當雲實則遲虛則微所以分別輕重即分別虛實也五行各得本令平和之脈則無病矣一見輕重之異即生病焉按評云表裡共十五道脈五行分開一看即所謂金木水火土解注中分辨五臟虛實在輕之中本藏是本合正藏但有不應得之脈即為病也部部要分辨臨診詳察之或謂內傷則善矣謂外感莫或之當耶殊不知天地之間六氣依於五運人身即小天地外邪所感莫不從其內而見焉假令外感風濕亦當云溫則木火有餘而土金不足水不能制乎火矣外感乃外邪所感致五行不平也夫內傷不過五內受傷五臟認其損益善治者易以治之然或有內傷而兼外感者則難以勝其證豈知內以審其五行所虧外以察其風溫寒所感之邪詳其受證在何經何臟腑則莫不見焉經云外感風溫之邪則木火有餘肝藏邪既勝而脾肺二經受其制土中金氣為木所乘土無短水以生則木氣幹上而君火隨盛腎中源流之水不能上升矣蓋四臟相乘五行損其二何以得其安和而平也按評云或謂內傷之語言五行分辨在內傷之病可以易推若或外感猶恐客邪之脈或見七表或見八里難以推測本合正脈之虛實以謂莫或之當耶此之說也果外感之證文中假云云依於五臟本脈各類而推則知金水木火土之理次明虛實賊微正之邪而又審察弦洪澀緩沉為主脈而令本藏非弦非洪非澀非緩非沉是本部不應得之脈為客邪之標病也非本病主脈也以是推詳何得錯亂內傷乃五內自傷五行自不能平也五內心肝脾肺腎是也內傷乃五臟虧損或七情所感六慾所傷五行金木水火土相剋相賊自是不能安和而平也先明金水木火土之理次察虛實賊微正之邪更復辨其部分之浮中沉而又當詳審乎主脈客脈之相合何為主弦肝洪心澀肺緩脾沉腎是也何為客本部不應得之脈皆客也能如是然後內傷外感主客標本之病是者是非者非夫何差錯之有天地五行相生金生水水生木木生火火生土土生金金生水不已故天地位焉萬物育焉一有不然則陰陽不和五行必致虛實不平或又為賊微正三邪所感如金剋木木剋土土剋水水剋火火剋金皆賊邪也至於微邪正邪如夫乘妻子扶母母抑子之類可審辨而推察之須有浮中沉三看之法而當知其本部應得之脈是為主脈若不應得之脈則為客脈也當審而明之然後內傷何臟何臟虛何臟實與兩臟之相干相乘相抑相扶皆知輕重之分外感是賊邪實邪微邪正邪或在標或在本則是非立見指下了然何有差錯七表脈交變略例論潔古曰七表脈者是客邪來傷主乃陰乘陽也其證若身熱外陽惡寒內陰是外陽而內陰見也七表脈但熱而不惡寒者表裡俱屬陽是內外皆陽也七表證自汗惡風卻得八里脈者陽證見陰脈當用麻黃散其陽邪桂枝實其陰分各半湯如八里證自汗惡風得七表脈陰證見陽脈亦用桂枝麻黃各半湯有汗不惡風者腠理虛黃耆白芍湯無汗不惡寒者正邪蔥豉湯脈如浮滑而長為三陽禁不可發汗經曰陽實陰虛汗出而死凡外感之邪皆為客邪也其病自外而入循外踝上背絡顛頂以入腹人身之背屬陽腹屬陰陽氣被外邪所乘而陽氣不能外衛其證發熱惡寒者是外陽而內陰也七表證發熱不惡寒者是內外皆陽也七表證自汗惡風卻見八里脈者是陽證得陰脈也主弱而客強故用麻黃而兼桂枝各半湯一以實其表而助陽一以扶其標而泄陰也八里證外不發熱自汗惡風而脈是七表之脈此為陰證見陽脈內陽而外陰也當扶陽而祛陰故用桂枝兼麻黃各半湯也有汗不惡風者是陽中虛邪所致要實其腠理故用黃耆白芍湯無汗不惡寒者或只發熱此為實邪故用蔥豉湯脈若浮滑而長此是三陽俱病半表半裡之證不可發汗恐誤發汗亡陽而死故經曰陽盛陰虛汗出則死也按評云此一段只體貼註解議論會悟外陰內陽外陽內陰之理內外或皆陰內外或皆陽脈屬陰屬陽證屬陰屬陽如此推測自然不誤仲景曰脈浮當汗三陽當汗者謂陽中有陰夫表者是陽分也脈浮亦陽分也浮脈客陰也故當發汗且陽中有陰者陽乃榮衛之分客陰自外而入居之故宜耗出而發去之經曰在上者因分而越之此說非謂陽中有形跡之陰是陽中客邪之陰證居其表也當發汗之證是尺寸俱浮陽中有陰也客邪也標病也表之表也客邪自外而入在榮之外衛之間故脈浮宜發汗而耗去之經曰在上者因而越之是在太陽也太陽自顛頂而上其邪循背而行於上可以越而去之此所謂客邪未入於內也是無形之陰邪居其表者故仲景之法當汗而愈焉按仲景論中凡脈浮當汗又三陽俱病不可汗但陽分中有客邪即當汗何以為客陰在陽分中也假如七表之脈外證發熱惡寒又無汗或作煩渴煩躁只審其但兼惡寒可汗不兼惡寒三陽中皆陽也不可汗慎之慎之夫三陽之表是三陽標也無形經絡受客陰乃表之表也乃陽中陽分也宜發其客陰之邪別本其字作去字故前說陽中有陰當汗三陽者太陽陽明少陽也三陽之標邪在太陽之上尚未入陽明少陽其證頭身背痛為無形中陰邪也無形經絡受客邪乃表之表宜發去客邪而陽分中之客陰因汗而愈洵不誣矣若是三陽之裡是三陽本也主有形受邪膀胱與胃是也既受在有形之處惟宜利小便下大便則愈此乃陽中之陰也此說言主前說言客若不窮主客邪正之理必傷人命三陽之裡謂病入陽明本也陽中客陰傳入於胃主有形受邪謂邪入於胃中糟粕也胃與膀胱俱在有形之處胃中飲食變化而成糟粕其受盛之物乃成受邪之物也豈不為有形之邪耶故宜下大便而利小便也所謂陽中之陰非客陰也是主病也本病也明其主客之理自不誤治之矣三陰當下者夫三陰者藏也外無所主內無所受所主者皮毛血脈肌肉筋骨耳無所受者無所受盛也在三陰經絡中有邪者是為無形乃陰中之陽可汗而已是經絡無形受客邪當發汗去之為三陰標之病也三陰屬裡夫三陰受邪必歸於太陰而復還於陽明何也太陰從標本而化歸於受盛之官變化出焉為有形跡之陰邪自當下之而愈若是無形中所受乃三陰標之病也外有所主者謂脈尚系弦緊洪滑等至七表之脈也病雖傳裡而經絡之中尚為客邪也是三陰之標未入三陰之本者若入三陰之本則所受盛矣經曰無形之邪乃陰中之陽故曰可汗謂還當解表不可擅下也至於三陰之本當下之證解見下文三陰本者藏也盛則終歸於胃是有形病也當自各經絡中藥入胃去之此乃三陰當下也是為陰中之陰可下而愈此為主之陰非是客邪之陰也夫客主共論陰中有陽當下去之者陰中者主也有陽者客邪也言陰經中受陽邪染於有形物中不得出者可下三陰之本本之本也里之裡也里證若盛則燥渴其脈必實是客陰歸於陽明為有形跡之陰乃主中之陰非客邪之陰也經曰經絡中受陽邪更染於有形物中其陽邪積於臟腑不得出者故當下之而愈也略說八里乃陽乘陰也其證身涼四肢厥惡熱是外陰而內陽也但寒不熱不渴者是內外皆陰也仲景云厥深熱亦深厥微熱亦微口傷爛赤因發汗得之八里之證病在乎內陽邪乘於陰經邪入三陰也陽邪客陰也三陰經絡主陰也客陽傳於主中之陰故曰陽乘陰也故證身涼不發熱四肢屬陽但陰盛陽盛故四肢冷厥而又惡寒者是陰中有陽為外陰而內陽也若是四肢冷厥不惡寒不作渴是內外皆寒內外純陰之證也仲景云熱深厥亦深熱微厥亦微口傷爛赤者此又一陽證也乃陽盛陰虛因醫家誤發汗而致之者內經曰三陰可溫而不可汗者宜也夫七表八里發汗吐下治傷寒必當仔細論之七表八里互相交變乃壞證來此節疑有脫簡理脈中一說六脈交變浮滑長為三陽乃陽中有陰沉澀短為三陰乃陰中有陽當審察表裡分其內外以辨虛實治從標本萬舉萬當治傷寒要分辨陰陽虛實標本輕重之法七表八里互相交變不可不細論之六脈交變浮滑長為陽脈沉澀短為陰脈三陰三陽兩相交而兩相變有陽變而為陰有陰變而為陽者如七表證而得八里之脈此陽證見陰脈為壞證也八里證而得七表之脈此陰證見陽脈可以生也陽中有陰陰中有陽變化無窮可不認其陰陽虛實表裡標本而治之也哉夫標本者太陰有標本之化少陰亦然陰字乃陽字之訛太陽標熱而本寒從此生七表少陰標寒而本熱從此生八里太陰標本皆陰少陽標本皆陽惟陽明與厥陰不從標本從乎中也此舉六氣之標本也太陽標熱而本寒者太陽屬君火故標熱本寒者謂應膀胱膀胱屬水所以本寒少陽膽經稟肝木木中有火所以標本皆陽陽明屬胃燥土也謂四臟寒熱之氣皆歸於土而能變化所以無標本之應土居中央故曰從乎中也從此生七表也太陰標寒而本熱者太陰濕土為柔和之土也土中有濕氣而生焉故曰標寒而又與陽明胃之燥土同歸一經所以本熱也少陰有標本之化者少陰屬腎標應膀胱水本應三焦火水與火交所以有標本之化厥陰屬膽厥陰膽經居於左脅故不從標本而木氣只干脾胃稟於兩關故曰從乎中也從此生八里也所謂六氣之標本者溫風寒外來之邪從標而入者燥濕暑內生之邪從本而出者按六微旨大論云少陽之上火氣治之中見厥陰陽明之上燥氣治之中見太陰太陽之上寒氣治之中見少陰厥陰之上風氣治之中見少陽少陰之上熱氣治之中見太陽太陰之上濕氣治之中見陽明所謂本也本之下中之見也見之下氣之標也本標不同氣應異象叔和所載者是七表八里九道脈訣二十四道脈之標本也皆有從標從本從乎中假令太陽少陰各有標本之化太陽脈浮少陰脈沉此乃浮沉交叔和所載七表八里時為傷寒虛實而設又立九道脈諸天地九九之數共成為二十四道脈之標本也標以明其表陰也本以明其里陽也中能變化從乎中土也所謂太陽少陰各有標本之化者陽浮而動故陽邪為天行之氣陰沉而靜故陰從中土而出標入於本而本能變化故浮與沉交要不越乎二十四道脈之標本也內經曰若從標本論之是為長短交長以發汗短以下長曰陽明短曰太陰長者陽明當解表利小便短者太陰當下土鬱則奪之令無壅礙故長脈發之短脈下之者是滑與澀交滑居寸而熱澀居尺而寒滑居尺而熱澀居寸而寒澀脈居尺寸皆損氣滑居尺寸皆助陰陽內經云脈滑曰生脈澀曰死此是三陰三陽變化表裡略舉數端隨脈條下盡窮其理有不盡者於各部脈說內詳之傷寒脈滑曰生脈澀曰死三陰三陽表裡交變滑脈為陽澀脈為陰有陽證而得陽脈者有陰證而得陰脈者有陽證而得陰脈者有陰證而得陽脈者陰陽變化則脈有滑與澀交是為陰陽中交變至若長與短交是為表裡中變化浮與沉交亦是為表裡中交變類而推之於滑澀交總之滑者吉澀者凶不過一表裡虛實陰陽互相交變而已此論略說數端最盡其理學者當神而明之自然了於心矣七表脈浮脈指法主病一浮者陽也指下尋之不足舉之有餘再再尋之如太過曰浮主咳嗽氣促冷汗自出背膊勞倦夜臥不安浮陽金也何謂陽金謂金之有餘也凡所謂有餘者乃邪氣有餘所謂不足者乃正氣不足今於指下重手尋之只覺其不足謂里之正氣不足也復於重手之中而漸舉之則又覺其有餘謂表之邪氣有餘也試於舉之之中再再推尋之而又覺其如太過謂浮而有力也劉氏曰浮而有力為風何以言之夫寒傷營風傷衛營為血衛為氣肺主氣其變動為咳肺苦氣上逆今肺受風邪故咳嗽氣促衛者所以衛護一身者也衛為風邪頭傷則不能衛護一身元府開而營氣外泄故冷汗自出也背膊勞倦者肺之俞在肩背肺病故背膊勞倦也夜臥不安者因咳嗽氣促不得安寢也潔古則治以小柴胡湯主之夫叔和之所謂浮者如此故其主病亦如此戴起宗乃膠柱鼓瑟滯於脈之名字以板定後人眼目於二十四道脈之中或改其指法而存其主病或改其主病而存其指法至使病脈不相當誤人非淺予今悉遵舊章不移一字順其文以釋之庶免割裂之患也以下二十四脈悉仿此按脈經云浮脈舉之有餘按之不足一曰浮於指下又云浮為風為虛歌曰按之不足舉有餘再再尋之指下浮藏中積冷營中熱欲得生精用補虛凡脈浮以候表沉以候里今按之不足是為裡虛故曰藏中積冷舉之有餘是為表有邪故曰營中熱池氏曰乍病見浮脈乃傷風邪久病合見沉弱之脈今見浮脈乃里寒表熱裡寒而陰陽不和陽盛則表有風熱裡虛則藏中積冷治之者須調其營衛補其津液勿謂脈浮而有表邪專事發表可也張世賢曰診脈之法在內者沉取之按而得之在外者浮取之舉而得之有餘為熱不足為寒今按之不足藏中積冷也舉之有餘營中有熱也陰不足而陽有餘治之宜地骨皮散其說亦是按經云浮而大者風又云浮而大者中風頭重鼻塞又云浮而緩皮膚不仁風寒入肌肉又云浮洪大長者風眩癲疾又云浮洪大者傷寒秋吉春成病又云浮而滑者宿食又云浮滑而疾者食不消脾不磨又云浮而細滑傷飲又云浮而急病傷寒暴發虛熱千金方作傷暑經云浮而絕者氣又云浮短者其人作肺諸氣微少不過一年死法當嗽也又云浮而數中水冬不治自愈又云浮滑疾緊者以合百病又易愈又云陽邪見浮洪陰邪來見沉細又云微浮秋吉冬成病又云微浮雖甚不成病不可勞又按丹溪心法拔萃方人參地骨皮散治藏中積冷榮中熱按之不足舉之有餘此乃陰不足陽有餘也茯苓五錢知母石膏各一兩地骨皮人參柴胡生地黃黃耆各兩半上銼每服一兩姜三片水二鍾煎至一鍾去渣通口不拘時服又歌曰寸浮中風頭熱痛寸陽部也浮陽脈也風陽氣也頭諸陽之會也今兩寸而見浮脈故主風熱上攻頭目也按脈經云寸口浮中風發熱頭痛宜服桂枝湯葛根湯針風池風府向火灸身摩治風膏覆令取汗又云寸口脈浮而盛者病在外關浮腹脹胃虛空熊氏曰左關屬肝右關屬脾左關脈浮主肝木生風右關脈浮主風不勝土故胃氣虛空而脹滿也按脈經云關上浮腹痛心下滿又云腹滿不欲食浮為虛滿宜服平胃丸茯苓湯生薑前胡湯針胃管先瀉後補之又云關上脈浮而大風在胃中張口肩息心下澹澹食欲嘔尺部見之風入肺大腸乾澀故難通尺脈見浮主大腸乾澀而云風入肺者何也經云陽明之上燥氣主之中見太陰夫手太陰肺也手陽明大腸也正以大腸之絡絡肺肺之絡絡大腸大腸居少腹之中尺所以候腹中者浮為風風既入肺不傳於臟而傳於腑故大腸乾澀而難通也張世賢釋謂風不在於命門而在於肺大腸所以乾澀而難通風在下焦治之以七聖丸方見後結脈條內按脈經云尺中浮小便難又云尺脈浮下熱風小便難宜服瞿麥湯滑石散針橫骨關元瀉之人云是脈浮客熱在下焦芤脈指法主病二芤者陽也指下尋之兩頭即有中間全無曰芤主淋瀝氣入小腸二芤者陽火也何為陽火小腸火也離為火其象中虛故指法曰指下尋之兩頭即有中間全無離之象也蓋以丁火陰火也主手少陰丙火陽火也主手太陽手太陽小腸也故主病為淋瀝氣入小腸其說詳見前脈賦浮芤其狀相反條內參看潔古曰弦浮無力按之中央空兩邊有曰芤芤主失血手足太陽皆血多氣少故主病淋瀝氣入小腸脫血病者皆從太陽之說按脈經云芤脈浮大而軟按之中央空兩邊實一曰手中無兩傍有歌曰指下尋之中且虛邪風透入小腸居病時淋瀝兼疼痛大作湯丸必自除指下尋之中且虛火之象也火性本熱熱則生風故曰邪風透入小腸而為淋瀝疼痛之病也治之者當大作湯丸以瀉其小腸之火則淋瀝自止而疼痛可除矣云岐子云芤主血凝而不流凡人之十二經絡以應溝渠是榮衛氣血不散不能盈滿經絡故見芤脈主淋瀝小便膿及血當大作湯丸也四物湯地黃丸補之桃仁承氣湯瀉之一云大柴胡湯吳文炳云中且虛兩頭有中間無也芤主失血心主血心有熱而血妄行則芤脈見熱則生風邪心不受邪遂傳於小腸以致小便淋瀝疼痛須用八正散導赤散以清邪熱又歌曰寸芤積血在胸中脈者由營氣行於十二經隧之中流動充滿故脈道滑利和緩何芤之有寸所以候胸中者胸為氣海氣血壅滯於胸中故寸口而見芤也張世賢釋治之以犀角地黃湯血在上焦故也按脈經云寸口芤吐血微芤者衄血空虛血去故也宜服竹皮湯黃耆湯灸膻中關內逢芤腸里癰關內所以候中焦者榮出中焦今關內而逢芤則為營血不行留於腸胃之間久之化為膿血而成癰毒張世賢釋治以桃仁承氣湯血在中焦故也按脈經云關脈芤大便去血數斗者以膈俞傷故也宜服生地黃並生竹皮湯灸膈俞若重下去血者針關元甚者宜服龍骨丸必愈又按醫說云楊介吉老者泗洲人以醫術聞四方有儒生李氏子學業願娶其女以授其學執子婿禮甚恭吉老盡以精微告之一日有靈璧縣富家婦有疾遣人邀李生以往李初視脈云腸胃間有所苦邪婦曰腸中痛不可忍而大便從小便中出醫者皆以謂無此證不可治故欲屈子李曰試為籌之若姑服我之藥三日當有瘳不然非其所知也下小丸子四十粒煎黃耆湯下之富家依其言下膿血數升而愈富家大喜贈錢五十萬置酒而問之曰始切脈時覺芤脈現於腸部王叔和脈訣云寸芤積血在胸中關內逢芤腸里癰此癰生腸內所以致然所服者乃雲母膏為丸耳切脈至此可以言醫矣李後以醫科及第至博士李植元季即其從子也脈經云關上芤胃中虛尺部見之虛在腎小便遺瀝血凝膿尺部所以候腎者今見芤脈是為水不勝火腎虛則門戶失守故小便遺瀝水不勝火故膿血淋漓也張世賢釋治以抵當丸抵當湯或加減桃仁湯愚謂既云虛在腎矣理宜用涼補之劑何為復用抵當等藥也亦須斟酌按脈經云尺中芤下血微芤小便血又云尺脈芤下焦虛小便去血宜服竹皮生地黃湯灸丹田關元亦針補之滑脈指法主病三滑者陽也指下尋之三關如珠動按之即伏不進不退曰滑主四肢困弊腳手痠疼小便赤澀滑者陽水也何為陽水謂水中有火也夫滑與澀相反榮氣不足則脈往來蹇澀榮氣有餘則脈往來流利故其論曰滑之體非獨陽也非獨陰也乃純陽正陰和合交結然所以然者何也蓋人身左腎屬水右腎屬火膀胱為水三焦為火陰陽相維水火相濟故脈道往來滑利而無蹇澀之患此平人之常脈耳今訣所謂滑者乃水中之火太甚煎熬騰沸故指下尋之三關如珠動如珠動者即劉氏所謂如荷葉上水珠言其往來流利也按之即伏不進不退者即脈經所謂浮中如有力言其不任尋按也故所主病為四肢困弊四肢屬脾土困弊者謂相火盛而乘其脾土也腳手痠疼者謂相火盛而煎熬其腎水也小便赤澀者三焦屬相火為決瀆之官今既不守本位與前之太陽合從陽化則熱故小便赤澀也按脈經云滑脈往來前卻流利展轉替替然與數相似一曰浮中如有力一曰漉漉如欲脫丹溪心法云滑為血實有痰仲景書問曰奄翕沉名曰滑何謂也師曰沉為純陰翕為正陽陰陽和合故脈滑也又按脈經云脈滑者多血少氣脈澀者少血多氣歌曰滑脈如珠號曰陽腰間生氣透前腸脛酸只為生寒熱大瀉三焦必得康其意蓋曰滑脈之體如珠之動往來滑利為水中有火乃陽水也故曰滑脈如珠號曰陽火既為水中之火宜藏而不宜動今乃不守本位從兩腎中間生出火氣透於前腸與太陽相合故曰腰間生氣透前腸也夫所謂脛酸者何也只為三焦之火薄所不勝夫所不勝者水也水為火所薄則寒熱生寒熱生則水受傷而足脛酸矣夫病而至足脛酸寒熱作未有不思大補而反思其大瀉者矣不知治病必求其本假令其人寒熱交作足脛痠痛其脈弦細而數則其補益真陰也宜矣今滑脈則不然足脛之酸只為寒熱之煎熬寒熱之煎熬只為水火之騰沸治之者必須大瀉其三焦之火以抑其陽陽退而陰自長矣若止以補陰為事如石投水又安能必得其康健也哉當與難經女得男脈為太過之說互相參酌潔古曰腰間生氣者命門也透前腸者膀胱經也命門三焦陷於前腸故小便不通大便秘澀熱多寒少故宜瀉以辛寒大承氣主之按經云滑為實為下又為陽氣衰又云滑而浮散者攤緩風又云滑者鬼疰又云滑數心中結熱盛又云滑疾胃中有寒又歌曰滑脈居寸多嘔逆滑主壅多陽部而見滑脈主上焦之氣壅滯而不行或痰飲停於胸膈故多嘔逆之證也按脈經云寸口滑胸滿逆又云寸脈滑陽實胸中壅滿吐逆宜服前胡湯針太陽巨闕瀉之關滑胃寒不下食關中所以候脾胃者也脾胃溫暖則能清化水穀今見滑脈是為脾胃虛寒不能腐熟水穀而至食不下也劉氏曰池氏注關部脈滑乃肝本克脾土者非也愚謂滑者水脈脾土虛寒不能制水乃微邪干脾故有胃寒不食尺部脈滑主臍冷之患也按脈經云關上滑中實逆又云關脈滑胃中有熱滑為實熱以氣滿故不欲食食即吐遂宜服紫菀湯下之大平胃丸針胃管瀉之愚按經文則曰關滑胃中有熱至於訣則又曰關滑胃寒似與經文大不相合然診治者亦當隨證消息如滑而數則宜從熱滑而遲則宜從寒不可執一論也又經云關上脈滑而小大不勻是為病方欲進不出一二日復欲發動其人慾多飲飲即注利如利止者生不止者死尺部見之臍是冰飲水下焦聲瀝瀝云岐子曰左尺主脈沉水客脈滑水二水相合寒結膀胱故臍下似冰聚於下而不上濟於火故欲飲水水停下焦不能引於各藏故瀝瀝作聲右尺主脈相火客脈滑水火水相合水勝火故臍下似冰相火原系水中之火不能全勝故欲飲水按脈經云尺中滑下利少氣又云尺脈滑血氣實婦人經脈不利男子溺血宜服朴硝煎大黃湯下去經血針關元瀉之又云尺脈沉而滑者寸白蟲又曰尺脈偏滑疾面赤如醉外氣則病又云尺脈滑而疾為血虛實脈指法主病四實者陽也指下尋之不絕舉之有餘曰實主伏陽在內脾虛不食四體勞倦實者陽土也何為陽土謂土中有火也指下尋之不絕沉而有力也舉之有餘浮而有力也浮而有力為陽勝沉而有力為伏陽在內脈浮沉俱有力而謂脾虛者何也陰陽和則脾胃安而脈道和緩今伏陽在內是陽火煉土堅燥而乏生化之源脾胃因之而虛矣四體屬脾脾虛不食四體因之而勞倦矣按脈經云實脈大而長微強按之隱指愊愊然一曰沉浮皆得歌曰實脈尋之舉有餘伏陽蒸內致脾虛食少只因生胃壅調和湯藥始痊除實脈者尋之舉之皆有力也今脾胃之所以虛者因伏陽蒸內之所致耳脾胃和則能磨谷而易飢脾胃虛則食不消食不消則胃口壅滯胃口壅滯則脈道因之而實矣若以辛溫之藥治之則反助其陽邪若以寒涼之藥治之則傷其脾胃若以峻補之藥治之則脾胃愈滯而食愈少若以克削之劑治之則脾胃重虛而食不化然則我將如之何哉亦惟調和其湯藥如經所云損其脾者調其飲食適其寒溫藥則如補中湯大健脾丸之類治之其疾始能痊除而愈也按經云實緊胃中有寒若不能食時時下利者難治又歌曰實脈關前胸熱盛實脈陽脈也寸口陽位也所以候胸中者今陽部而見陽脈宜乎其胸中熱盛也按脈經云寸口脈實即生熱在脾肺嘔逆氣塞虛即生寒在脾胃食不消化有熱即宜服竹葉湯葛根湯有寒即宜服茱萸丸生薑湯當關切痛中焦恁當關而見實脈則飲食停滯中焦而腹痛之證作矣按脈經云關上實即痛虛即脹滿又云關脈實胃中痛宜脈梔子湯茱萸烏頭丸針胃管補之尺脈如繩應指來腹脹小便都不禁池氏曰尺脈實主心經實熱傳於小腸致小腹脹滿疼痛而小便淋瀝也云岐子曰左尺主脈沉水客脈實火火水相合水能勝火治之以乾薑附子湯右尺主脈相火客脈實火二火相合致令腹脹而小便不禁治之以大承氣湯據云岐子之說如此謂是兩尺脈實耶謂是各尺脈實耶若云兩尺俱實則姜附湯與承氣湯寒熱各異若云各尺脈實則腹脹小便不禁其說未必皆同云岐子之說非也刊誤又謂其小便不禁為傳寫之誤而改為腹脹小便淋不思其說更非特未臨其證消息之耳訣所謂小便不禁者非虛寒而膀胱不固也乃火極而兼水化也腎主門戶之司相火有餘則薄所不勝而司戶失守故小便不禁非小便不禁也乃欲便則痛而不能不便則反淋瀝自出所謂熱淋者是也戴氏不自體認而反以脈訣為非可恥甚矣按脈經云尺脈實小腹痛小便不禁宜服當歸湯加大黃一兩以利大便針關元補之止小便又云尺中實即小便難少腹牢痛虛即閉澀弦脈指法主病五絃者陽也指下尋之不足舉之有餘狀若箏弦時時帶數曰弦主勞風乏力盜汗多出手足痠疼皮毛枯槁五絃者陽也陽木也何為陽木少陽之木也少陽主春升之令故其春脈弦而傷寒少陽證其脈亦弦是以知其弦為陽也說者有曰仲景以弦脈為陰而叔和獨以弦脈為陽者何也不知仲景所論者傷寒是自表漸入於裡自外而至內言之也故以弦為陰叔和所論者勞證自內而漸達於表是自內而至於外言之也故以弦為陽然弦則為勞故指法則曰指下尋之不足陰不足也舉之有餘陽偏勝也狀若箏弦氣血收斂也時時帶數陰虛而生內熱也故主病曰勞風乏力夫既曰勞而又曰風者何也或因用力入房則腎汗出腎汗出則元府開虛之所在邪必湊之故成勞風乏力之證矣陰不足則盜汗出凡人之精血足內則滲入骨髓外以淖澤肌膚今既為勞風所煎熬內無以充實骨髓而手足痠疼外無以淖澤肌膚而皮毛枯槁也按脈經云弦脈舉之無有按之如弓弦狀一曰如張弓弦按之不移又曰沉緊為弦經云弦數為瘧又云瘧脈自弦弦數多熱弦遲多寒弦為痛痹為風疰偏弦為飲雙弦則脅下拘急而痛其人嗇嗇惡寒又曰弦而鉤脅下如刀刺狀如蜚屍至困死經又云弦急疝瘕小腹痛又為癖病又云弦小者寒澼又云沉而弦者懸飲內痛又云弦數有寒飲冬夏難治又云弦而緊脅痛藏傷有瘀血又云弦小緊者可下之又云弦遲者宜溫藥又按此事難知曰仲景論弦澀為陰叔和言弦澀為陽何意大抵弦澀東西也以南北分之故有陰陽之別澀本燥火弦本水少雖有南北之分總而言之則不離諸數為熱諸遲為寒仲景叔和言本兩途非相違背合而論之皆是也仲景所言言傷寒自外而入者叔和所言言五臟自內而出者傷寒從氣而入故仲景以弦脈為陰自艮而之內從外入先太陽也位在東北雜病從血而出故叔和以弦脈為陽自巽而之外從內出先少陽也位在東南歌曰弦脈為陽狀若弦四肢更被氣相煎三度解勞方始退常須固濟下丹田弦脈為陽指下如箏弦之狀則為氣血收斂之候然氣血之所以收斂者因勞風之氣煎熬氣血而四肢為之煩熱矣凡人之治勞終不獲其全愈者是皆不知三度解勞之法耳以其人先受風邪病未全愈而復加以房勞則風邪留於元府而不退或先有房勞腎汗大泄元府已開而邪氣客之二者皆能煎熬氣血而成勞風之疾治之者當察其初中後而消息之或因內虛而外邪湊之者當先於平補藥中少加調理使外邪已去即當易以溫補之劑而收其後效或病已久虛則當從勞者溫之之法俟精血相壯即易以平補之劑以濟其前功是在醫者消息之耳如此亦不過兩度解勞之法也其三則又不專恃夫藥餅之功在醫者戒以惱怒房勞寧心靜慮存養省察握問調神使心腎交而水火濟自然神可馭氣氣可馭精丹田固而勞疾瘳矣不然則執一不通延綿日久及其莫救而委之於天不亦深可慨哉按巢氏病源養生方導引法云唯欲嘿氣養神閉氣使極吐氣使微又不得多言語大呼喚令神勞損亦云不可泣淚及多唾洟此皆為損液漏津使喉澀大渴又云雞鳴時叩齒三十六通訖舐唇漱口舌上齒表咽之三過殺蟲補虛勞令人強壯又云蛇行氣曲臥以兵身復行踞閉目隨氣所在不息少食裁通腸服氣為食以舐為漿春出冬藏不財不養以治五勞七傷又云蝦蟆行氣正動搖兩臂不息十二通以治五勞七傷水腫之病也又云朝朝玉泉使人丁壯有顏色去蟲而牢齒也玉泉口中唾也朝未起早嗽口吞之輒琢齒二七過如此者乃上名曰練精又云咽之三過乃止補養虛勞令人強壯又歌曰寸部脈緊一條弦胸中急痛狀繩牽寸部脈弦則宗氣不行為寒引經絡故胸中急痛狀若繩牽也按脈經云寸口脈弦心下愊愊微頭痛心下有水氣宜服甘遂丸針期門瀉之又云脈弦上寸口者宿食又云寸口脈弦者則脅下拘急而痛其人嗇嗇惡寒也又曰寸口弦胃中拘急關中有弦寒在胃若關中有弦主寒痰令飲停於胃口按脈經云關脈弦胃中寒心下厥逆此以胃氣虛故耳宜服茱萸湯溫調飲食針胃管補之又云關上弦胃中有寒心下拘急下焦停水滿丹田若弦脈見於尺部則丹田無暖氣而失運化之機故水停下焦而滿於丹田也按脈經云尺中弦少腹臍下拘急又云尺脈弦小腹疼小腹及腳中拘急宜服建中湯當歸湯針氣海瀉之緊脈指法主病六緊者陽也指下尋之三關通度按之有餘舉之甚數狀若洪弦曰緊主風氣伏陽上衝化為狂病緊者陽木也何為陽木以其脈帶弦長也指下尋之三關通度脈道長矣按之有餘邪氣有餘也舉指甚數熱邪在陽分也狀若洪弦者洪為陽明弦為少陽洪弦相合此名為緊緊為太陽諸緊為寒夫既曰寒而曰風氣伏陽者何也如水穴論帝曰人傷於寒而傳為熱者何也岐伯曰夫寒甚則熱生也又如冬傷於寒春必溫病是也蓋以初感其寒伏久則化而為熱也故主病曰風氣伏陽夫既曰弦為少陽洪為陽明緊為太陽則為三陽合病重陽者狂故曰風氣伏陽上衝化為狂病潔古曰此太陽少陽相合主伏陽上衝而為狂病治之之法宜以黃連瀉心湯此言深為得理學者宜玩味之諸家言緊脈或云如切繩或云如轉索皆不過形容其左右無常耳戴起宗乃摭拾諸說以為或轉在左或轉在右且以兩股三股糾合徽纆以為緊安有是理也哉不通甚焉按脈經云緊脈數如切繩狀一曰如轉索之無常劉氏云數而帶弦為緊脈影云緊者其來之且急去之且速按舉急大如轉索無常又曰動靜無常如紉單線診翼曰緊者有力而不緩也其來勁急按之長舉之若牽繩轉索之狀為邪風擊搏伏於榮衛之間歌曰緊脈三關數又弦上來風是正根源忽然狂語人驚怕不遇良醫不得痊緊脈者三關通度數而且弦是為三陽合病矣然其根源非暴受風寒蓋由上年所受風邪根源伏於其內感天行時熱化為春溫夏熱之證矣然重陽者狂故曰忽然狂語人驚怕也所謂不遇良醫不得痊者非是剩語其意蓋曰傷寒一證別有專門非比尋常雜證可以臆度必待圓機之士參究內經潛心仲景暨河間東垣節庵陶氏諸名家治法分別經絡表裡陰陽虛實寒熱參考五運六氣並得名醫傳授方為良醫不致有誤豈若今世之人勿遵古訓不經師承幾句油腔一味杜撰便謂吾能療治傷寒及乎臨證手足無措當汗不汗當下不下不當汗而汗不當下而下至不得已乃以雜證治法朦朧治之其誤人也豈淺鮮哉潔古曰此是三陽合病緊數太陽也弦多少陽也狂言陽明也故實則譫語云岐子曰其脈洪緊而實陽氣有餘之象也主熱即生風發作狂語可用小承氣湯主之按經云緊則為寒又云緊而急者遁戶又云緊數者可發其汗又云凡亡汗肺中寒飲冷水咳嗽下利胃中虛冷等證其脈並緊又云緊而數寒熱俱發必下乃愈又云緊而滑者吐逆又云駃而緊積聚有擊痛又云盛而緊曰脹又歌曰緊脈關前頭裡痛脈經云寸緊苦頭痛骨內疼是傷寒宜麻黃髮汗出又云頭痛逆氣按脈經云寸口脈緊苦頭痛骨肉疼是傷寒宜服麻黃湯發汗出眉沖顳顬摩治傷寒膏又云寸口脈緊如轉索左右無常者有縮食又云寸口脈緊即頭痛風寒或腹中有宿食不化又云寸口緊頭痛逆氣又云寸口脈緊或浮膈上有寒肺下有水氣又云脈緊而長過寸口者狂病又云脈緊上寸口者中風風頭痛亦如之當關切痛無能動脈經云關緊心下苦滿急痛脈緊者為實宜茱萸當歸湯又大黃湯治之良針巨闕下管瀉之脈影云肝緊主驚風筋脈拘攣腹痛則緊而盛痃癖則緊而實右關緊脾寒腹痛吐逆緊盛腹脹傷食按脈經云關上緊心下痛又云關脈緊心下苦滿急痛脈緊者為實宜服茱萸當歸湯又大黃湯兩治之良針巨闕下管瀉之又云關上脈緊而滑者蛔動隱指寥寥入尺來繳結繞臍常手捧張世賢曰繳結疼痛之狀也在尺主脈沉水客脈緊木水木相合水中有木土莫能制風寒在於下焦治之以桂枝芍藥湯不已風寒濕在於脾腎朮附湯主之右尺主脈相火客脈緊木火木相合風熱在於下焦而作痛治法不可同左按脈經云尺緊臍下痛宜當歸湯灸關元針天樞補之脈影云尺緊主為淋漓病疝氣耳聾齒痛腳膝疼命門緊主小腸虛鳴腸中痛診翼云左尺緊腰腳痠臍下痛小便難右尺緊下焦築痛時珍曰尺中有緊為陰冷定是奔豚與疝疼脈經又云尺中緊臍下少腹痛洪脈指法主病七洪者陽也指下尋之極大舉之有餘曰洪主頭疼四肢浮熱大腸不通燥熱糞結口乾遍身疼痛洪者陽火也何為陽火純陽而無陰也指下尋之極大陽邪傳入里也舉之有餘客邪猶在表也此為傷寒表邪未已傳入陽明裡證惟其邪在表故有頭疼身痛四肢浮熱之證惟其邪入於裡故有大腸不通燥熱糞結口乾之證也治以大柴胡湯主之潔古曰洪脈者按之實舉之盛洪者陽太過陰不及主頭痛四肢熱大便難小便赤澀夜臥不安治法陽證下之則愈如下之隨證虛實有大承氣湯有小承氣湯有大柴胡湯桃仁湯隨證用之此證有兩議或按之無舉之盛當解表不可下經言脈浮不可下下之則死脈沉當下下之則愈脈浮為在表脈沉為在裡按脈經云洪脈極大在指下一曰浮而大歌曰洪脈根源本是陽遇其季夏自然昌若逢秋季及冬季發汗通腸始得涼洪陽火也宜旺於夏季夏乃火退土旺之時其脈宜緩今脈猶有洪是為當退不退然土生長於火故六月謂之長夏其離母氣也不遠當此之時全賴火土合德萬物得以化生功成而退自然之理故曰遇其季夏自然昌也若逢秋季乃建戌之月是火歸墓之時其脈當毛於此而見洪脈則為當藏而不藏冬季乃建醜之月是火方養之時其脈當石於此而見洪脈則為不當旺而即旺二者雖土寄旺之時然三陰用事而脈猶見洪是為陽邪乘陰在表則有頭疼身痛四肢浮熱等證在裡則有大便不通燥糞結澀口乾等證在表者發其汗在裡者通其腸陽邪退而身自涼矣云岐子曰其脈舉按皆盛本為相火之象發汗從表通腸從里從表宜麻黃湯從里宜大承氣湯仲景云謂身體疼痛主夏得洪大脈知其病瘥也通腸七宣丸七聖丸大柴胡湯大承氣湯選用之按經云洪則為氣一作熱又云洪大者傷寒熱病又云脈來洪大嫋嫋者社祟又云脈洪大者若煩滿沉細者腹中痛又歌曰洪脈關前熱在胸洪為陽火關前所以候胸中者也關前而見洪脈則知其熱在胸矣故前賦中雲胸連脅滿只為洪當參看可也按脈經云寸脈洪大胸脅滿宜生薑湯白薇丸亦可紫菀湯下之針上管期門章門當關翻胃幾千重關所以候脾胃者也關中而見洪脈是為火邪於胃攻衝而為嘔吐之證矣按脈經云關洪胃中熱必煩滿宜平胃丸針胃管先瀉後補之更向尺中還若是小便赤澀腳痠疼尺部而見洪脈則為下焦有火火旺則小便赤澀火旺則水衰水衰則腳痠疼矣按至真要大論云少陰在泉客勝則腰痛尻股膝髀腨䯒足病瞀熱以酸腑腫不能久立溲便變此之謂也按脈影云尺脈洪大小便秘澀便血腳痠
